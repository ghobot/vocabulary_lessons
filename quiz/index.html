<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wordly Wise 3000 — Book 6</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080d18;color:#f1f5f9;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
canvas#bg{position:fixed;inset:0;z-index:0;pointer-events:none}
#app{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:20px 16px 48px}

.site-header{text-align:center;padding:32px 0 28px}
.site-header h1{font-size:2rem;font-weight:800;color:#f1f5f9;letter-spacing:-.01em;margin-bottom:6px}
.site-header .accent{background:linear-gradient(135deg,#38bdf8,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.site-header p{color:#94a3b8;font-size:.9rem}
.stats-bar{display:flex;justify-content:center;gap:24px;margin:16px 0 8px;flex-wrap:wrap}
.stat{text-align:center}
.stat-num{font-size:1.5rem;font-weight:800;color:#f1f5f9}
.stat-lbl{font-size:.7rem;color:#64748b;text-transform:uppercase;letter-spacing:.06em;margin-top:2px}

.search-wrap{display:flex;justify-content:center;margin-bottom:24px}
#search{width:100%;max-width:420px;padding:10px 16px;border-radius:24px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:#f1f5f9;font-size:.9rem;outline:none;transition:border .2s}
#search::placeholder{color:#64748b}
#search:focus{border-color:rgba(255,255,255,.3)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}

.card{
  display:block;text-decoration:none;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;padding:20px;
  transition:transform .18s,border-color .18s,background .18s;
  position:relative;overflow:hidden;
}
.card:hover{transform:translateY(-3px);border-color:var(--accent);background:rgba(255,255,255,.07)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.lesson-num{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent)}
.lesson-badge{font-size:.7rem;font-weight:700;padding:3px 9px;border-radius:10px;border:1px solid var(--accent);color:var(--accent);opacity:.7}
.card h2{font-size:1.05rem;font-weight:700;color:#f1f5f9;margin-bottom:4px;line-height:1.3}
.card-story{font-size:.78rem;color:#94a3b8;margin-bottom:12px;font-style:italic}
.word-chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:14px}
.chip{font-size:.65rem;padding:2px 7px;border-radius:8px;background:rgba(255,255,255,.06);color:#94a3b8;border:1px solid rgba(255,255,255,.08)}
.card-footer{display:flex;justify-content:space-between;align-items:center;font-size:.72rem;color:#64748b}
.play-btn{background:var(--accent);color:#080d18;border:none;padding:5px 14px;border-radius:12px;font-size:.75rem;font-weight:700;letter-spacing:.02em;cursor:pointer}

#no-results{display:none;text-align:center;padding:60px 0;color:#475569}
.footer{text-align:center;margin-top:40px;font-size:.75rem;color:#334155}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div id="app">
  <div class="site-header">
    <h1>Wordly Wise <span class="accent">3000</span></h1>
    <p>Book 6 &nbsp;&middot;&nbsp; Vocabulary Quiz Collection</p>
    <div class="stats-bar">
      <div class="stat"><div class="stat-num">14</div><div class="stat-lbl">Lessons</div></div>
      <div class="stat"><div class="stat-num">210</div><div class="stat-lbl">Words</div></div>
      <div class="stat"><div class="stat-num">2,726</div><div class="stat-lbl">Questions</div></div>
    </div>
  </div>

  <div class="search-wrap">
    <input id="search" type="search" placeholder="Search by lesson, story, or word&hellip;" autocomplete="off">
  </div>

  <div class="grid" id="grid"></div>
  <div id="no-results">No lessons match your search.</div>
  <div class="footer">Wordly Wise 3000 &middot; Book 6 &middot; 15 words &middot; 195 questions per lesson</div>
</div>

<script>
(function(){
  var c=document.getElementById('bg'),ctx=c.getContext('2d'),stars=[];
  function resize(){c.width=innerWidth;c.height=innerHeight;}
  resize();window.addEventListener('resize',resize);
  for(var i=0;i<200;i++)stars.push({x:Math.random(),y:Math.random(),r:Math.random()*1.3+.2,s:Math.random()*.3+.05});
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    var g=ctx.createRadialGradient(c.width/2,c.height*.3,0,c.width/2,c.height*.3,c.width*.8);
    g.addColorStop(0,'#0f172a');g.addColorStop(1,'#080d18');
    ctx.fillStyle=g;ctx.fillRect(0,0,c.width,c.height);
    var t=Date.now()/1000;
    stars.forEach(function(s){
      var op=.15+.25*Math.abs(Math.sin(t*s.s+s.x*12));
      ctx.beginPath();ctx.arc(s.x*c.width,s.y*c.height,s.r,0,Math.PI*2);
      ctx.fillStyle='rgba(241,245,249,'+op+')';ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

var LESSONS=[
  {n:1,  story:'Lady Liberty',                color:'#f0c040',q:193, words:['affection','appeal','clasp','conspicuous','contribute','declare','eloquent','exhibit','ferry','immigrant','lofty','pedestal','persecute','poverty','unveil']},
  {n:2,  story:'Rosa Parks',                  color:'#a78bfa',q:195, words:['arrogant','boycott','campaign','ceremony','custody','degrade','detain','extend','integrate','segregate','supreme','triumph','vacate','verdict','violate']},
  {n:3,  story:'Land of Contrasts',           color:'#34d399',q:195, words:['abundant','arid','distinct','graze','hectic','horde','humid','incredible','inhabit','peninsula','rural','sanctuary','splendor','squalor','terrain']},
  {n:4,  story:'A Different Way to Fly',      color:'#60a5fa',q:195, words:['aloft','attain','buffet','elude','flammable','hover','inflate','jeopardy','moor','plummet','pollute','propel','stationary','superb','swivel']},
  {n:5,  story:'A Born Artist',               color:'#f472b6',q:195, words:['antic','attire','captivate','deft','diligent','eclipse','evolve','innate','inscribe','posture','shroud','stifle','tentative','tranquil','versatile']},
  {n:6,  story:'The Story of Silk',           color:'#fb923c',q:195, words:['apparel','appreciate','continuous','dissolve','domesticate','emerge','fiber','function','hatch','inhibit','minute','motion','sheathe','shed','transfer']},
  {n:7,  story:'Home on the Range',           color:'#a3e635',q:195, words:['brawl','casual','constant','excel','exhaust','hardy','mediocre','monotonous','originate','punctuate','ravenous','realistic','soothe','stampede','veteran']},
  {n:8,  story:"Sacagawea's Great Adventure", color:'#fbbf24',q:194, words:['accompany','beneficial','captive','convenient','ecstasy','expanse','expedition','inept','interpret','invaluable','linger','retrieve','skirmish','supplement','territory']},
  {n:9,  story:'Water, Water, Everywhere',    color:'#38bdf8',q:195, words:['accumulate','aggravate','conserve','contaminate','diminish','drastic','extravagant','frugal','impurity','peril','perpetual','resource','substitute','sustain','vital']},
  {n:10, story:'Fun and Games',               color:'#c084fc',q:195, words:['anticipate','bankrupt','brief','brisk','budget','compete','complicate','effect','err','factor','fad','gripe','knack','leisure','unique']},
  {n:11, story:'Elizabeth Blackwell, M.D.',   color:'#f87171',q:195, words:['abbreviate','appropriate','exclude','fanciful','futile','grudge','inspire','majority','persevere','possess','prejudice','resolute','sneer','unanimous','unruly']},
  {n:12, story:'The Trojan Horse',            color:'#fbbf24',q:195, words:['abandon','adversary','baffle','blunder','colossal','detect','haul','overpower','rejoice','scoff','sentinel','siege','sinister','victor','woe']},
  {n:13, story:'The Ship of the Desert',      color:'#fb923c',q:194, words:['adapt','deplete','efficient','fatigue','gait','glare','habitat','oblivious','outmoded','prominent','quench','rigor','sear','transport','wend']},
  {n:14, story:'The Silk Road',               color:'#22d3ee',q:195, words:['benevolent','consent','discreet','engross','esteem','exaggerate','extensive','fantastic','intrigue','marvel','mission','opportunity','relinquish','tyrant','vanquish']}
];

function mk(tag,cls){var el=document.createElement(tag);if(cls)el.className=cls;return el;}
function txt(el,t){el.textContent=t;return el;}

function buildCard(l){
  var a=mk('a','card');
  a.href='lesson_'+l.n+'/index.html';
  a.style.setProperty('--accent',l.color);
  a.dataset.search=(l.n+' '+l.story+' '+l.words.join(' ')).toLowerCase();

  var top=mk('div','card-top');
  top.appendChild(txt(mk('div','lesson-num'),'Lesson '+l.n));
  top.appendChild(txt(mk('div','lesson-badge'),'15 words'));
  a.appendChild(top);

  a.appendChild(txt(mk('h2'),l.story));
  a.appendChild(txt(mk('div','card-story'),'Wordly Wise 3000 · Book 6'));

  var chips=mk('div','word-chips');
  l.words.slice(0,8).forEach(function(w){chips.appendChild(txt(mk('span','chip'),w));});
  if(l.words.length>8){chips.appendChild(txt(mk('span','chip'),'+'+( l.words.length-8)+' more'));}
  a.appendChild(chips);

  var footer=mk('div','card-footer');
  footer.appendChild(txt(mk('span','q-count'),l.q.toLocaleString()+' questions'));
  footer.appendChild(txt(mk('span','play-btn'),'Start Quiz →'));
  a.appendChild(footer);

  return a;
}

var grid=document.getElementById('grid');
LESSONS.forEach(function(l){grid.appendChild(buildCard(l));});

document.getElementById('search').addEventListener('input',function(){
  var q=this.value.toLowerCase().trim();
  var cards=grid.querySelectorAll('.card');
  var visible=0;
  cards.forEach(function(c){
    var show=!q||c.dataset.search.indexOf(q)!==-1;
    c.style.display=show?'':'none';
    if(show)visible++;
  });
  document.getElementById('no-results').style.display=visible===0?'block':'none';
});
</script>
</body>
</html>
