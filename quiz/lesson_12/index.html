<script>
(function(){
  var c=document.getElementById('bg'),ctx=c.getContext('2d'),stars=[];
  function resize(){c.width=innerWidth;c.height=innerHeight;}
  resize();window.addEventListener('resize',resize);
  for(var i=0;i<220;i++)stars.push({x:Math.random(),y:Math.random(),r:Math.random()*1.5+.3,s:Math.random()*.4+.1});
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    var g=ctx.createRadialGradient(c.width/2,c.height/2,0,c.width/2,c.height/2,c.width*.7);
    g.addColorStop(0,'#2d1a00');g.addColorStop(.5,'#160d01');g.addColorStop(1,'#060400');
    ctx.fillStyle=g;ctx.fillRect(0,0,c.width,c.height);
    var t=Date.now()/1000;
    stars.forEach(function(s){
      var op=.3+.4*Math.abs(Math.sin(t*s.s+s.x*10));
      ctx.beginPath();ctx.arc(s.x*c.width,s.y*c.height,s.r,0,Math.PI*2);
      ctx.fillStyle='rgba(251,191,36,'+op+')';ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

var pc=document.getElementById('pcanvas'),pctx=pc.getContext('2d'),particles=[];
pc.width=innerWidth;pc.height=innerHeight;
window.addEventListener('resize',function(){pc.width=innerWidth;pc.height=innerHeight;});
function spawnBurst(x,y,color,n){
  for(var i=0;i<n;i++){
    var ang=Math.random()*Math.PI*2,spd=Math.random()*5+2;
    particles.push({x:x,y:y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:1,color:color,r:Math.random()*4+2});
  }
}
function spawnConfetti(){
  var colors=['#fbbf24','#f59e0b','#d97706','#4ade80','#60a5fa','#c084fc'];
  for(var i=0;i<60;i++){
    particles.push({x:Math.random()*pc.width,y:-10,vx:(Math.random()-.5)*4,vy:Math.random()*4+2,
      life:1,color:colors[Math.floor(Math.random()*colors.length)],r:Math.random()*5+3,confetti:true});
  }
}
(function ploop(){
  pctx.clearRect(0,0,pc.width,pc.height);
  particles=particles.filter(function(p){return p.life>0;});
  particles.forEach(function(p){
    p.x+=p.vx;p.y+=p.vy;p.life-=p.confetti?.012:.03;
    if(p.confetti)p.vy+=.1;
    pctx.globalAlpha=Math.max(0,p.life);
    pctx.fillStyle=p.color;pctx.beginPath();
    pctx.arc(p.x,p.y,p.r,0,Math.PI*2);pctx.fill();
  });
  pctx.globalAlpha=1;
  requestAnimationFrame(ploop);
})();

function clearEl(el){while(el.firstChild)el.removeChild(el.firstChild);}
function mk(tag,cls,txt){var el=document.createElement(tag);if(cls)el.className=cls;if(txt!==undefined)el.textContent=txt;return el;}
function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}

{type:'simile',word:'rejoice',q:'Complete the simile: The Trojans rejoiced like ___',a:'a crowd that watched the last storm cloud blow away after ten years of rain',ch:['a crowd that watched the last storm cloud blow away after ten years of rain','a group that heard the weather forecast and prepared carefully for more','people watching a storm approach and quietly heading indoors','a crowd that saw the clouds and decided to wait for the rain to pass'],hint:'Think: to rejoice after a long struggle = release of enormous relief — like watching ten years of storm finally clear'},
{type:'simile',word:'rejoice',q:'Complete the simile: She rejoiced at the news like ___',a:'a candle suddenly lit in a dark room — small but filling everything with light',ch:['a candle suddenly lit in a dark room — small but filling everything with light','a room that was already bright and became slightly brighter','a lamp turned on in a room where no one had noticed the darkness','a window opened in a room that was already full of fresh air'],hint:'Think: rejoicing transforms your whole state — like one candle that fills darkness completely'},
{type:'simile',word:'rejoice',q:'Complete the simile: The family rejoiced together like ___',a:'a chorus finding the same note after a long silence — suddenly and completely unified',ch:['a chorus finding the same note after a long silence — suddenly and completely unified','singers each performing their own song without listening to the others','a group of instruments each tuned to a different key','voices overlapping in a room where no two people agree on the melody'],hint:'Think: rejoicing together = alignment after separation — like voices finally finding the same note'},
{type:'simile',word:'scoff',q:'Complete the simile: The professors scoffed at her application like ___',a:'diners turning away an unfamiliar dish before tasting it — dismissed without a moment\'s consideration',ch:['diners turning away an unfamiliar dish before tasting it — dismissed without a moment\'s consideration','chefs who taste every new ingredient carefully before forming a judgment','judges who read every entry twice before deciding which deserves a prize','tasters who try something unexpected and find themselves surprised by how good it is'],hint:'Think: to scoff is to reject without real examination — like food refused before it\'s even tried'},
{type:'simile',word:'scoff',q:'Complete the simile: He scoffed at the idea as casually as ___',a:'brushing a crumb off the table — a small motion to him, but it carried everything',ch:['brushing a crumb off the table — a small motion to him, but it carried everything','weighing every option carefully before reaching a measured conclusion','stopping to consider the idea from every angle before responding','listening quietly and asking a thoughtful question before offering an opinion'],hint:'Think: scoffing is effortless dismissal — like brushing something away without a second thought'},
{type:'simile',word:'sentinel',q:'Complete the simile: The sentinels stood at the gate like ___',a:'stone statues placed there before memory began — immovable, expressionless, watching everything',ch:['stone statues placed there before memory began — immovable, expressionless, watching everything','children eager to run inside the moment the gate opens','guests waiting nervously to be called in from the cold','travelers resting briefly before continuing their journey'],hint:'Think: a sentinel at a gate is permanent, watchful, unmoved — like stone that has always been there'},
{type:'simile',word:'sentinel',q:'Complete the simile: She stood at the entrance like ___',a:'a sentinel carved into the very rock of the threshold — impossible to pass without being seen',ch:['a sentinel carved into the very rock of the threshold — impossible to pass without being seen','a welcome mat that invites everyone to step right over it','a door left deliberately open for whoever wishes to enter','a sign pointing the way in, with no one checking who follows it'],hint:'Think: a sentinel is part of the gate itself — like stone, a permanent presence that sees everything'},
{type:'simile',word:'siege',q:'Complete the simile: The siege dragged on like ___',a:'a rainstorm that begins at dawn and is still falling when the last light fades',ch:['a rainstorm that begins at dawn and is still falling when the last light fades','a sudden summer shower over in fifteen minutes','a storm that arrives quickly, strikes hard, and clears before noon','a light drizzle that no one bothers to open an umbrella for'],hint:'Think: a siege is slow, relentless, never-ending — like a rain that fills the whole day without stopping'},
{type:'simile',word:'siege',q:'Complete the simile: The city endured the siege like ___',a:'an island fortress holding out against a rising sea — surrounded, pressured, but not yet broken',ch:['an island fortress holding out against a rising sea — surrounded, pressured, but not yet broken','a ship in open water with no obstacles and a favorable wind','a bridge standing strong with no weight on it and no current below','a gate standing open with no enemy in sight for a hundred miles'],hint:'Think: enduring a siege = surrounded on all sides, holding against constant pressure — like an island in a rising sea'},
{type:'simile',word:'siege',q:'Complete the simile: The ten-year siege ground down both armies like ___',a:'two millstones turning against each other — wearing everything between them to dust',ch:['two millstones turning against each other — wearing everything between them to dust','a single millstone turning on smooth grain — effortless, productive, clean','two wheels that mesh perfectly and turn the same direction together','a clockwork mechanism where every gear fits and nothing is wasted'],hint:'Think: a long siege wears down both sides — like two millstones, the grinding eventually destroys what\'s between them'},
{type:'simile',word:'sinister',q:'Complete the simile: His sinister smile curled like ___',a:'the edge of smoke from a fire lit for no good purpose',ch:['the edge of smoke from a fire lit for no good purpose','morning mist rising from a field in the early light','steam from a kettle on a cold morning','fog lifting off the water as the sun comes up'],hint:'Think: sinister = dark, curling, suggesting harm — like smoke from a fire whose purpose isn\'t warmth'},
{type:'simile',word:'sinister',q:'Complete the simile: The abandoned house looked as sinister as ___',a:'a smile with too many teeth — technically right, somehow deeply wrong',ch:['a smile with too many teeth — technically right, somehow deeply wrong','a window with the light on and a warm fire visible inside','a door left open in welcome on a familiar street','a garden tended carefully with flowers blooming in the right season'],hint:'Think: sinister = looks like something familiar but feels wrong — like a smile that is just slightly off'},
{type:'simile',word:'victor',q:'Complete the simile: The victor stood above the fallen city like ___',a:'a storm that has spent itself and left only ruin behind',ch:['a storm that has spent itself and left only ruin behind','a warm front moving in after a long cold snap','a gentle rain that settles the dust without breaking anything','a wind that stirs the trees without tearing any branches loose'],hint:'Think: victor after destruction = power that has fully discharged — like a spent storm that has nothing left but the wreckage'},
{type:'simile',word:'victor',q:'Complete the simile: She emerged from the competition victorious like ___',a:'a phoenix stepping out of its own ashes — something destroyed transformed into something triumphant',ch:['a phoenix stepping out of its own ashes — something destroyed transformed into something triumphant','a candle blown out by the first gust of wind that found it','a spark that flares once and is gone before anyone can see it','a flame that needs constant tending or it quietly goes out on its own'],hint:'Think: victor after a hard fight = renewed, triumphant — like a phoenix, the struggle IS the transformation'},
{type:'simile',word:'woe',q:'Complete the simile: The Trojans\' woe spread through the city like ___',a:'smoke from a fire they had lit themselves — impossible to escape what they had caused',ch:['smoke from a fire they had lit themselves — impossible to escape what they had caused','a morning fog that burns off cleanly the moment the sun appears','rain that washes everything clean and leaves the air fresh afterward','a wind that carries seeds and brings new growth wherever it blows'],hint:'Think: woe caused by your own blunder = inescapable — like smoke from a fire you lit'},
{type:'simile',word:'woe',q:'Complete the simile: Her woe was as visible as ___',a:'a bruise on a pale face — impossible to miss, impossible to pretend wasn\'t there',ch:['a bruise on a pale face — impossible to miss, impossible to pretend wasn\'t there','a mark hidden under clothing that no one outside could see','a thought kept entirely inside, never showing on the face or body','a feeling so quiet that only the person carrying it could feel its weight'],hint:'Think: woe shows — like a bruise, it marks the surface and everyone can see it'},

{type:'metaphor',word:'abandon',q:'Which sentence is a metaphor using ABANDON?',a:'Trust, once abandoned, is a bridge burned from both sides — you cannot cross back over it, and neither can anyone else.',ch:['Trust, once abandoned, is a bridge burned from both sides — you cannot cross back over it, and neither can anyone else.','Trust, once abandoned, is as hard to rebuild as a bridge that has been burned.','Like a bridge burned from both sides, trust once abandoned becomes impossible to cross.','Abandoning trust is as destructive as burning a bridge you both needed to use.'],hint:'Think: calling abandoned trust directly a burned bridge — it IS the destroyed crossing, and abandonment IS the fire'},
{type:'metaphor',word:'abandon',q:'Which sentence is a metaphor using ABANDON?',a:'Hope was the one thing the trapped miners refused to abandon — their last lantern in a collapsed shaft.',ch:['Hope was the one thing the trapped miners refused to abandon — their last lantern in a collapsed shaft.','Hope felt like a lantern to the miners, and they refused to abandon it.','Like a lantern they refused to let go of, the miners held on to hope and refused to abandon it.','The miners refused to abandon hope, which burned like a lantern in the darkness.'],hint:'Think: calling hope directly a lantern — it IS their light source, the one thing they refuse to leave behind'},
{type:'metaphor',word:'adversary',q:'Which sentence is a metaphor using ADVERSARY?',a:'Time was the Trojans\' most patient adversary — it wore them down not with swords but with ten years of waiting.',ch:['Time was the Trojans\' most patient adversary — it wore them down not with swords but with ten years of waiting.','Time acted like an adversary to the Trojans — patient, wearing them down without weapons.','Like an adversary more patient than any soldier, time wore down the Trojans over ten years.','Time was as much an adversary to the Trojans as any Greek soldier — slow, relentless, exhausting.'],hint:'Think: calling time directly an adversary — it IS their enemy, the one that defeats them with patience'},
{type:'metaphor',word:'adversary',q:'Which sentence is a metaphor using ADVERSARY?',a:'Doubt is every dreamer\'s adversary — a small, persistent voice that grows louder every time you hesitate.',ch:['Doubt is every dreamer\'s adversary — a small, persistent voice that grows louder every time you hesitate.','Doubt works like an adversary for dreamers — it speaks against them every time they hesitate.','Like an adversary that never rests, doubt speaks against you every time you consider giving up.','Doubt is as much an adversary to dreamers as any real opponent — it fights against them from within.'],hint:'Think: calling doubt directly an adversary — it IS the enemy, fighting from inside rather than outside'},
{type:'metaphor',word:'baffle',q:'Which sentence is a metaphor using BAFFLE?',a:'The wooden horse was a riddle the Trojans never solved — it baffled them, and that bafflement was the trap.',ch:['The wooden horse was a riddle the Trojans never solved — it baffled them, and that bafflement was the trap.','The wooden horse baffled the Trojans the way a riddle confuses someone who can\'t find the answer.','Like a riddle they couldn\'t solve, the wooden horse baffled the Trojans and became their undoing.','The Trojans were baffled by the wooden horse as completely as someone who can\'t solve a riddle.'],hint:'Think: calling the horse directly a riddle — it IS the puzzle, and their failure to solve it IS the trap'},
{type:'metaphor',word:'baffle',q:'Which sentence is a metaphor using BAFFLE?',a:'Their silence was a baffle — a wall of nothing that stopped every question from reaching the answer.',ch:['Their silence was a baffle — a wall of nothing that stopped every question from reaching the answer.','Their silence baffled everyone the way a wall stops sound from passing through.','Like a baffle that absorbs every question, their silence prevented anyone from finding the answer.','Their silence was as baffling as a wall — every question hit it and came back unanswered.'],hint:'Think: calling their silence directly a baffle — it IS the device that blocks, stops every attempt at understanding'},
{type:'metaphor',word:'baffle',q:'Which sentence is a metaphor using BAFFLE?',a:'The code was a labyrinth of symbols — it baffled every expert who entered and offered no exit.',ch:['The code was a labyrinth of symbols — it baffled every expert who entered and offered no exit.','The code baffled experts the way a labyrinth confuses those who enter without a map.','Like a labyrinth with no exit, the code baffled every expert who tried to find a way through.','The experts were baffled by the code as completely as someone lost in a labyrinth.'],hint:'Think: calling the code directly a labyrinth — it IS the maze, and to be baffled IS to be lost inside it'},
{type:'metaphor',word:'blunder',q:'Which sentence is a metaphor using BLUNDER?',a:'Hauling the horse inside was Troy\'s great blunder — the door they opened for their own destruction.',ch:['Hauling the horse inside was Troy\'s great blunder — the door they opened for their own destruction.','Hauling the horse inside was as much a blunder as opening a door to let in an enemy.','Like a door thrown open to destruction, hauling the horse inside was the Trojans\' great blunder.','The Trojans blundered when they hauled the horse inside, as if they had opened a door for their enemies.'],hint:'Think: calling the blunder directly a door — it IS the opening through which destruction entered'},
{type:'metaphor',word:'blunder',q:'Which sentence is a metaphor using BLUNDER?',a:'Every blunder is a teacher — harsh, unscheduled, and impossible to ignore.',ch:['Every blunder is a teacher — harsh, unscheduled, and impossible to ignore.','Every blunder teaches you something, like a harsh teacher you didn\'t choose.','Like a teacher who arrives without warning, every blunder forces you to learn something.','A blunder is as much a teacher as a classroom lesson — harsh but instructive.'],hint:'Think: calling every blunder directly a teacher — it IS the instructor, and the lesson IS the consequence'},
{type:'metaphor',word:'colossal',q:'Which sentence is a metaphor using COLOSSAL?',a:'The Trojan Horse was a colossal deception — a monument to the idea that the biggest threats wear the most beautiful disguises.',ch:['The Trojan Horse was a colossal deception — a monument to the idea that the biggest threats wear the most beautiful disguises.','The Trojan Horse was as colossal a deception as any monument erected to a false idea.','Like a colossal monument to deception, the wooden horse announced its purpose to everyone but its victims.','The deception of the Trojan Horse was colossal — as large and impressive as any monument.'],hint:'Think: calling the deception directly a monument — it IS the enormous structure, built to stand as an example forever'},
{type:'metaphor',word:'colossal',q:'Which sentence is a metaphor using COLOSSAL?',a:'His ego was colossal architecture — grand on the outside, hollow all the way through.',ch:['His ego was colossal architecture — grand on the outside, hollow all the way through.','His ego was as colossal as a massive building — impressive from outside, empty within.','Like colossal architecture, his ego was designed to impress but offered nothing inside.','His ego was colossally hollow — as grand in appearance as a great building with nothing in it.'],hint:'Think: calling his ego directly architecture — it IS the structure, colossal and hollow, built to impress'},
{type:'metaphor',word:'detect',q:'Which sentence is a metaphor using DETECT?',a:'Cassandra\'s gift was the ability to detect the threads of fate before anyone else could see the weaving.',ch:['Cassandra\'s gift was the ability to detect the threads of fate before anyone else could see the weaving.','Cassandra could detect fate\'s patterns the way a weaver detects a flaw in the threads before anyone else.','Like someone who detects flaws in a weaving before it\'s complete, Cassandra saw fate before it unfolded.','Cassandra detected the threads of fate as easily as a skilled weaver detects a knot in the cloth.'],hint:'Think: fate as a weaving — Cassandra IS the one who detects the threads before the pattern is visible to anyone else'},
{type:'metaphor',word:'detect',q:'Which sentence is a metaphor using DETECT?',a:'A good detective is a human lens — always detecting what others pass over, always focusing on what others blur.',ch:['A good detective is a human lens — always detecting what others pass over, always focusing on what others blur.','A good detective detects things the way a lens focuses light — bringing detail into view that others miss.','Like a lens that detects flaws invisible to the naked eye, a good detective sees what others overlook.','A detective detects things as precisely as a lens focuses on what the unaided eye cannot resolve.'],hint:'Think: calling the detective directly a lens — they ARE the focusing instrument, and detection IS the act of bringing things into clarity'},
{type:'metaphor',word:'detect',q:'Which sentence is a metaphor using DETECT?',a:'Their loyalty was easy to detect — it was the thread running through everything they did, visible from any angle.',ch:['Their loyalty was easy to detect — it was the thread running through everything they did, visible from any angle.','Their loyalty was as easy to detect as a thread woven visibly through everything they said and did.','Like a thread running through every action, their loyalty was something you could detect from any angle.','You could detect their loyalty in everything they did, the way you detect a thread woven through cloth.'],hint:'Think: calling loyalty directly a thread — it IS the structural element, and to detect it IS to see it running through every action'},
{type:'metaphor',word:'haul',q:'Which sentence is a metaphor using HAUL?',a:'History is a weight we all haul — some carry it like a burden, others like a lantern showing where not to walk again.',ch:['History is a weight we all haul — some carry it like a burden, others like a lantern showing where not to walk again.','History feels like a weight we haul with us — sometimes a burden, sometimes a tool.','Like a weight we haul forward, history can slow us down or help us find the right path.','We haul history the way we haul a heavy load — it weighs on us whether we choose to carry it or not.'],hint:'Think: calling history directly a weight we haul — it IS the load, and the hauling IS the act of carrying the past with us'},
{type:'metaphor',word:'haul',q:'Which sentence is a metaphor using HAUL?',a:'Every generation hauls the mistakes of the last — the question is whether they haul it to study or to repeat.',ch:['Every generation hauls the mistakes of the last — the question is whether they haul it to study or to repeat.','Every generation hauls the weight of the previous generation\'s mistakes, like cargo passed forward.','Like cargo hauled from one ship to the next, past mistakes are carried by every new generation.','Each generation hauls history\'s mistakes the way a ship hauls cargo — forward, whether they wish it or not.'],hint:'Think: calling past mistakes directly cargo to be hauled — they ARE the freight, carried from one generation to the next'},
{type:'metaphor',word:'overpower',q:'Which sentence is a metaphor using OVERPOWER?',a:'In the end, Greek cunning overpowered Trojan strength — the war was not won with a sword but with a gift.',ch:['In the end, Greek cunning overpowered Trojan strength — the war was not won with a sword but with a gift.','In the end, Greek cunning was powerful enough to overpower the physical strength of Troy.','Like a force that overpowers through cleverness rather than strength, the Greeks won with a gift, not a sword.','The Greeks used cunning to overpower Troy in the same way that intelligence overpowers brute force.'],hint:'Think: cunning IS the overpowering force — it IS the weapon that defeats, and the gift IS that weapon'},
{type:'metaphor',word:'overpower',q:'Which sentence is a metaphor using OVERPOWER?',a:'Silence can overpower a room — fill it completely with nothing until every voice inside goes quiet.',ch:['Silence can overpower a room — fill it completely with nothing until every voice inside goes quiet.','Silence overpowers a room the way a strong presence dominates every conversation within it.','Like a force that overpowers everything in its path, silence fills a room and quiets every voice.','A powerful silence can overpower conversation the way one dominant voice overpowers all the others.'],hint:'Think: calling silence an overpowering force — it IS the dominant presence, and to overpower IS to fill and silence everything else'},
{type:'metaphor',word:'rejoice',q:'Which sentence is a metaphor using REJOICE?',a:'The Trojans\' rejoicing was a fire lit too soon — it consumed the night they needed to stay watch.',ch:['The Trojans\' rejoicing was a fire lit too soon — it consumed the night they needed to stay watch.','The Trojans rejoiced too soon, like someone who lights a fire before they\'ve made sure it\'s safe.','Like a fire lit before the danger had passed, their premature rejoicing consumed the night they needed.','Their rejoicing was as dangerous as a fire — lit at the wrong moment, it burned away their vigilance.'],hint:'Think: calling their rejoicing directly a fire lit too soon — it IS the thing that consumed the night, that burned their watchfulness'},
{type:'metaphor',word:'rejoice',q:'Which sentence is a metaphor using REJOICE?',a:'To rejoice is to give the whole self over to the moment — to become nothing but the fact of being glad.',ch:['To rejoice is to give the whole self over to the moment — to become nothing but the fact of being glad.','To rejoice is to feel so glad that you give yourself completely to the happiness of the moment.','Like giving yourself over to the moment, to rejoice is to be nothing but gladness for a time.','Rejoicing means surrendering to happiness the way you give yourself over to a moment of pure joy.'],hint:'Think: calling rejoicing directly a surrender of the self — to rejoice IS to become entirely the emotion'},
{type:'metaphor',word:'rejoice',q:'Which sentence is a metaphor using REJOICE?',a:'Their relief was a rejoicing that swept through the city like water released from a dam — sudden, total, unstoppable.',ch:['Their relief was a rejoicing that swept through the city like water released from a dam — sudden, total, unstoppable.','Their relief felt like a rejoicing that swept through the city the way water bursts from a dam.','Like water released from a dam, their rejoicing was sudden and impossible to stop once it started.','Their rejoicing swept through the city the way water rushes from a broken dam — all at once, everywhere.'],hint:'Think: calling their relief directly a rejoicing, and the rejoicing directly a flood — the emotion IS the water, unstoppable and total'},
{type:'metaphor',word:'scoff',q:'Which sentence is a metaphor using SCOFF?',a:'Every scoff is a closed door — you mock what you don\'t understand, and in doing so guarantee you never will.',ch:['Every scoff is a closed door — you mock what you don\'t understand, and in doing so guarantee you never will.','Every scoff is as final as a door closed against understanding — once you mock, you stop learning.','Like a door closed against understanding, a scoff shuts out whatever you refuse to take seriously.','To scoff at something is to close a door on it — you end any chance of understanding by mocking it.'],hint:'Think: calling every scoff directly a closed door — it IS the barrier, and to scoff IS to shut out all possibility of understanding'},
{type:'metaphor',word:'scoff',q:'Which sentence is a metaphor using SCOFF?',a:'History\'s greatest scoffers are its greatest footnotes — remembered only for what they refused to believe.',ch:['History\'s greatest scoffers are its greatest footnotes — remembered only for what they refused to believe.','History\'s greatest scoffers are like footnotes — noted only for what they dismissed rather than what they built.','Like footnotes in the story of progress, those who scoffed are remembered only for what they rejected.','The people who scoffed at new ideas became footnotes — history remembers them for what they refused to believe.'],hint:'Think: calling scoffers directly footnotes — they ARE the margin notes, remembered only for their dismissal'},
{type:'metaphor',word:'sentinel',q:'Which sentence is a metaphor using SENTINEL?',a:'Memory is the sentinel of identity — it stands at the gate of who you are and decides what enters and what is turned away.',ch:['Memory is the sentinel of identity — it stands at the gate of who you are and decides what enters and what is turned away.','Memory works like a sentinel for identity — it guards what you keep and turns away what doesn\'t belong.','Like a sentinel standing at the gate, memory decides what becomes part of who you are.','Your memory is as much a sentinel as any guard — it keeps some things in and turns others away.'],hint:'Think: calling memory directly a sentinel — it IS the guard, and identity IS the city being protected'},
{type:'metaphor',word:'sentinel',q:'Which sentence is a metaphor using SENTINEL?',a:'Conscience is an internal sentinel — it cannot be bribed, cannot be relieved of duty, and never truly sleeps.',ch:['Conscience is an internal sentinel — it cannot be bribed, cannot be relieved of duty, and never truly sleeps.','Conscience works like a sentinel inside you — it watches everything you do and cannot be dismissed.','Like a sentinel who never leaves their post, conscience keeps watch on every action and cannot be bribed.','Your conscience is as persistent as a sentinel — it watches from inside and is impossible to dismiss.'],hint:'Think: calling conscience directly a sentinel — it IS the guard, posted inside, impossible to corrupt or dismiss'},
{type:'metaphor',word:'sentinel',q:'Which sentence is a metaphor using SENTINEL?',a:'The old oak at the end of the drive was a sentinel — it had stood there so long it had grown into the shape of watching.',ch:['The old oak at the end of the drive was a sentinel — it had stood there so long it had grown into the shape of watching.','The old oak looked like a sentinel — it stood at the end of the drive as if placed there to watch.','Like a sentinel that has been on duty too long, the old oak had grown into the posture of permanent watch.','The old oak served as a sentinel at the end of the drive — rooted there and impossible to pass unnoticed.'],hint:'Think: calling the oak directly a sentinel — it IS the guard, and time has shaped it into permanent watchfulness'},
{type:'metaphor',word:'siege',q:'Which sentence is a metaphor using SIEGE?',a:'Grief is a siege — it surrounds you completely, cuts off all supply lines to joy, and waits for you to exhaust yourself.',ch:['Grief is a siege — it surrounds you completely, cuts off all supply lines to joy, and waits for you to exhaust yourself.','Grief works like a siege — it surrounds you and cuts you off from everything that might bring comfort.','Like a siege that surrounds a city, grief cuts off every supply line to joy and waits you out.','Grief feels like being under siege — surrounded, cut off, with nothing coming in and no way out.'],hint:'Think: calling grief directly a siege — it IS the encirclement, and joy IS the supply line that gets cut'},
{type:'metaphor',word:'siege',q:'Which sentence is a metaphor using SIEGE?',a:'The silence before the verdict was a siege — pressing in from every side, making the air impossible to breathe.',ch:['The silence before the verdict was a siege — pressing in from every side, making the air impossible to breathe.','The silence before the verdict felt like a siege — it pressed in from every direction with nowhere to escape.','Like a siege closing in from every direction, the silence before the verdict made everything feel impossible.','That silence was as much a siege as any army — it surrounded and pressed in until there was no room left.'],hint:'Think: calling the silence directly a siege — it IS the encirclement, pressing from every side'},
{type:'metaphor',word:'sinister',q:'Which sentence is a metaphor using SINISTER?',a:'The wooden horse was sinister perfection — a gift that held its own army, a welcome that carried its own destruction.',ch:['The wooden horse was sinister perfection — a gift that held its own army, a welcome that carried its own destruction.','The wooden horse was sinister in a perfect way — a gift containing soldiers, a welcome hiding destruction.','Like sinister perfection in physical form, the wooden horse was a gift that concealed its own army.','The wooden horse was perfectly sinister — as carefully designed to cause harm as anything ever built.'],hint:'Think: calling the horse directly sinister perfection — it IS the perfected form of evil disguised as a gift'},
{type:'metaphor',word:'sinister',q:'Which sentence is a metaphor using SINISTER?',a:'His patience was sinister — not the patience of someone who can wait, but of someone who has already decided the outcome.',ch:['His patience was sinister — not the patience of someone who can wait, but of someone who has already decided the outcome.','His patience felt sinister — it was the patience of someone who had already decided how everything would end.','Like something sinister, his patience didn\'t feel like waiting — it felt like certainty of a bad outcome.','His patience was as sinister as a plan already decided — not waiting, but counting down.'],hint:'Think: calling his patience directly sinister — it IS the threatening quality, patience as a form of certain, predatory confidence'},
{type:'metaphor',word:'victor',q:'Which sentence is a metaphor using VICTOR?',a:'Greece was ultimately not the victor of the Trojan War — history was, and it has been replaying the story ever since.',ch:['Greece was ultimately not the victor of the Trojan War — history was, and it has been replaying the story ever since.','Greece was not really the victor in any lasting sense — history has outlasted the story of every winner.','Like a victor that outlasts all others, history has been retelling the Trojan War for thousands of years.','The real victor of the Trojan War was history itself — it kept the story alive long after both sides were gone.'],hint:'Think: calling history directly the victor — it IS the true winner, the one that outlasts and preserves everything'},
{type:'metaphor',word:'victor',q:'Which sentence is a metaphor using VICTOR?',a:'Every victor carries the echo of the defeated — a triumph without that weight is hollow at the center.',ch:['Every victor carries the echo of the defeated — a triumph without that weight is hollow at the center.','Every victor should remember the defeated — a triumph that ignores the cost is hollow.','Like an echo carried forward, the memory of the defeated follows every victor.','A victor that forgets the defeated is like a triumph hollow at its center — missing the weight that gives it meaning.'],hint:'Think: calling what the victor carries an echo — it IS the sound that follows every win, the presence of the defeated'},
{type:'metaphor',word:'victor',q:'Which sentence is a metaphor using VICTOR?',a:'The real victor in any struggle is the one still learning after the battle ends — the one who takes more from the fight than the prize.',ch:['The real victor in any struggle is the one still learning after the battle ends — the one who takes more from the fight than the prize.','The real victor is not the one who wins but the one who learns more from the fight than the prize could ever teach.','Like a victor who carries more than the trophy, the true winner is the one who learns from the struggle.','The one who keeps learning after winning is more of a victor than the one who only carries away the prize.'],hint:'Think: calling the learner directly the real victor — growth IS the victory, more than any trophy or prize'},
{type:'metaphor',word:'woe',q:'Which sentence is a metaphor using WOE?',a:'Troy\'s woe was a city-shaped wound — it bled not blood but people, culture, and memory, until nothing was left to carry the name.',ch:['Troy\'s woe was a city-shaped wound — it bled not blood but people, culture, and memory, until nothing was left to carry the name.','Troy\'s woe was as deep as a wound — it bled out everything that had made the city what it was.','Like a wound that bleeds out people and culture, Troy\'s woe left nothing standing to carry its name forward.','The woe of Troy was as deep as a wound — it drained the city of everything until only the name remained.'],hint:'Think: calling Troy\'s woe directly a wound — it IS the injury, and everything lost IS what the wound bled away'},

var queue=[],qIdx=0,score=0,streak=0,typeTally={},answered=false;
var fcIdx=0,fcOrder=[],fcFlipped=false;

function renderCard(){
  fcFlipped=false;
  document.getElementById('card-inner').classList.remove('flipped');
  var w=WORDS[fcOrder[fcIdx]];
  document.getElementById('fc-progress').textContent=(fcIdx+1)+' / '+WORDS.length;
  var front=document.getElementById('card-front');
  clearEl(front);
  front.appendChild(mk('div','card-word',w.word));
  front.appendChild(mk('div','card-pos',w.pos));
  front.appendChild(mk('div','card-tap','Tap to reveal'));
  var back=document.getElementById('card-back');
  clearEl(back);
  back.appendChild(mk('div','card-def',w.def));
  back.appendChild(mk('div','card-ex',w.ex));
}
function initFlashcards(){
  fcOrder=[];for(var i=0;i<WORDS.length;i++)fcOrder.push(i);
  fcIdx=0;renderCard();
}
document.getElementById('card-inner').addEventListener('click',function(){
  fcFlipped=!fcFlipped;this.classList.toggle('flipped',fcFlipped);
});
document.getElementById('fc-flip').addEventListener('click',function(){
  fcFlipped=!fcFlipped;document.getElementById('card-inner').classList.toggle('flipped',fcFlipped);
});
document.getElementById('fc-prev').addEventListener('click',function(){fcIdx=(fcIdx-1+WORDS.length)%WORDS.length;renderCard();});
document.getElementById('fc-next').addEventListener('click',function(){fcIdx=(fcIdx+1)%WORDS.length;renderCard();});
document.getElementById('fc-shuffle').addEventListener('click',function(){fcOrder=shuffle(fcOrder);fcIdx=0;renderCard();});

function startQuiz(){
  queue=shuffle(QUESTIONS).slice(0,20);
  qIdx=0;score=0;streak=0;typeTally={};answered=false;
  document.getElementById('result-section').style.display='none';
  document.getElementById('quiz-section').style.display='';
  showQuestion();
}
function showQuestion(){
  answered=false;
  var q=queue[qIdx];
  var ts=TYPE_STYLES[q.type]||{label:q.type.toUpperCase(),color:'#94a3b8',bg:'rgba(51,65,85,.4)'};
  document.getElementById('q-counter').textContent='Question '+(qIdx+1)+' of '+queue.length;
  document.getElementById('q-score').textContent='Score: '+score;
  document.getElementById('streak-badge').textContent='🔥 '+streak+' streak';
  document.getElementById('progress-fill').style.width=((qIdx/queue.length)*100)+'%';
  var bw=document.getElementById('type-badge-wrap');
  clearEl(bw);
  var badge=mk('span','type-badge',ts.label);
  badge.style.color=ts.color;badge.style.background=ts.bg;
  bw.appendChild(badge);
  document.getElementById('q-word').textContent=q.word.toUpperCase();
  document.getElementById('q-text').textContent=q.q;
  var hb=document.getElementById('hint-box');
  hb.style.display='none';hb.textContent=q.hint;
  var cc=document.getElementById('choices');
  clearEl(cc);
  shuffle(q.ch).forEach(function(opt){
    var btn=mk('button','choice-btn',opt);
    btn.addEventListener('click',function(){selectAnswer(this,opt,q);});
    cc.appendChild(btn);
  });
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';
  document.getElementById('next-btn').style.display='none';
}
document.getElementById('hint-btn').addEventListener('click',function(){
  var hb=document.getElementById('hint-box');
  hb.style.display=hb.style.display==='none'?'block':'none';
});
function selectAnswer(btn,opt,q){
  if(answered)return;
  answered=true;
  var correct=opt===q.a;
  var rect=btn.getBoundingClientRect();
  var cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
  var fb=document.getElementById('feedback');
  if(correct){
    btn.classList.add('correct');score++;streak++;
    fb.textContent='Correct! ✓';fb.className='feedback ok';
    spawnBurst(cx,cy,'#4ade80',18);
    if(streak>=3)spawnConfetti();
  } else {
    btn.classList.add('wrong');streak=0;
    fb.textContent='Incorrect. The answer is: '+q.a;fb.className='feedback no';
    spawnBurst(cx,cy,'#fbbf24',12);
    document.getElementById('choices').querySelectorAll('.choice-btn').forEach(function(b){if(b.textContent===q.a)b.classList.add('correct');});
  }
  typeTally[q.type]=typeTally[q.type]||{c:0,t:0};
  typeTally[q.type].t++;if(correct)typeTally[q.type].c++;
  document.querySelectorAll('.choice-btn').forEach(function(b){b.disabled=true;});
  document.getElementById('next-btn').style.display='block';
}
document.getElementById('next-btn').addEventListener('click',function(){
  qIdx++;if(qIdx>=queue.length){showResult();}else{showQuestion();}
});
function showResult(){
  document.getElementById('quiz-section').style.display='none';
  document.getElementById('result-section').style.display='block';
  document.getElementById('result-score').textContent=score;
  var pct=score/queue.length;
  var msgs=[
    'Like the Greeks, your cunning and persistence proved victorious. Perfect score!',
    'Outstanding! You\'d have detected the Trojan Horse from a mile away.',
    'Strong work — you persevered through every question without a blunder.',
    'Good effort — keep going and no adversary in vocabulary will hold you back.',
    'Every blunder is a teacher. Study the words and return to the siege stronger.'
  ];
  document.getElementById('result-msg').textContent=pct===1?msgs[0]:pct>=.85?msgs[1]:pct>=.7?msgs[2]:pct>=.5?msgs[3]:msgs[4];
  var bd=document.getElementById('result-breakdown');
  clearEl(bd);
  Object.keys(typeTally).forEach(function(k){
    var d=typeTally[k];
    var item=mk('div','rb-item');
    var lbl=mk('span',null,(TYPE_STYLES[k]||{label:k}).label+': ');
    var val=mk('span',null,d.c+'/'+d.t);
    item.appendChild(lbl);item.appendChild(val);
    bd.appendChild(item);
  });
  document.getElementById('progress-fill').style.width='100%';
}
document.getElementById('restart-btn').addEventListener('click',startQuiz);

document.getElementById('btn-quiz').addEventListener('click',function(){
  this.classList.add('active');document.getElementById('btn-flash').classList.remove('active');
  document.getElementById('flashcard-section').style.display='none';
  document.getElementById('quiz-section').style.display='';
  document.getElementById('result-section').style.display='none';
});
document.getElementById('btn-flash').addEventListener('click',function(){
  this.classList.add('active');document.getElementById('btn-quiz').classList.remove('active');
  document.getElementById('quiz-section').style.display='none';
  document.getElementById('result-section').style.display='none';
  document.getElementById('flashcard-section').style.display='';
  initFlashcards();
});

initFlashcards();
startQuiz();
</script>
</body>
