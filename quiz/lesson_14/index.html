<script>
(function(){
  var c=document.getElementById('bg'),ctx=c.getContext('2d'),stars=[];
  function resize(){c.width=innerWidth;c.height=innerHeight;}
  resize();window.addEventListener('resize',resize);
  for(var i=0;i<220;i++)stars.push({x:Math.random(),y:Math.random(),r:Math.random()*1.5+.3,s:Math.random()*.4+.1});
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    var g=ctx.createRadialGradient(c.width/2,c.height/2,0,c.width/2,c.height/2,c.width*.7);
    g.addColorStop(0,'#0c2a4a');g.addColorStop(.5,'#061428');g.addColorStop(1,'#020710');
    ctx.fillStyle=g;ctx.fillRect(0,0,c.width,c.height);
    var t=Date.now()/1000;
    stars.forEach(function(s){
      var op=.3+.4*Math.abs(Math.sin(t*s.s+s.x*10));
      ctx.beginPath();ctx.arc(s.x*c.width,s.y*c.height,s.r,0,Math.PI*2);
      ctx.fillStyle='rgba(34,211,238,'+op+')';ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

var pc=document.getElementById('pcanvas'),pctx=pc.getContext('2d'),particles=[];
pc.width=innerWidth;pc.height=innerHeight;
window.addEventListener('resize',function(){pc.width=innerWidth;pc.height=innerHeight;});
function spawnBurst(x,y,color,n){
  for(var i=0;i<n;i++){
    var ang=Math.random()*Math.PI*2,spd=Math.random()*5+2;
    particles.push({x:x,y:y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:1,color:color,r:Math.random()*4+2});
  }
}
function spawnConfetti(){
  var colors=['#22d3ee','#06b6d4','#67e8f9','#4ade80','#818cf8','#f0abfc'];
  for(var i=0;i<60;i++){
    particles.push({x:Math.random()*pc.width,y:-10,vx:(Math.random()-.5)*4,vy:Math.random()*4+2,
      life:1,color:colors[Math.floor(Math.random()*colors.length)],r:Math.random()*5+3,confetti:true});
  }
}
(function ploop(){
  pctx.clearRect(0,0,pc.width,pc.height);
  particles=particles.filter(function(p){return p.life>0;});
  particles.forEach(function(p){
    p.x+=p.vx;p.y+=p.vy;p.life-=p.confetti?.012:.03;
    if(p.confetti)p.vy+=.1;
    pctx.globalAlpha=Math.max(0,p.life);
    pctx.fillStyle=p.color;pctx.beginPath();
    pctx.arc(p.x,p.y,p.r,0,Math.PI*2);pctx.fill();
  });
  pctx.globalAlpha=1;
  requestAnimationFrame(ploop);
})();

function clearEl(el){while(el.firstChild)el.removeChild(el.firstChild);}
function mk(tag,cls,txt){var el=document.createElement(tag);if(cls)el.className=cls;if(txt!==undefined)el.textContent=txt;return el;}
function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}

{type:'simile',word:'benevolent',q:'Complete the simile: The king\'s benevolent rule was like ___',a:'rain on a dry field — coming without being asked, giving without expecting return',ch:['rain on a dry field — coming without being asked, giving without expecting return','a drought that arrives precisely when the harvest is ready','a storm that destroys the crops it pretended to nourish','a frost that settles on the field the night before the planting'],hint:'Think: benevolence is freely given, without expectation — like rain that comes because it comes, not because anyone asked'},
{type:'simile',word:'benevolent',q:'Complete the simile: His smile was as benevolent as ___',a:'a teacher who waits for the slowest student — not impatiently, but with the certainty that understanding will come',ch:['a teacher who waits for the slowest student — not impatiently, but with the certainty that understanding will come','a teacher who moves on when the first hand goes up and never looks back','a teacher who grades on a curve that always benefits everyone but teaches nothing','a teacher who decides the class is ready before the class has decided it is'],hint:'Think: benevolent patience = waiting with genuine goodwill, not performing it — like a teacher whose wait is an act of faith'},
{type:'simile',word:'consent',q:'Complete the simile: Her consent was given like ___',a:'a key placed freely in your hand — offered, not surrendered',ch:['a key placed freely in your hand — offered, not surrendered','a key hidden in a locked room that you must find before you can use it','a door that will only open if you knock in exactly the right way','a lock changed without warning so that no key you have will fit'],hint:'Think: consent freely given = offering the key, not giving up the lock — it is still yours to take back'},
{type:'simile',word:'consent',q:'Complete the simile: Without his consent, the plan felt as unstable as ___',a:'a bridge built over a river that hasn\'t yet agreed to be crossed',ch:['a bridge built over a river that hasn\'t yet agreed to be crossed','a bridge with pylons sunk deep and checked twice before the first plank was laid','a river road traveled by thousands who have agreed on every condition','a path that has been mapped, measured, and confirmed by everyone who will use it'],hint:'Think: acting without consent = building over conditions that haven\'t agreed to hold you'},
{type:'simile',word:'discreet',q:'Complete the simile: The ambassador was as discreet as ___',a:'a shadow that follows without touching anything',ch:['a shadow that follows without touching anything','a spotlight that seeks out the most private corners of a room','a drumbeat that announces itself before entering every conversation','a signal fire built on the highest hill so that everyone for miles can see it'],hint:'Think: discreet = present but leaving no trace — like a shadow, always there but never disturbing anything'},
{type:'simile',word:'discreet',q:'Complete the simile: She kept the secret as discreetly as ___',a:'a river holds the stone it has smoothed for a thousand years — without mentioning it to the banks',ch:['a river holds the stone it has smoothed for a thousand years — without mentioning it to the banks','a river that floods its banks in spring and tells every field what it has carried','a stream that deposits its silt visibly at the mouth and leaves nothing to the imagination','a current that announces its direction to every obstacle it passes'],hint:'Think: discreet = carrying something privately, never making it the subject — like a river that smoothed the stone and never once mentioned the stone'},
{type:'simile',word:'engross',q:'Complete the simile: The story engrossed her like ___',a:'a tide pulling her out from shore — not violent, but insistent, and the shore kept getting farther',ch:['a tide pulling her out from shore — not violent, but insistent, and the shore kept getting farther','a gentle wave that washes over your feet and immediately retreats','a tide that recedes before you\'ve finished noticing it has arrived','a calm lake that holds your reflection but requires nothing of you'],hint:'Think: complete engrossment = being drawn out past the point of return — like a tide that is not asking permission'},
{type:'simile',word:'engross',q:'Complete the simile: The puzzle engrossed him like ___',a:'a locked room he had agreed to stay in — not trapped, but unwilling to leave until he understood the door',ch:['a locked room he had agreed to stay in — not trapped, but unwilling to leave until he understood the door','a room so large and empty that he quickly grew bored and looked for the exit','a corridor that had no doors at all — easy to enter and easier to leave','a room with a wide-open window and a view that required nothing of him'],hint:'Think: being engrossed = choosing to stay inside a problem until you solve it — like a locked room you agreed to be in'},
{type:'simile',word:'esteem',q:'Complete the simile: The esteem the court held for Marco Polo was like ___',a:'a lantern carried ahead of someone on a dark road — lighting the path before they arrive',ch:['a lantern carried ahead of someone on a dark road — lighting the path before they arrive','a torch left at the crossroads so that anyone who needs it can take it and go','a lamp turned low because the person holding it doesn\'t want to be noticed','a candle put out the moment the traveler comes close to seeing its light'],hint:'Think: esteem leads reputation — it lights the path before the person walks it, the way a lantern clears the dark'},
{type:'simile',word:'esteem',q:'Complete the simile: He was held in as much esteem as ___',a:'the first light of dawn — not the brightest, but the one everything depends on to begin',ch:['the first light of dawn — not the brightest, but the one everything depends on to begin','a streetlamp in a city full of streetlamps — present, useful, indistinguishable from the rest','the last light before dark — welcomed, but only because nothing else is left','a lamp turned on by accident that nobody bothered to turn off'],hint:'Think: esteem is foundational — like dawn, the first light that makes all the other lights possible'},
{type:'simile',word:'exaggerate',q:'Complete the simile: His story grew like ___',a:'a fish tale told to a larger audience each time — the fish gaining a foot with every telling',ch:['a fish tale told to a larger audience each time — the fish gaining a foot with every telling','a story faithfully retold to match what actually happened, no matter how many times it was told','a memory that stays precisely the same shape regardless of how long it has been stored','a record that documents events exactly as they occurred'],hint:'Think: to exaggerate = to let the story grow in size with each retelling — like a fish that gains a foot every time someone asks how big it was'},
{type:'simile',word:'exaggerate',q:'Complete the simile: The traveler\'s account was as exaggerated as ___',a:'a map drawn by someone who had only heard the geography described and never walked it',ch:['a map drawn by someone who had only heard the geography described and never walked it','a survey completed by a careful cartographer who checked every measurement twice','a chart drawn from satellite images and confirmed by the people who walked the ground','a map revised after every new expedition to correct whatever the last version got wrong'],hint:'Think: exaggeration = imagining without verifying, drawing from hearsay — like a map made entirely from secondhand description'},
{type:'simile',word:'extensive',q:'Complete the simile: His travels were as extensive as ___',a:'the silence after a long sentence — not brief, not passing, but filling every available space',ch:['the silence after a long sentence — not brief, not passing, but filling every available space','the pause between two words in a conversation that will pick up immediately','the gap between footsteps that closes before it is fully noticed','the space between heartbeats — short, regular, never quite long enough to measure'],hint:'Think: extensive = filling every space — like a silence that doesn\'t end, but occupies the whole of everything that follows'},
{type:'simile',word:'extensive',q:'Complete the simile: The Silk Road was as extensive as ___',a:'a sentence whose subject is in one country and whose period is in another',ch:['a sentence whose subject is in one country and whose period is in another','a word that begins and ends in the same place it started, going nowhere outside itself','a paragraph contained entirely within one chapter of a book written in a single room','a single syllable spoken and finished before the listener can move'],hint:'Think: extensive = crossing so much distance that beginning and end are in different worlds — like a sentence whose grammar spans continents'},
{type:'simile',word:'fantastic',q:'Complete the simile: The riches of Kublai Khan\'s palace were as fantastic as ___',a:'a dream recounted so vividly that the listener doubts whether the teller ever woke up',ch:['a dream recounted so vividly that the listener doubts whether the teller ever woke up','a perfectly ordinary day described plainly to someone who experienced the same one','a familiar story told the same way it has always been told, with nothing added','a report read from notes taken at the time, with no elaboration and no color'],hint:'Think: fantastic = so extraordinary that describing it makes you sound like you\'re still asleep — like a dream told so fully that waking seems in question'},
{type:'simile',word:'fantastic',q:'Complete the simile: The city described in his journal was as fantastic as ___',a:'a building no architect had been asked to design — it had grown out of a desire that nobody planned',ch:['a building no architect had been asked to design — it had grown out of a desire that nobody planned','a building drawn to specification and constructed to code, with no feature unaccounted for','a structure reviewed by the city before the first stone was laid, exactly as imagined','a design produced from a standard template and replicated in a dozen other cities'],hint:'Think: fantastic = emerging from imagination without being planned — like a building nobody commissioned that grew from sheer wanting'},
{type:'simile',word:'intrigue',q:'Complete the simile: The East intrigued Marco Polo like ___',a:'a door heard through a wall — not yet open, not yet seen, but unmistakably there',ch:['a door heard through a wall — not yet open, not yet seen, but unmistakably there','a door so clearly labeled that he knew exactly what was behind it before he arrived','a door that he had already opened many times and found no surprises on the other side','a door wide open with a sign listing everything that could be seen through it'],hint:'Think: intrigue = the irresistible pull of what is sensed but not yet known — like a door heard but not yet seen'},
{type:'simile',word:'intrigue',q:'Complete the simile: The locked chest intrigued her like ___',a:'a question asked in a language you almost understand — meaning close enough to touch but not yet held',ch:['a question asked in a language you almost understand — meaning close enough to touch but not yet held','a question asked clearly in your own language with an obvious answer','a statement made so plainly that it required no interpretation at all','a message already translated and read, with nothing left to puzzle over'],hint:'Think: intrigue = the frustration and fascination of almost-understanding — like language that is just beyond your grasp'},
{type:'simile',word:'marvel',q:'Complete the simile: The Great Wall rose out of the landscape like ___',a:'an argument the mountain had been making for a thousand years — and suddenly you could read it',ch:['an argument the mountain had been making for a thousand years — and suddenly you could read it','a feature the geographers had accurately placed on every map for centuries','a road that went exactly where any traveler would have predicted','a path worn by ordinary use into a shape that surprised no one'],hint:'Think: a marvel like the Great Wall = the landscape making an argument that suddenly becomes legible — ancient, deliberate, suddenly comprehensible'},
{type:'simile',word:'marvel',q:'Complete the simile: The city of Xanadu was a marvel like ___',a:'a story told so well it creates the country it describes',ch:['a story told so well it creates the country it describes','a history book that documents facts without embellishment or imagination','a report that matches the reality so closely that no description adds anything','a record that is useful precisely because it is as plain as the event itself'],hint:'Think: a marvel = something that brings into existence what it seems to only describe — like a story that doesn\'t report a world but makes it'},
{type:'simile',word:'mission',q:'Complete the simile: His mission carried him across Asia like ___',a:'a current that had no interest in his preferences — it was going where it was going',ch:['a current that had no interest in his preferences — it was going where it was going','a gentle breeze that changed direction every time he asked it to','a tide he could stop by raising his hand when he found a pleasant bay','a river he had the option of swimming against at any point he chose'],hint:'Think: being on a mission = being carried forward by something that doesn\'t negotiate with you — like a current that is not asking where you\'d prefer to end up'},
{type:'simile',word:'mission',q:'Complete the simile: She pursued her mission like ___',a:'a navigator who has burned the return map — not reckless, but committed past the point of reconsidering',ch:['a navigator who has burned the return map — not reckless, but committed past the point of reconsidering','a traveler who keeps one eye on the horizon and the other on the road home','a sailor who plans every voyage with a clear route back built into the departure','a hiker who memorizes the trail in reverse before taking the first step forward'],hint:'Think: total mission commitment = choosing not to keep the return option — like burning the map home'},
{type:'simile',word:'opportunity',q:'Complete the simile: The open trade routes were an opportunity like ___',a:'a door in a wall no one had ever looked for — once seen, impossible to explain how you\'d missed it',ch:['a door in a wall no one had ever looked for — once seen, impossible to explain how you\'d missed it','a wall so solid and well-maintained that no opening had ever existed or been imagined','a door everyone knew about but agreed not to use because the room behind it seemed ordinary','a gate that required a fee and a waiting period and a set of credentials already in use'],hint:'Think: a great opportunity = something that was always there and becomes obvious the moment someone sees it — like a door in a wall'},
{type:'simile',word:'opportunity',q:'Complete the simile: He recognized the opportunity like ___',a:'a hunter who sees the gap before the animal does — still, already decided, before the moment has fully arrived',ch:['a hunter who sees the gap before the animal does — still, already decided, before the moment has fully arrived','a hunter who waits for the moment to announce itself before deciding whether to act','a tracker who moves only when conditions are perfect and otherwise holds back indefinitely','a watcher who identifies every opportunity as interesting and acts on none of them'],hint:'Think: recognizing opportunity = seeing the gap before it fully opens — like a hunter who is already committed before the animal completes its move'},
{type:'simile',word:'relinquish',q:'Complete the simile: He relinquished his post at the Chinese court like ___',a:'a sailor leaving a harbor that has been home long enough to feel like the sea — not without grief, but without hesitation',ch:['a sailor leaving a harbor that has been home long enough to feel like the sea — not without grief, but without hesitation','a sailor who refuses to leave the dock because the harbor is all he knows','a traveler who unpacks all his bags and declares the first port the final destination','a navigator who has forgotten that the purpose of the harbor was never to stay'],hint:'Think: relinquishing something truly valued = leaving with both grief and certainty — like a sailor who loved the harbor but knew the sea was still the point'},
{type:'simile',word:'relinquish',q:'Complete the simile: She relinquished control like ___',a:'a rope handed off mid-climb — carefully, to someone capable, before the weight became too much',ch:['a rope handed off mid-climb — carefully, to someone capable, before the weight became too much','a rope dropped carelessly because she decided the climb was not worth finishing','a grip released without checking whether anyone was there to take the weight','a rope abandoned mid-cliff with no consideration for what it was holding up'],hint:'Think: relinquishing something with care = passing it deliberately to capable hands — like a rope transfer on a difficult climb'},
{type:'simile',word:'tyrant',q:'Complete the simile: His rule was as oppressive as ___',a:'a ceiling built lower every year until standing upright became a memory',ch:['a ceiling built lower every year until standing upright became a memory','a ceiling raised high enough that everyone could stand with room to spare','a room with no walls and a sky for a ceiling and a horizon for a floor','a building with no roof, open to every weather, but never closed'],hint:'Think: tyranny = the gradual lowering of possibility — like a ceiling that makes you smaller every year without moving itself'},
{type:'simile',word:'tyrant',q:'Complete the simile: The tyrant\'s commands rang out like ___',a:'a bell rung in an empty room — loud, certain of itself, hearing nothing back',ch:['a bell rung in an empty room — loud, certain of itself, hearing nothing back','a bell rung and answered by every other bell in the city in glad recognition','a chime that invites a response and waits with genuine interest for one to arrive','a note played at the start of a conversation, offering a tone for the other person to match'],hint:'Think: a tyrant speaks but doesn\'t listen — like a bell rung in an empty room, certain of its own sound, needing no answer'},
{type:'simile',word:'vanquish',q:'Complete the simile: He vanquished his fear like ___',a:'a traveler who crosses a mountain pass — not by making the mountain smaller, but by walking until the other side is real',ch:['a traveler who crosses a mountain pass — not by making the mountain smaller, but by walking until the other side is real','a traveler who studies the mountain so carefully that he convinces himself it isn\'t there','an explorer who waits at the base until someone else confirms the pass is safe','a hiker who turns back every time the grade steepens and calls the mountain vanquished'],hint:'Think: vanquishing fear = not denying the obstacle, but crossing through it — like a pass that doesn\'t shrink, you just walk until it\'s behind you'},
{type:'simile',word:'vanquish',q:'Complete the simile: The travelers vanquished the desert\'s challenges like ___',a:'water wearing through stone — not once, not forcefully, but with the patience that knows it will get through',ch:['water wearing through stone — not once, not forcefully, but with the patience that knows it will get through','a hammer swung hard at the stone once, then put away when the stone didn\'t break','a crowd that pushes against the stone together and then disperses when it doesn\'t move','a current that hits the rock once and redirects around it permanently'],hint:'Think: vanquishing through persistence = like water and stone — not a single blow, but sustained presence that wins over time'},
{type:'simile',word:'esteem',q:'Complete the simile: The explorer\'s esteem among his peers was like ___',a:'a current the other boats navigated around — not chosen, just there, shaping everything',ch:['a current the other boats navigated around — not chosen, just there, shaping everything','a current invisible to all the boats except the one that created it','a ripple that fades before reaching the far shore','a wave that builds and breaks and is forgotten before the next tide'],hint:'Think: great esteem = a force that changes the behavior of everything around it without being asked — like a current'},
{type:'simile',word:'exaggerate',q:'Complete the simile: His account exaggerated the distances like ___',a:'a memory that keeps walking after the journey stops — adding miles to what was already a long road',ch:['a memory that keeps walking after the journey stops — adding miles to what was already a long road','a logbook updated daily with accurate mileage and nothing added in retrospect','a record that shrinks the journey slightly with each retelling to account for fatigue','a map that corrects its own exaggerations every time it is printed anew'],hint:'Think: exaggerating distances = a memory that extends the journey after it\'s over — the road grows when you stop walking it'},
{type:'simile',word:'mission',q:'Complete the simile: Her mission guided her the way ___',a:'a fixed star guides a sailor — it doesn\'t lead from the front, it only shows you which way is forward',ch:['a fixed star guides a sailor — it doesn\'t lead from the front, it only shows you which way is forward','a lighthouse guides a ship that has already decided to stay close to shore','a road sign tells a driver which exit to take before pointing toward the next sign','a guide who walks ahead and stops every few miles to check that you are still following'],hint:'Think: mission as guide = it doesn\'t walk with you, it orients you — like a star that shows direction without closing distance'},
{type:'simile',word:'opportunity',q:'Complete the simile: The Silk Road was an opportunity as rare as ___',a:'a clear mountain pass in winter — real, available, and absolutely not guaranteed to stay that way',ch:['a clear mountain pass in winter — real, available, and absolutely not guaranteed to stay that way','a mountain path that has been open every winter for a century and will be open again next year','a road that widens every decade and becomes easier to travel with every passing season','a route so well-established that missing it today simply means taking it tomorrow'],hint:'Think: a rare opportunity = present now, but not promised for later — like a winter pass that is open today and may be closed tomorrow'},
{type:'simile',word:'vanquish',q:'Complete the simile: To vanquish your doubt is like ___',a:'lighting a room that has been dark so long the darkness had stopped seeming like a problem — suddenly you see everything that was there all along',ch:['lighting a room that has been dark so long the darkness had stopped seeming like a problem — suddenly you see everything that was there all along','turning on a light in a room you never doubted was empty — confirming what you already knew','letting your eyes adjust to the dark until the darkness itself becomes familiar','deciding the darkness is comfortable and choosing to stay in it rather than looking for the switch'],hint:'Think: vanquishing doubt = illuminating what was always there — like light that doesn\'t create the room, it just makes it visible'},

{type:'metaphor',word:'benevolent',q:'Which sentence is a metaphor using BENEVOLENT?',a:'Kublai Khan\'s benevolent reign was a harvest — it fed not just the body but the sense that life was supposed to be worth living.',ch:['Kublai Khan\'s benevolent reign was a harvest — it fed not just the body but the sense that life was supposed to be worth living.','Kublai Khan\'s reign was as benevolent as a harvest — it provided for everyone under it.','Like a harvest that feeds everyone, his benevolent reign was generous in ways that sustained the whole kingdom.','His reign was benevolent in the way a harvest is — it came at the right time and gave what was needed.'],hint:'Think: calling the benevolent reign directly a harvest — it IS the nourishment, not just something that provides it'},
{type:'metaphor',word:'benevolent',q:'Which sentence is a metaphor using BENEVOLENT?',a:'Benevolence is not a gift — it is a structure, and the people who live inside it rarely see the beams.',ch:['Benevolence is not a gift — it is a structure, and the people who live inside it rarely see the beams.','Benevolence is like a structure — it holds people up even when they don\'t notice it.','Like a structure whose beams go unseen, benevolence supports those within it invisibly.','Benevolence functions like a structure — essential, invisible once you\'re inside it.'],hint:'Think: calling benevolence directly a structure — it IS the architecture, and those inside live by it without seeing it'},
{type:'metaphor',word:'consent',q:'Which sentence is a metaphor using CONSENT?',a:'Consent is not a door you pass through once — it is a road you travel together, and either traveler can stop.',ch:['Consent is not a door you pass through once — it is a road you travel together, and either traveler can stop.','Consent is like a door — once you pass through, both parties are in the same room.','Like a road you agree to travel together, consent is an ongoing commitment that either person can step off.','Consent works the way a shared road does — both travelers move along it together.'],hint:'Think: calling consent directly a road — it IS the ongoing journey, not a one-time threshold'},
{type:'metaphor',word:'consent',q:'Which sentence is a metaphor using CONSENT?',a:'Without consent, the plan was a building with no foundation — impressive in design, certain to fall.',ch:['Without consent, the plan was a building with no foundation — impressive in design, certain to fall.','Without consent, the plan was like a building without a foundation — it looked good but wouldn\'t stand.','Like a building with no foundation, the plan without consent was guaranteed to collapse.','The plan without consent resembled a building with no foundation — the design was good but the base was missing.'],hint:'Think: calling the plan directly a building without foundation — it IS the unstable structure, consent IS what makes it stand'},
{type:'metaphor',word:'discreet',q:'Which sentence is a metaphor using DISCREET?',a:'A discreet person is the librarian of other people\'s secrets — catalogued, protected, and never read aloud.',ch:['A discreet person is the librarian of other people\'s secrets — catalogued, protected, and never read aloud.','A discreet person is like a librarian — they keep information organized and don\'t share it.','Like a librarian who keeps the catalog private, a discreet person stores what they know without sharing it.','A discreet person functions the way a librarian does — holding information without broadcasting it.'],hint:'Think: calling the discreet person directly a librarian — they ARE the keeper, and secrets ARE the collection never shared'},
{type:'metaphor',word:'discreet',q:'Which sentence is a metaphor using DISCREET?',a:'Discretion is not silence — it is the knowledge of which words, in whose ears, and never the rest.',ch:['Discretion is not silence — it is the knowledge of which words, in whose ears, and never the rest.','Discretion is like silence — it means holding back what doesn\'t need to be said.','Like silence that knows when to end, discretion is the judgment of when words are safe.','Discretion works the way silence does — it keeps what shouldn\'t be heard from being heard.'],hint:'Think: calling discretion directly a form of knowledge — it IS the understanding of audience and timing, not just the absence of speech'},
{type:'metaphor',word:'engross',q:'Which sentence is a metaphor using ENGROSS?',a:'The manuscript was a gravity well — it engrossed every scholar who came close enough and held them until they finished or forgot the world.',ch:['The manuscript was a gravity well — it engrossed every scholar who came close enough and held them until they finished or forgot the world.','The manuscript was as engrossing as a gravity well — scholars who studied it found it hard to put down.','Like a gravity well that holds everything close, the manuscript engrossed every scholar who came near it.','The manuscript engrossed scholars the way a gravity well holds objects — pulling them in and not releasing them.'],hint:'Think: calling the manuscript directly a gravity well — it IS the force, and engrossment IS what happens to anyone who enters its range'},
{type:'metaphor',word:'engross',q:'Which sentence is a metaphor using ENGROSS?',a:'To be engrossed is to be translated — you are no longer in the room you entered but in the country the story describes.',ch:['To be engrossed is to be translated — you are no longer in the room you entered but in the country the story describes.','To be engrossed is like being translated — you\'ve been moved from your actual location to another.','Like a translation that moves meaning from one language to another, being engrossed moves you from your room into the story.','Being engrossed works the way translation does — you end up somewhere else without leaving the page.'],hint:'Think: calling engrossment directly translation — it IS the transport, and the reader IS the text that gets moved across the border'},
{type:'metaphor',word:'esteem',q:'Which sentence is a metaphor using ESTEEM?',a:'The esteem of the court was a currency Marco Polo spent carefully — once it ran out, the road home would cost more than he had.',ch:['The esteem of the court was a currency Marco Polo spent carefully — once it ran out, the road home would cost more than he had.','The esteem of the court was like a currency — spending it too quickly would leave him with nothing.','Like a currency that runs out if not carefully managed, the court\'s esteem required Marco Polo\'s careful spending.','The court\'s esteem functioned as a currency for Marco Polo — it could be earned, spent, and exhausted.'],hint:'Think: calling esteem directly a currency — it IS the capital, and losing it IS bankruptcy in a world where you cannot mint more'},
{type:'metaphor',word:'esteem',q:'Which sentence is a metaphor using ESTEEM?',a:'Self-esteem is not what you think of yourself — it is the bedrock you stand on when other people\'s opinions are water.',ch:['Self-esteem is not what you think of yourself — it is the bedrock you stand on when other people\'s opinions are water.','Self-esteem is like bedrock — it gives you a solid place to stand when opinions try to wash you away.','Like bedrock that holds firm when water rises, self-esteem keeps you grounded when criticism floods in.','Self-esteem functions the way bedrock does — it provides a foundation that survives the water of other people\'s views.'],hint:'Think: calling self-esteem directly bedrock — it IS the foundation, and opinions ARE the water that cannot erode what you stand on'},
{type:'metaphor',word:'exaggerate',q:'Which sentence is a metaphor using EXAGGERATE?',a:'His account of China was a cathedral — everything was correct in proportion, but the proportions had all been doubled.',ch:['His account of China was a cathedral — everything was correct in proportion, but the proportions had all been doubled.','His account of China was like a cathedral — grand and impressive, but scaled beyond what actually exists.','Like a cathedral that has expanded every real element to twice its size, his account preserved the truth while exaggerating its dimensions.','His account functioned like a cathedral — architecturally true, but built at a scale the original couldn\'t match.'],hint:'Think: calling his account directly a cathedral — it IS the monument, exact in structure but exaggerated in scale, true and untrue simultaneously'},
{type:'metaphor',word:'exaggerate',q:'Which sentence is a metaphor using EXAGGERATE?',a:'Every exaggeration is a confession — it tells you what the teller most wanted to be true.',ch:['Every exaggeration is a confession — it tells you what the teller most wanted to be true.','Every exaggeration is like a confession — it reveals the wishes behind the words.','Like a confession that reveals what someone hopes for, every exaggeration shows what the speaker most wished were real.','Every exaggeration functions as a confession — you can read desire in the gap between the story and the truth.'],hint:'Think: calling every exaggeration directly a confession — it IS the revelation, and desire IS what every inflated detail confesses to'},
{type:'metaphor',word:'extensive',q:'Which sentence is a metaphor using EXTENSIVE?',a:'His knowledge of the East was not a summary — it was an atlas, page after page, and each page had its own country.',ch:['His knowledge of the East was not a summary — it was an atlas, page after page, and each page had its own country.','His knowledge of the East was as extensive as an atlas — covering many regions in considerable depth.','Like an atlas with a page for each country, his extensive knowledge of the East covered territory after territory.','His extensive knowledge of the East was comparable to an atlas — comprehensive, covering every major area.'],hint:'Think: calling his knowledge directly an atlas — it IS the comprehensive record, and every page IS a country mapped inside his memory'},
{type:'metaphor',word:'extensive',q:'Which sentence is a metaphor using EXTENSIVE?',a:'The Silk Road was not a path — it was an argument the world was making with itself about what it could become.',ch:['The Silk Road was not a path — it was an argument the world was making with itself about what it could become.','The Silk Road was like an argument — it was a contested route, with many different interests along the way.','Like an argument the world was having, the Silk Road was the contested ground where different civilizations met.','The Silk Road functioned like an argument — it created disagreement and negotiation at every point along its length.'],hint:'Think: calling the Silk Road directly an argument — it IS the ongoing negotiation, and its extensiveness IS the scope of what the world was debating with itself'},
{type:'metaphor',word:'fantastic',q:'Which sentence is a metaphor using FANTASTIC?',a:'Marco Polo\'s Italy was a room he had outgrown — the fantastic world he brought home was too large for the walls to contain.',ch:['Marco Polo\'s Italy was a room he had outgrown — the fantastic world he brought home was too large for the walls to contain.','Marco Polo\'s Italy felt too small for the fantastic world he had seen, like a room he had outgrown.','Like a room too small for the fantastic world inside him, Italy seemed confined after everything Marco Polo had witnessed.','The fantastic world Marco Polo brought home made Italy feel like a room he had outgrown.'],hint:'Think: calling Italy directly a room he had outgrown — it IS the container, and the fantastic world he carried IS too large for its walls'},
{type:'metaphor',word:'fantastic',q:'Which sentence is a metaphor using FANTASTIC?',a:'The fantastic is not the impossible — it is the as-yet-unverified, and history keeps verifying it one discovery at a time.',ch:['The fantastic is not the impossible — it is the as-yet-unverified, and history keeps verifying it one discovery at a time.','The fantastic is like the impossible — it describes things that haven\'t been confirmed and may not be real.','Like the impossible that turns out to be real, the fantastic is what history has not yet checked.','The fantastic functions like the impossible — it describes the unverified things that might eventually turn out to be true.'],hint:'Think: calling the fantastic directly the as-yet-unverified — it IS provisional impossibility, and history IS the engine that converts it'},
{type:'metaphor',word:'intrigue',q:'Which sentence is a metaphor using INTRIGUE?',a:'The East was an intrigue Marco Polo had agreed to solve before he understood the question.',ch:['The East was an intrigue Marco Polo had agreed to solve before he understood the question.','The East intrigued Marco Polo before he could articulate what about it fascinated him.','Like an intrigue that must be solved before its terms are fully understood, the East captured Marco Polo\'s curiosity before he could name it.','The East held an intrigue for Marco Polo — it fascinated him at a level he couldn\'t yet explain.'],hint:'Think: calling the East directly an intrigue — it IS the mystery, and Marco Polo\'s entire journey IS the attempt to solve what he agreed to before knowing its terms'},
{type:'metaphor',word:'intrigue',q:'Which sentence is a metaphor using INTRIGUE?',a:'Curiosity is intrigue\'s engine — without it, even the most elaborate plot goes nowhere.',ch:['Curiosity is intrigue\'s engine — without it, even the most elaborate plot goes nowhere.','Curiosity is like intrigue\'s engine — it powers the interest that keeps a mystery moving.','Like an engine that drives intrigue forward, curiosity is what keeps a mystery alive.','Curiosity functions like intrigue\'s engine — the more curious you are, the more the intrigue moves.'],hint:'Think: calling curiosity directly intrigue\'s engine — it IS the motor, and without it even the most elaborate intrigue stalls'},
{type:'metaphor',word:'marvel',q:'Which sentence is a metaphor using MARVEL?',a:'The Forbidden City was not a place — it was a question architecture had asked and answered in one move.',ch:['The Forbidden City was not a place — it was a question architecture had asked and answered in one move.','The Forbidden City was as marvelous as a question answered in one move — complete and awe-inspiring.','Like a question that answers itself by being posed, the Forbidden City was a marvel that explained its own existence.','The Forbidden City was a marvel — architecture had asked and answered the question of what grandeur could look like.'],hint:'Think: calling the city directly a question answered — it IS the architectural argument, and the answer IS the thing itself: both sides of the equation in one structure'},
{type:'metaphor',word:'marvel',q:'Which sentence is a metaphor using MARVEL?',a:'To marvel is to be briefly returned to the age before you knew how things worked — when everything was first and nothing was explained.',ch:['To marvel is to be briefly returned to the age before you knew how things worked — when everything was first and nothing was explained.','To marvel is like being returned to childhood — you experience things as if seeing them for the first time.','Like being briefly returned to the age before explanation, to marvel is to see things as if they were new and unknown.','To marvel functions like a return to childhood — the experience of newness comes back before understanding intervenes.'],hint:'Think: calling marveling directly a return — it IS the temporal transport, and the age before explanation IS the destination'},
{type:'metaphor',word:'mission',q:'Which sentence is a metaphor using MISSION?',a:'His mission was a compass — it didn\'t tell him the roads but made every crossroads answerable.',ch:['His mission was a compass — it didn\'t tell him the roads but made every crossroads answerable.','His mission was like a compass — it gave him direction even when the roads were unclear.','Like a compass that points north without naming the path, his mission gave him direction at every junction.','His mission functioned the way a compass does — not describing the road, but ensuring he always knew which way to face.'],hint:'Think: calling the mission directly a compass — it IS the orientation device, and crossroads ARE the moments it answers without showing the way'},
{type:'metaphor',word:'mission',q:'Which sentence is a metaphor using MISSION?',a:'Every mission is a debt — you take something from the world by going, and you owe the return of what you find.',ch:['Every mission is a debt — you take something from the world by going, and you owe the return of what you find.','Every mission is like a debt — you are obligated to bring back what you found.','Like a debt that requires repayment, every mission obliges the traveler to bring back what they discovered.','A mission functions like a debt — you go, and the world expects you to return with what you took.'],hint:'Think: calling every mission directly a debt — it IS the obligation, and the knowledge returned IS the repayment owed'},
{type:'metaphor',word:'opportunity',q:'Which sentence is a metaphor using OPPORTUNITY?',a:'The Silk Road was an opportunity — and like all opportunities, it belonged entirely to whoever was willing to walk it.',ch:['The Silk Road was an opportunity — and like all opportunities, it belonged entirely to whoever was willing to walk it.','The Silk Road was like an opportunity — it offered itself to everyone but rewarded only those who committed to it.','Like an opportunity that belongs to whoever accepts it, the Silk Road was open to all but given only to those who walked it.','The Silk Road functioned the way an opportunity does — present for everyone, claimed only by the ones who moved.'],hint:'Think: calling the Silk Road directly an opportunity — it IS the favorable condition, and ownership IS determined entirely by willingness to walk'},
{type:'metaphor',word:'opportunity',q:'Which sentence is a metaphor using OPPORTUNITY?',a:'An opportunity is not a door — it is a current, and the moment you decide to wait it has already moved on.',ch:['An opportunity is not a door — it is a current, and the moment you decide to wait it has already moved on.','An opportunity is like a current — it keeps moving, and you have to step in while it\'s passing.','Like a current that moves whether or not you step into it, an opportunity doesn\'t wait for hesitation.','An opportunity functions like a current — it is in motion, and missing your moment means the water has gone.'],hint:'Think: calling opportunity directly a current — it IS the moving thing, and hesitation IS what lets it pass you before you\'ve decided'},
{type:'metaphor',word:'relinquish',q:'Which sentence is a metaphor using RELINQUISH?',a:'To relinquish is to open a hand that has held so long it has forgotten what open feels like.',ch:['To relinquish is to open a hand that has held so long it has forgotten what open feels like.','To relinquish is like opening a hand that has held for too long — it requires effort and relearning.','Like opening a hand that has gripped until it forgot the sensation of release, to relinquish is to undo something practiced.','Relinquishing something long-held is like opening a hand that has forgotten the feeling of open.'],hint:'Think: calling relinquishing directly the act of opening a forgotten hand — it IS the unlearning, and the grip IS what has been mistaken for the natural state'},
{type:'metaphor',word:'relinquish',q:'Which sentence is a metaphor using RELINQUISH?',a:'What we relinquish is never lost — it becomes the current that carries the next person who needed it more.',ch:['What we relinquish is never lost — it becomes the current that carries the next person who needed it more.','What we relinquish doesn\'t disappear — it moves like a current to wherever it is most needed.','Like a current that carries what is released to where it is needed, what we relinquish flows to someone else.','What we relinquish is passed on like a current — moving from our hands to wherever it finds use.'],hint:'Think: calling relinquishment directly a current — the released thing IS the water, and the next person IS where it was always supposed to go'},
{type:'metaphor',word:'tyrant',q:'Which sentence is a metaphor using TYRANT?',a:'A tyrant is not a ruler — a tyrant is a mirror smashed so that everyone must see themselves only in his reflection.',ch:['A tyrant is not a ruler — a tyrant is a mirror smashed so that everyone must see themselves only in his reflection.','A tyrant is like a broken mirror — everyone sees themselves distorted through his power.','Like a mirror smashed so that all reflection is controlled, a tyrant removes the ability to see yourself independently.','A tyrant functions the way a broken mirror does — forcing a distorted view that serves only the one holding the pieces.'],hint:'Think: calling a tyrant directly a smashed mirror — it IS the destruction of independent self-perception, and everyone seeing only the tyrant\'s reflection IS the effect'},
{type:'metaphor',word:'tyrant',q:'Which sentence is a metaphor using TYRANT?',a:'Fear is the tyrant\'s only infrastructure — everything else is borrowed from the people he has forgotten are holding it up.',ch:['Fear is the tyrant\'s only infrastructure — everything else is borrowed from the people he has forgotten are holding it up.','"A tyrant\'s fear-based rule is like an infrastructure — it holds everything together but belongs entirely to others."','Like an infrastructure built entirely of fear, a tyrant\'s power rests on what others hold up for him.','A tyrant\'s rule functions like an infrastructure of fear — it supports the structure while the people underneath it do the actual work.'],hint:'Think: calling fear directly the tyrant\'s only infrastructure — it IS the system, and the people\'s compliance IS the load-bearing element he has forgotten about'},
{type:'metaphor',word:'vanquish',q:'Which sentence is a metaphor using VANQUISH?',a:'To vanquish your fear is not to destroy it — it is to discover that you are larger than it was.',ch:['To vanquish your fear is not to destroy it — it is to discover that you are larger than it was.','To vanquish fear is like discovering you are larger than it — the fear doesn\'t disappear, you just outgrow it.','Like discovering that you have grown larger than something that once seemed immense, vanquishing fear is a matter of comparison.','To vanquish fear works the way outgrowing something does — the fear stays the same size but you become bigger.'],hint:'Think: calling vanquishing directly a discovery — it IS the revelation that the fearful thing was always smaller than you were, and the vanquishing IS the recognition'},
{type:'metaphor',word:'vanquish',q:'Which sentence is a metaphor using VANQUISH?',a:'Every vanquished obstacle is a stair — you stand on what defeated you, and from there the next step is higher than the last.',ch:['Every vanquished obstacle is a stair — you stand on what defeated you, and from there the next step is higher than the last.','Every vanquished obstacle is like a stair — it raises you up by being overcome.','Like a stair built from what tried to stop you, every vanquished obstacle gives you higher ground than before.','A vanquished obstacle functions like a stair — you stand on it, and the elevation you gain is real.'],hint:'Think: calling every vanquished obstacle directly a stair — it IS the step, and standing on what defeated you IS how you reach the next level'},
{type:'metaphor',word:'mission',q:'Which sentence is a metaphor using MISSION?',a:'A mission is not a destination — it is the lens that decides which details of the journey are worth remembering.',ch:['A mission is not a destination — it is the lens that decides which details of the journey are worth remembering.','A mission is like a lens — it focuses your attention on the things that matter for the task.','Like a lens that filters what you see, a mission decides which parts of the journey are relevant.','A mission functions like a lens — it shapes what you notice and what falls out of focus.'],hint:'Think: calling a mission directly a lens — it IS the instrument of selective perception, and relevance IS what the lens determines'},
{type:'metaphor',word:'opportunity',q:'Which sentence is a metaphor using OPPORTUNITY?',a:'Marco Polo\'s first journey was not a trip — it was an opening in the world that only appeared once.',ch:['Marco Polo\'s first journey was not a trip — it was an opening in the world that only appeared once.','Marco Polo\'s first journey was like an opening in the world — a rare chance that came once and was taken.','Like an opening in the world that appears only once, Marco Polo\'s journey was an opportunity of a specific moment.','Marco Polo\'s journey was as rare as an opening in the world — present for a moment, and then gone.'],hint:'Think: calling the journey directly an opening — it IS the aperture in time, not just something that passed through one'},
{type:'metaphor',word:'intrigue',q:'Which sentence is a metaphor using INTRIGUE?',a:'The blank page of an unmapped continent is its own intrigue — it asks a question that only a traveler can answer.',ch:['The blank page of an unmapped continent is its own intrigue — it asks a question that only a traveler can answer.','An unmapped continent is intriguing like a blank page — it offers possibilities that the traveler gets to define.','Like an intrigue expressed in cartographic blank space, an unmapped continent asks the traveler what it contains.','An unmapped continent works like an intrigue — it presents the unknown as an invitation rather than a threat.'],hint:'Think: calling the blank map directly an intrigue — it IS the unanswered question, and the traveler IS the only one who can supply the answer'},
{type:'metaphor',word:'discreet',q:'Which sentence is a metaphor using DISCREET?',a:'A discreet messenger is not invisible — they are architecture: the thing everything else passes through without noticing the walls.',ch:['A discreet messenger is not invisible — they are architecture: the thing everything else passes through without noticing the walls.','A discreet messenger is like architecture — present and functional but rarely consciously noticed.','Like architecture that does its work without being seen, a discreet messenger carries what matters while remaining unnoticed.','A discreet messenger functions like architecture — providing structure that others pass through without stopping to examine.'],hint:'Think: calling the discreet messenger directly architecture — they ARE the structure, not the content, and discretion IS what makes the walls invisible'},
{type:'metaphor',word:'vanquish',q:'Which sentence is a metaphor using VANQUISH?',a:'The moment of vanquishing is always quieter than expected — it is less a battle won than a weight set down.',ch:['The moment of vanquishing is always quieter than expected — it is less a battle won than a weight set down.','The moment of vanquishing is like setting down a weight — less dramatic than the struggle suggested.','Like setting down a weight you have carried until you forgot its heaviness, vanquishing often arrives quietly.','Vanquishing something feels the way setting down a heavy burden does — not victorious, just suddenly lighter.'],hint:'Think: calling vanquishing directly a weight set down — the defeat IS the release, and victory IS the quiet that follows when you stop carrying the fight'}
];

var queue=[],qIdx=0,score=0,streak=0,typeTally={},answered=false;
var fcIdx=0,fcOrder=[],fcFlipped=false;

function renderCard(){
  fcFlipped=false;
  document.getElementById('card-inner').classList.remove('flipped');
  var w=WORDS[fcOrder[fcIdx]];
  document.getElementById('fc-progress').textContent=(fcIdx+1)+' / '+WORDS.length;
  var front=document.getElementById('card-front');
  clearEl(front);
  front.appendChild(mk('div','card-word',w.word));
  front.appendChild(mk('div','card-pos',w.pos));
  front.appendChild(mk('div','card-tap','Tap to reveal'));
  var back=document.getElementById('card-back');
  clearEl(back);
  back.appendChild(mk('div','card-def',w.def));
  back.appendChild(mk('div','card-ex',w.ex));
}
function initFlashcards(){
  fcOrder=[];for(var i=0;i<WORDS.length;i++)fcOrder.push(i);
  fcIdx=0;renderCard();
}
document.getElementById('card-inner').addEventListener('click',function(){
  fcFlipped=!fcFlipped;this.classList.toggle('flipped',fcFlipped);
});
document.getElementById('fc-flip').addEventListener('click',function(){
  fcFlipped=!fcFlipped;document.getElementById('card-inner').classList.toggle('flipped',fcFlipped);
});
document.getElementById('fc-prev').addEventListener('click',function(){fcIdx=(fcIdx-1+WORDS.length)%WORDS.length;renderCard();});
document.getElementById('fc-next').addEventListener('click',function(){fcIdx=(fcIdx+1)%WORDS.length;renderCard();});
document.getElementById('fc-shuffle').addEventListener('click',function(){fcOrder=shuffle(fcOrder);fcIdx=0;renderCard();});

function startQuiz(){
  queue=shuffle(QUESTIONS).slice(0,20);
  qIdx=0;score=0;streak=0;typeTally={};answered=false;
  document.getElementById('result-section').style.display='none';
  document.getElementById('quiz-section').style.display='';
  showQuestion();
}
function showQuestion(){
  answered=false;
  var q=queue[qIdx];
  var ts=TYPE_STYLES[q.type]||{label:q.type.toUpperCase(),color:'#94a3b8',bg:'rgba(51,65,85,.4)'};
  document.getElementById('q-counter').textContent='Question '+(qIdx+1)+' of '+queue.length;
  document.getElementById('q-score').textContent='Score: '+score;
  document.getElementById('streak-badge').textContent='🔥 '+streak+' streak';
  document.getElementById('progress-fill').style.width=((qIdx/queue.length)*100)+'%';
  var bw=document.getElementById('type-badge-wrap');
  clearEl(bw);
  var badge=mk('span','type-badge',ts.label);
  badge.style.color=ts.color;badge.style.background=ts.bg;
  bw.appendChild(badge);
  document.getElementById('q-word').textContent=q.word.toUpperCase();
  document.getElementById('q-text').textContent=q.q;
  var hb=document.getElementById('hint-box');
  hb.style.display='none';hb.textContent=q.hint;
  var cc=document.getElementById('choices');
  clearEl(cc);
  shuffle(q.ch).forEach(function(opt){
    var btn=mk('button','choice-btn',opt);
    btn.addEventListener('click',function(){selectAnswer(this,opt,q);});
    cc.appendChild(btn);
  });
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';
  document.getElementById('next-btn').style.display='none';
}
document.getElementById('hint-btn').addEventListener('click',function(){
  var hb=document.getElementById('hint-box');
  hb.style.display=hb.style.display==='none'?'block':'none';
});
function selectAnswer(btn,opt,q){
  if(answered)return;
  answered=true;
  var correct=opt===q.a;
  var rect=btn.getBoundingClientRect();
  var cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
  var fb=document.getElementById('feedback');
  if(correct){
    btn.classList.add('correct');score++;streak++;
    fb.textContent='Correct! ✓';fb.className='feedback ok';
    spawnBurst(cx,cy,'#4ade80',18);
    if(streak>=3)spawnConfetti();
  } else {
    btn.classList.add('wrong');streak=0;
    fb.textContent='Incorrect. The answer is: '+q.a;fb.className='feedback no';
    spawnBurst(cx,cy,'#22d3ee',12);
    document.getElementById('choices').querySelectorAll('.choice-btn').forEach(function(b){if(b.textContent===q.a)b.classList.add('correct');});
  }
  typeTally[q.type]=typeTally[q.type]||{c:0,t:0};
  typeTally[q.type].t++;if(correct)typeTally[q.type].c++;
  document.querySelectorAll('.choice-btn').forEach(function(b){b.disabled=true;});
  document.getElementById('next-btn').style.display='block';
}
document.getElementById('next-btn').addEventListener('click',function(){
  qIdx++;if(qIdx>=queue.length){showResult();}else{showQuestion();}
});
function showResult(){
  document.getElementById('quiz-section').style.display='none';
  document.getElementById('result-section').style.display='block';
  document.getElementById('result-score').textContent=score;
  var pct=score/queue.length;
  var msgs=[
    'Like Marco Polo returning from Cathay — you brought back every word and lost nothing on the road.',
    'Outstanding! Even Kublai Khan would esteem such a performance.',
    'Strong work — you vanquished most of the challenge. Keep going and the Silk Road will be yours.',
    'Good effort — every journey has its rigors. Study, consent to the difficulty, and return stronger.',
    'The road is long and the vocabulary is vast. Relinquish nothing — try again and claim the words.'
  ];
  document.getElementById('result-msg').textContent=pct===1?msgs[0]:pct>=.85?msgs[1]:pct>=.7?msgs[2]:pct>=.5?msgs[3]:msgs[4];
  var bd=document.getElementById('result-breakdown');
  clearEl(bd);
  Object.keys(typeTally).forEach(function(k){
    var d=typeTally[k];
    var item=mk('div','rb-item');
    var lbl=mk('span',null,(TYPE_STYLES[k]||{label:k}).label+': ');
    var val=mk('span',null,d.c+'/'+d.t);
    item.appendChild(lbl);item.appendChild(val);
    bd.appendChild(item);
  });
  document.getElementById('progress-fill').style.width='100%';
}
document.getElementById('restart-btn').addEventListener('click',startQuiz);

document.getElementById('btn-quiz').addEventListener('click',function(){
  this.classList.add('active');document.getElementById('btn-flash').classList.remove('active');
  document.getElementById('flashcard-section').style.display='none';
  document.getElementById('quiz-section').style.display='';
  document.getElementById('result-section').style.display='none';
});
document.getElementById('btn-flash').addEventListener('click',function(){
  this.classList.add('active');document.getElementById('btn-quiz').classList.remove('active');
  document.getElementById('quiz-section').style.display='none';
  document.getElementById('result-section').style.display='none';
  document.getElementById('flashcard-section').style.display='';
  initFlashcards();
});

startQuiz();
</script>
</body>
</html>
