<script>
(function(){
  var c=document.getElementById('bg'),ctx=c.getContext('2d'),stars=[];
  function resize(){c.width=innerWidth;c.height=innerHeight;}
  resize();window.addEventListener('resize',resize);
  for(var i=0;i<220;i++)stars.push({x:Math.random(),y:Math.random(),r:Math.random()*1.5+.3,s:Math.random()*.4+.1});
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    var g=ctx.createRadialGradient(c.width/2,c.height/2,0,c.width/2,c.height/2,c.width*.7);
    g.addColorStop(0,'#2d1200');g.addColorStop(.5,'#1a0800');g.addColorStop(1,'#070300');
    ctx.fillStyle=g;ctx.fillRect(0,0,c.width,c.height);
    var t=Date.now()/1000;
    stars.forEach(function(s){
      var op=.3+.4*Math.abs(Math.sin(t*s.s+s.x*10));
      ctx.beginPath();ctx.arc(s.x*c.width,s.y*c.height,s.r,0,Math.PI*2);
      ctx.fillStyle='rgba(251,146,60,'+op+')';ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

var pc=document.getElementById('pcanvas'),pctx=pc.getContext('2d'),particles=[];
pc.width=innerWidth;pc.height=innerHeight;
window.addEventListener('resize',function(){pc.width=innerWidth;pc.height=innerHeight;});
function spawnBurst(x,y,color,n){
  for(var i=0;i<n;i++){
    var ang=Math.random()*Math.PI*2,spd=Math.random()*5+2;
    particles.push({x:x,y:y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:1,color:color,r:Math.random()*4+2});
  }
}
function spawnConfetti(){
  var colors=['#fb923c','#f59e0b','#fbbf24','#4ade80','#60a5fa','#c084fc'];
  for(var i=0;i<60;i++){
    particles.push({x:Math.random()*pc.width,y:-10,vx:(Math.random()-.5)*4,vy:Math.random()*4+2,
      life:1,color:colors[Math.floor(Math.random()*colors.length)],r:Math.random()*5+3,confetti:true});
  }
}
(function ploop(){
  pctx.clearRect(0,0,pc.width,pc.height);
  particles=particles.filter(function(p){return p.life>0;});
  particles.forEach(function(p){
    p.x+=p.vx;p.y+=p.vy;p.life-=p.confetti?.012:.03;
    if(p.confetti)p.vy+=.1;
    pctx.globalAlpha=Math.max(0,p.life);
    pctx.fillStyle=p.color;pctx.beginPath();
    pctx.arc(p.x,p.y,p.r,0,Math.PI*2);pctx.fill();
  });
  pctx.globalAlpha=1;
  requestAnimationFrame(ploop);
})();

function clearEl(el){while(el.firstChild)el.removeChild(el.firstChild);}
function mk(tag,cls,txt){var el=document.createElement(tag);if(cls)el.className=cls;if(txt!==undefined)el.textContent=txt;return el;}
function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}

{type:'simile',word:'habitat',q:'Complete the simile: Removed from its habitat, the polar bear looked as lost as ___',a:'a fish placed on dry land — alive, but in entirely the wrong world',ch:['a fish placed on dry land — alive, but in entirely the wrong world','a fish returned to the ocean after a brief moment on the dock','an otter sliding back into the river it swam in all its life','a bird released from a cage into the forest where it was born'],hint:'Think: removed from habitat = technically surviving but completely out of place — like a fish on land'},
{type:'simile',word:'oblivious',q:'Complete the simile: The camel was as oblivious to the heat as ___',a:'a seasoned sailor is to the motion of a ship — it has become simply the background of existence',ch:['a seasoned sailor is to the motion of a ship — it has become simply the background of existence','a new sailor on their first voyage, constantly adjusting their stance','a passenger clutching the rail during a rough crossing','a visitor who notices every creak and roll throughout the entire trip'],hint:'Think: oblivious through adaptation = the discomfort has become invisible — like a sailor who no longer feels the ship move'},
{type:'simile',word:'oblivious',q:'Complete the simile: She sat oblivious to the noise around her like ___',a:'someone reading at the center of a storm — the chaos is real; she had simply decided not to live inside it',ch:['someone reading at the center of a storm — the chaos is real; she had simply decided not to live inside it','a person who keeps checking over their shoulder to see what new sound has arrived','someone who stops reading every time a new noise enters the room','a reader who closes the book at the first distraction and doesn\'t return to it'],hint:'Think: chosen obliviousness = the stimulus exists but you\'ve made it irrelevant — like reading through a storm'},
{type:'simile',word:'outmoded',q:'Complete the simile: The stagecoach felt as outmoded as ___',a:'a candle in a room full of electric lights — still technically functional, but no longer really the point',ch:['a candle in a room full of electric lights — still technically functional, but no longer really the point','a candle lit in a room where the power has gone out — suddenly the most essential thing in the building','a lamp that\'s been carefully maintained and still gives as much light as the day it was made','a light source chosen over electricity because it has a warmth that modern lights can\'t match'],hint:'Think: outmoded = replaced by something better but still technically works — like a candle in a room full of electric lights'},
{type:'simile',word:'outmoded',q:'Complete the simile: His ideas were as outmoded as ___',a:'a map drawn before the last mountain range was discovered — accurate for its time, now dangerously incomplete',ch:['a map drawn before the last mountain range was discovered — accurate for its time, now dangerously incomplete','a map updated every year to reflect every new road and boundary change','a guide that was redrawn after the last survey and matches the terrain exactly','a chart so current that it includes features discovered only last month'],hint:'Think: outmoded = once right but no longer complete — like a map that was accurate when drawn but the world has changed'},
{type:'simile',word:'prominent',q:'Complete the simile: The camel\'s prominent hump stood above the desert landscape like ___',a:'a sail above a flat sea — the one thing rising above everything else',ch:['a sail above a flat sea — the one thing rising above everything else','a stone rolled to rest at the lowest point of the valley','a shadow falling flat against the ground at midday','a ripple that spreads outward and disappears into the surrounding water'],hint:'Think: prominent = the thing that rises above everything else — like a sail above a flat sea, unmistakable'},
{type:'simile',word:'prominent',q:'Complete the simile: Her prominent role in the company was as visible as ___',a:'a lighthouse on a flat coast — impossible to look toward the horizon without seeing it first',ch:['a lighthouse on a flat coast — impossible to look toward the horizon without seeing it first','a small buoy floating just below the surface, noticed only if you know where to look','a signal light set too low to be seen from any ship at sea','a marker placed on the chart but never built in the physical harbor'],hint:'Think: prominent = the first thing you see — like a lighthouse, it defines the landscape before you even look for it'},
{type:'simile',word:'prominent',q:'Complete the simile: The glaring error was as prominent as ___',a:'a misplaced trumpet blast in the middle of a string quartet — impossible to miss, impossible to explain away',ch:['a misplaced trumpet blast in the middle of a string quartet — impossible to miss, impossible to explain away','a note played so softly that only the nearest musician could hear it','a rest in the music — an intentional silence that everyone recognized as planned','a chord played at exactly the right moment in exactly the right way'],hint:'Think: a prominent error stands out completely — like a trumpet blast where no trumpet should be'},
{type:'simile',word:'quench',q:'Complete the simile: The water quenched the camel\'s thirst like ___',a:'rain on cracked desert ground — absorbed instantly, as if the need had been waiting for exactly this',ch:['rain on cracked desert ground — absorbed instantly, as if the need had been waiting for exactly this','rain on saturated soil that can\'t absorb any more and simply runs off','water poured onto a surface that\'s already wet — it beads up and rolls away','a light drizzle that barely touches the surface before evaporating in the heat'],hint:'Think: real quenching = total satisfaction of deep need — like rain on cracked ground that drinks it instantly'},
{type:'simile',word:'quench',q:'Complete the simile: She quenched her curiosity like ___',a:'someone finally allowed into the library after being kept outside for years — thoroughly, without leaving a shelf unread',ch:['someone finally allowed into the library after being kept outside for years — thoroughly, without leaving a shelf unread','someone who picks up one book, glances at the cover, and puts it back','a visitor who stands in the library doorway but doesn\'t come inside','a reader who checks out a single book and returns it before finishing'],hint:'Think: quenching deep curiosity is total and complete — like a reader finally given free access to everything they\'d been kept from'},
{type:'simile',word:'rigor',q:'Complete the simile: The rigor of the training program was as relentless as ___',a:'a desert at midsummer — no relief, no shade, no shortcut through',ch:['a desert at midsummer — no relief, no shade, no shortcut through','a shaded garden path on a cool morning — pleasant, well-maintained, easy','a trail with regular rest stops and fresh water at every turn','a course designed to be gentle enough that no one ever has to stop'],hint:'Think: rigor = relentless, no escape — like a desert in full summer that offers no shade and no relief'},
{type:'simile',word:'rigor',q:'Complete the simile: They endured the rigors of the expedition like ___',a:'soldiers who had decided beforehand that the cold was just weather — it existed, but they had decided not to be stopped by it',ch:['soldiers who had decided beforehand that the cold was just weather — it existed, but they had decided not to be stopped by it','travelers who turned back at the first sign of difficult conditions','a team that called off the expedition as soon as the weather report looked uncertain','explorers who waited for ideal conditions before taking a single step'],hint:'Think: enduring rigor = deciding in advance that the hardship is just a condition, not an obstacle'},
{type:'simile',word:'sear',q:'Complete the simile: The midday sun seared the sand like ___',a:'a brand pressed into leather — leaving its mark instantly, with no negotiation',ch:['a brand pressed into leather — leaving its mark instantly, with no negotiation','a gentle iron smoothing a wrinkle without leaving any trace of heat','a warm hand resting briefly on a surface and then lifting away','morning light touching the dew and letting it evaporate slowly'],hint:'Think: searing heat = immediate, permanent marking — like a brand, it leaves its impression the instant it makes contact'},
{type:'simile',word:'sear',q:'Complete the simile: The searing heat hit them like ___',a:'a door opened onto a furnace — one step forward and the air itself became a thing to push through',ch:['a door opened onto a furnace — one step forward and the air itself became a thing to push through','a window opened to let in a cool morning breeze','a gentle warmth spreading through the room as the heater turns on','sunlight through a window — warm but not uncomfortable, welcome on a cold day'],hint:'Think: searing heat = something you physically encounter — like walking into a furnace, the air itself has a new density'},
{type:'simile',word:'transport',q:'Complete the simile: The camel transported goods across the desert like ___',a:'a living freight service — slow, sure, and never once asking for a paved road',ch:['a living freight service — slow, sure, and never once asking for a paved road','a high-speed train that needs perfectly flat track and regular maintenance stops','a delivery drone that needs a clear signal and returns to base every few hours','a courier who requires a smooth road, shelter from weather, and guaranteed cell service'],hint:'Think: transport by camel = reliable, self-sufficient, adapted to the conditions — like a freight service that needs nothing the desert can\'t provide'},
{type:'simile',word:'transport',q:'Complete the simile: They transported the fragile cargo like ___',a:'surgeons carrying a patient — hands steady, pace careful, eyes never leaving what mattered',ch:['surgeons carrying a patient — hands steady, pace careful, eyes never leaving what mattered','workers moving heavy equipment as fast as possible before the end of the shift','movers who stack everything quickly and sort out the damage at the destination','couriers who hand off the package without checking whether it arrived intact'],hint:'Think: careful transport = full attention and steadiness — like surgeons, who carry what they\'re responsible for with total focus'},
{type:'simile',word:'wend',q:'Complete the simile: The line of camels wended across the dune like ___',a:'a sentence being written slowly across a blank page — each animal a letter, the whole a meaning',ch:['a sentence being written slowly across a blank page — each animal a letter, the whole a meaning','a line of text erased letter by letter until nothing remained','a paragraph crossed out and rewritten without any of the original words','a blank page waiting to be written on before the journey can begin'],hint:'Think: wending across the desert = creating meaning through movement — like letters forming a sentence, each step part of a larger message'},
{type:'simile',word:'wend',q:'Complete the simile: She wended her way through the crowded market like ___',a:'water finding its path through stone — patient, unhurried, eventually through',ch:['water finding its path through stone — patient, unhurried, eventually through','a bulldozer pushing through the crowd by force','a person who stops and waits for the crowd to clear before taking another step','someone who turns back each time a new person blocks the path'],hint:'Think: wending through obstacles = patient, natural path-finding — like water that doesn\'t force its way through stone but finds the passage'},
{type:'simile',word:'wend',q:'Complete the simile: They wended through the mountain pass like ___',a:'climbers who have agreed that the summit is not the point — the going is',ch:['climbers who have agreed that the summit is not the point — the going is','climbers racing to reach the top before anyone else and immediately turning around','a team that calls off the climb the moment conditions become less than ideal','hikers who stop at the base and wait for a cable car to take them to the top'],hint:'Think: to wend is to be fully in the journey — like climbers who find meaning in the traversal, not the destination'},

{type:'metaphor',word:'adapt',q:'Which sentence is a metaphor using ADAPT?',a:'The camel is adaptation itself — an animal that desert-tested every part of its body until only what worked remained.',ch:['The camel is adaptation itself — an animal that desert-tested every part of its body until only what worked remained.','The camel has adapted so thoroughly to the desert that it seems to be adaptation personified.','Like adaptation made physical, the camel has been shaped by the desert into exactly what the desert required.','The camel has adapted to the desert in every way, as if adaptation were its defining characteristic.'],hint:'Think: calling the camel directly adaptation itself — it IS the concept embodied, the physical proof of what full adaptation looks like'},
{type:'metaphor',word:'adapt',q:'Which sentence is a metaphor using ADAPT?',a:'To adapt is to be water — it takes the shape of any container without losing what it is.',ch:['To adapt is to be water — it takes the shape of any container without losing what it is.','To adapt is to change the way water changes — taking new forms while staying essentially the same.','Like water in a new container, adapting means changing your shape to fit new conditions.','Adapting feels like being water — you adjust to the new shape without losing your fundamental nature.'],hint:'Think: calling adaptation directly being water — you ARE the fluid, and the container IS the new condition you must fit'},
{type:'metaphor',word:'deplete',q:'Which sentence is a metaphor using DEPLETE?',a:'The drought was a slow depleting — the river grew thinner week by week, like a word being slowly erased.',ch:['The drought was a slow depleting — the river grew thinner week by week, like a word being slowly erased.','The drought depleted the river slowly, as if the water were being gradually erased.','Like a word being slowly erased, the drought depleted the river letter by letter, week by week.','The drought depleted the river over time, in the way that a word is erased letter by letter.'],hint:'Think: calling the drought directly a slow depleting — it IS the process of erasure, the river IS the word disappearing'},
{type:'metaphor',word:'deplete',q:'Which sentence is a metaphor using DEPLETE?',a:'Worry is a depleting — it draws on the same reserves as action, but produces nothing.',ch:['Worry is a depleting — it draws on the same reserves as action, but produces nothing.','Worry depletes your energy the way action does, but without the productive result.','Like a depleting that drains without producing, worry uses up reserves that action could have spent usefully.','Worrying feels like depletion — it costs energy the way action does but gives nothing back.'],hint:'Think: calling worry directly a depleting — it IS the draining process, drawing from reserves while creating nothing'},
{type:'metaphor',word:'deplete',q:'Which sentence is a metaphor using DEPLETE?',a:'His enthusiasm was a resource they depleted carelessly — borrowed without thought, spent without gratitude, gone before anyone noticed.',ch:['His enthusiasm was a resource they depleted carelessly — borrowed without thought, spent without gratitude, gone before anyone noticed.','His enthusiasm was depleted by their carelessness, the way a resource is drained by wasteful use.','Like a resource depleted through careless use, his enthusiasm was drawn on without thought until nothing remained.','They depleted his enthusiasm carelessly, treating it as a resource without limits until it ran out.'],hint:'Think: calling enthusiasm directly a resource — it IS the supply, and depletion IS what careless use does to finite things'},
{type:'metaphor',word:'efficient',q:'Which sentence is a metaphor using EFFICIENT?',a:'The camel\'s body is a masterwork of efficiency — a thousand-year design process that wasted nothing and solved everything.',ch:['The camel\'s body is a masterwork of efficiency — a thousand-year design process that wasted nothing and solved everything.','The camel\'s body is as efficient as a masterwork of engineering — designed over thousands of years to waste nothing.','Like a masterwork of engineering, the camel\'s body has been made efficient over thousands of years.','The efficiency of the camel\'s body is like that of a masterwork — nothing wasted, everything purposeful.'],hint:'Think: calling the camel\'s body directly a masterwork — it IS the finished design, and efficiency IS what makes it a masterwork'},
{type:'metaphor',word:'efficient',q:'Which sentence is a metaphor using EFFICIENT?',a:'Her mind was an efficient machine — it took in the problem, ran it through every process, and delivered an answer before you finished the question.',ch:['Her mind was an efficient machine — it took in the problem, ran it through every process, and delivered an answer before you finished the question.','Her mind worked as efficiently as a machine — processing every problem quickly and producing answers instantly.','Like an efficient machine, her mind could process a problem and return an answer in seconds.','Her mind processed problems as efficiently as a well-designed machine — no wasted steps, immediate output.'],hint:'Think: calling her mind directly a machine — it IS the processing device, and efficient IS its defining characteristic'},
{type:'metaphor',word:'fatigue',q:'Which sentence is a metaphor using FATIGUE?',a:'Fatigue was his companion by the third day — a quiet presence that sat behind every thought and made the simplest task feel like a negotiation.',ch:['Fatigue was his companion by the third day — a quiet presence that sat behind every thought and made the simplest task feel like a negotiation.','By the third day, fatigue was like a companion — always present, slowing every thought.','Like a companion that never left his side, fatigue had made itself at home in every action by the third day.','By the third day, fatigue followed him the way a companion does — constantly present, impossible to shake.'],hint:'Think: calling fatigue directly a companion — it IS the presence, always at his side, affecting everything'},
{type:'metaphor',word:'fatigue',q:'Which sentence is a metaphor using FATIGUE?',a:'The runner\'s fatigue was the finish line she had to reach before she could reach the finish line.',ch:['The runner\'s fatigue was the finish line she had to reach before she could reach the finish line.','The runner\'s fatigue felt like a finish line she had to cross before crossing the actual finish line.','Like a second finish line placed before the real one, her fatigue was the obstacle between her and her goal.','Her fatigue was as real as a finish line — she had to push through it to get to the one that mattered.'],hint:'Think: calling fatigue directly a finish line — the exhaustion IS the barrier, and crossing it IS the achievement before the real one'},
{type:'metaphor',word:'fatigue',q:'Which sentence is a metaphor using FATIGUE?',a:'By nightfall, fatigue had become the landscape — not something she was walking through, but the ground itself.',ch:['By nightfall, fatigue had become the landscape — not something she was walking through, but the ground itself.','By nightfall, fatigue had spread across her world the way a landscape spreads in every direction.','Like a landscape she was moving through, fatigue surrounded her by nightfall and shaped everything she experienced.','Her fatigue by nightfall was like the landscape — it defined the whole environment she was traveling through.'],hint:'Think: calling fatigue directly the landscape — it IS the terrain, not something encountered within it but the ground under every step'},
{type:'metaphor',word:'gait',q:'Which sentence is a metaphor using GAIT?',a:'The camel\'s gait was a clock — patient, regular, measuring the desert in seconds of footfall.',ch:['The camel\'s gait was a clock — patient, regular, measuring the desert in seconds of footfall.','The camel\'s gait was as regular as a clock — each step marking time as it moved across the desert.','Like a clock measuring time, the camel\'s gait measured distance across the desert step by step.','The regularity of the camel\'s gait was as precise as a clock — each footfall a second, each mile an hour.'],hint:'Think: calling the gait directly a clock — it IS the timepiece, measuring the desert in its own steady rhythm'},
{type:'metaphor',word:'gait',q:'Which sentence is a metaphor using GAIT?',a:'Her confident gait was an announcement — she owned this room, and everyone knew it the moment she crossed the threshold.',ch:['Her confident gait was an announcement — she owned this room, and everyone knew it the moment she crossed the threshold.','Her confident gait was like an announcement — it told everyone she owned the room before she spoke.','Like an announcement made before she entered, her gait declared her ownership of the space.','Her gait was as much an announcement as a spoken statement — it communicated everything about her before she said a word.'],hint:'Think: calling her gait directly an announcement — it IS the declaration, communicated entirely through movement'},
{type:'metaphor',word:'glare',q:'Which sentence is a metaphor using GLARE?',a:'The desert sun\'s glare is its signature — its refusal to let you forget where you are, even for a moment.',ch:['The desert sun\'s glare is its signature — its refusal to let you forget where you are, even for a moment.','The desert sun\'s glare acts like a signature — it marks the landscape in a way that tells you exactly where you are.','Like a signature that identifies the sun, the glare is the desert\'s way of announcing its presence constantly.','The glare is the desert sun\'s signature in the way that a distinctive mark identifies its maker.'],hint:'Think: calling the glare directly a signature — it IS the identifying mark, the sun\'s insistence on being known'},
{type:'metaphor',word:'glare',q:'Which sentence is a metaphor using GLARE?',a:'The manager\'s glare was a wall — it stopped conversation, pinned you in place, and made you wish you had chosen a different aisle.',ch:['The manager\'s glare was a wall — it stopped conversation, pinned you in place, and made you wish you had chosen a different aisle.','The manager\'s glare was like a wall — it stopped you and made you reconsider your direction.','Like a wall placed in your path, the manager\'s glare halted everything and made movement seem impossible.','Her glare had the effect of a wall — stopping everyone who encountered it before they could continue.'],hint:'Think: calling the glare directly a wall — it IS the physical barrier, and to be glared at IS to be stopped in your tracks'},
{type:'metaphor',word:'habitat',q:'Which sentence is a metaphor using HABITAT?',a:'A creature\'s habitat is not just where it lives — it is everything the creature has made a contract with, every condition it has agreed to accept.',ch:['A creature\'s habitat is not just where it lives — it is everything the creature has made a contract with, every condition it has agreed to accept.','A creature\'s habitat is more than just its home — it\'s like a contract between the animal and its environment.','Like a contract agreed to over thousands of years, a creature\'s habitat is the deal it has made with its conditions.','The relationship between a creature and its habitat is like a contract — each has accepted what the other requires.'],hint:'Think: calling habitat directly a contract — it IS the agreement, and every adaptation IS a clause accepted over generations'},
{type:'metaphor',word:'habitat',q:'Which sentence is a metaphor using HABITAT?',a:'The desert is the dromedary\'s habitat and its curriculum — everything the camel knows about survival, the desert has taught it.',ch:['The desert is the dromedary\'s habitat and its curriculum — everything the camel knows about survival, the desert has taught it.','The desert acts as both habitat and curriculum for the dromedary — providing the conditions and teaching the lessons.','Like a curriculum designed for the dromedary, the desert habitat has taught it everything it knows about survival.','The dromedary\'s habitat has served as its curriculum — the desert teaching the animal everything survival requires.'],hint:'Think: calling the desert both habitat and curriculum — it IS the school, and every adaptation IS a lesson learned'},
{type:'metaphor',word:'habitat',q:'Which sentence is a metaphor using HABITAT?',a:'Without its habitat, an animal is a sentence without a subject — the words are there, but the meaning is gone.',ch:['Without its habitat, an animal is a sentence without a subject — the words are there, but the meaning is gone.','Without its habitat, an animal is like a sentence missing its subject — the rest is there but makes no sense.','Like a sentence from which the subject has been removed, an animal without its habitat loses its organizing meaning.','An animal removed from its habitat is as incomplete as a sentence with no subject — technically present, fundamentally broken.'],hint:'Think: calling the animal without habitat directly a sentence without a subject — it IS the fragment, grammatically present but semantically empty'},
{type:'metaphor',word:'oblivious',q:'Which sentence is a metaphor using OBLIVIOUS?',a:'The camel is oblivion in motion — it wends across the desert utterly indifferent to everything that isn\'t the next step.',ch:['The camel is oblivion in motion — it wends across the desert utterly indifferent to everything that isn\'t the next step.','The camel moves as if oblivious to everything except the step in front of it.','Like oblivion made physical, the camel is entirely indifferent to the discomforts of the desert it crosses.','The camel\'s obliviousness to hardship is like oblivion in motion — a total absence of the distraction that would stop others.'],hint:'Think: calling the camel directly oblivion in motion — it IS the absence of distraction, embodied in a moving form'},
{type:'metaphor',word:'oblivious',q:'Which sentence is a metaphor using OBLIVIOUS?',a:'Obliviousness is sometimes armor — a shell the camel and the focused traveler both wear, impervious to distractions that would stop a less adapted creature.',ch:['Obliviousness is sometimes armor — a shell the camel and the focused traveler both wear, impervious to distractions that would stop a less adapted creature.','Obliviousness sometimes works like armor — protecting the camel and the focused person from distractions that would stop others.','Like armor worn against distraction, obliviousness protects the camel from the things that would exhaust a creature paying attention.','Obliviousness can be as protective as armor — shielding the wearer from every distraction that would otherwise slow them down.'],hint:'Think: calling obliviousness directly armor — it IS the protective layer, and wearing it IS what allows sustained movement through hardship'},
{type:'metaphor',word:'outmoded',q:'Which sentence is a metaphor using OUTMODED?',a:'The stagecoach is a cautionary tale in wood and iron — the outmoded version of every idea that thought it was permanent.',ch:['The stagecoach is a cautionary tale in wood and iron — the outmoded version of every idea that thought it was permanent.','The stagecoach is like a cautionary tale — an outmoded technology that once seemed permanent and indispensable.','Like a cautionary tale told in wood and iron, the stagecoach is the outmoded predecessor of every transportation idea that believed it would last forever.','The story of the stagecoach is a cautionary tale about outmoded thinking — it dominated and then vanished when something better arrived.'],hint:'Think: calling the stagecoach directly a cautionary tale — it IS the story, the permanent-seeming thing that proved temporary'},
{type:'metaphor',word:'outmoded',q:'Which sentence is a metaphor using OUTMODED?',a:'An outmoded idea is not wrong; it is a fossil — once perfectly adapted, now preserved only as evidence of what used to work.',ch:['An outmoded idea is not wrong; it is a fossil — once perfectly adapted, now preserved only as evidence of what used to work.','An outmoded idea is like a fossil — once useful, now preserved as a record of a way of thinking that no longer applies.','Like a fossil that was once a living creature, an outmoded idea was once a working solution now preserved in the record of history.','An outmoded idea has become a fossil — the idea itself still intact, but the conditions that made it useful long gone.'],hint:'Think: calling the outmoded idea directly a fossil — it IS the preserved remnant, once alive and functioning, now a specimen'},
{type:'metaphor',word:'outmoded',q:'Which sentence is a metaphor using OUTMODED?',a:'Every technology is an outmoded technology in waiting — the only question is how long before something else makes it a relic.',ch:['Every technology is an outmoded technology in waiting — the only question is how long before something else makes it a relic.','Every technology will eventually become outmoded — it\'s only a matter of how long before something better arrives.','Like an outmoded technology waiting to happen, every current tool will eventually be replaced by something more efficient.','No technology stays current forever — every one of them is outmoded at some future date, just not yet.'],hint:'Think: calling current technology directly outmoded in waiting — it IS already the relic, just not yet arrived at that moment'},
{type:'metaphor',word:'prominent',q:'Which sentence is a metaphor using PROMINENT?',a:'The camel\'s hump is its most prominent feature — a landmark on the landscape of the animal itself.',ch:['The camel\'s hump is its most prominent feature — a landmark on the landscape of the animal itself.','The camel\'s hump is so prominent it acts like a landmark — the most visible feature on the animal.','Like a landmark on a landscape, the camel\'s hump is the most prominent feature of the animal\'s silhouette.','The camel\'s hump is as prominent as a landmark — it defines the animal\'s outline from any direction.'],hint:'Think: calling the hump directly a landmark — it IS the navigational feature, the thing that defines the animal\'s landscape'},
{type:'metaphor',word:'prominent',q:'Which sentence is a metaphor using PROMINENT?',a:'Her reputation was a prominent building on the horizon — visible from any direction, impossible to ignore when approaching.',ch:['Her reputation was a prominent building on the horizon — visible from any direction, impossible to ignore when approaching.','Her reputation was as prominent as a tall building — visible from far away, impossible to overlook.','Like a prominent building visible from every direction, her reputation preceded her wherever she went.','Her reputation had the prominence of a landmark — you could see it coming long before you arrived.'],hint:'Think: calling her reputation directly a building — it IS the structure, prominent, defining the horizon before you\'ve even arrived'},
{type:'metaphor',word:'quench',q:'Which sentence is a metaphor using QUENCH?',a:'The oasis is not just water — it is the quenching of every thirst at once: physical, psychological, and the thirst to believe the journey was worth it.',ch:['The oasis is not just water — it is the quenching of every thirst at once: physical, psychological, and the thirst to believe the journey was worth it.','The oasis quenches not just physical thirst but psychological thirst as well — it is more than just water.','Like a quenching that reaches every layer of need, the oasis satisfies not just the body but the spirit of the journey.','An oasis quenches every kind of thirst — not just the physical one, but the deeper thirst for meaning in the hardship.'],hint:'Think: calling the oasis directly the quenching — it IS the act of satisfaction, not just the source of water'},
{type:'metaphor',word:'quench',q:'Which sentence is a metaphor using QUENCH?',a:'Reading was the only thing that quenched his real thirst — the hunger for a world larger than the one he could see from his window.',ch:['Reading was the only thing that quenched his real thirst — the hunger for a world larger than the one he could see from his window.','Reading quenched his real thirst for knowledge the way water quenches physical thirst.','Like the only source of water in a desert, reading quenched a thirst that nothing else could reach.','Reading was as good as water to him — it quenched his hunger for a bigger world every time he opened a book.'],hint:'Think: calling reading the only quenching — it IS the sole satisfier, and the thirst for a larger world IS what it extinguishes'},
{type:'metaphor',word:'quench',q:'Which sentence is a metaphor using QUENCH?',a:'The rain was a quenching — it arrived with the single purpose of relieving what the sun had taken.',ch:['The rain was a quenching — it arrived with the single purpose of relieving what the sun had taken.','The rain quenched the earth\'s thirst the way only rain can — arriving with the single purpose of relief.','Like a quenching delivered from above, the rain arrived to relieve exactly what the sun had taken.','The rain\'s purpose was to quench — to relieve the drought the sun had imposed on everything below it.'],hint:'Think: calling the rain directly a quenching — it IS the act of relief, arriving as a single purposeful event'},
{type:'metaphor',word:'rigor',q:'Which sentence is a metaphor using RIGOR?',a:'The desert\'s rigor is its curriculum — every creature that survives has passed the hardest exam ever designed.',ch:['The desert\'s rigor is its curriculum — every creature that survives has passed the hardest exam ever designed.','The desert\'s rigorous conditions work like a curriculum — every survivor has been tested and passed.','Like a curriculum of extraordinary rigor, the desert tests every creature that enters and keeps only those who pass.','The desert\'s rigor is its teaching method — every creature that survives has completed the course.'],hint:'Think: calling the desert\'s rigor directly a curriculum — it IS the educational system, and every adaptation IS a lesson passed'},
{type:'metaphor',word:'rigor',q:'Which sentence is a metaphor using RIGOR?',a:'The rigor of her training was an investment — she paid daily in sweat so that when it mattered, she could pay in confidence.',ch:['The rigor of her training was an investment — she paid daily in sweat so that when it mattered, she could pay in confidence.','The rigor of her training worked like an investment — the daily cost paid off when the real test arrived.','Like an investment that returns more than it cost, the rigor of her training paid off in confidence when she needed it.','Her rigorous training was an investment in future performance — every hard session a deposit toward the day she\'d need the return.'],hint:'Think: calling the rigor directly an investment — it IS the financial instrument, and daily sweat IS the capital deposited'},
{type:'metaphor',word:'sear',q:'Which sentence is a metaphor using SEAR?',a:'The memory was seared into him — not painful anymore, but permanent, like a brand that has cooled but left its mark.',ch:['The memory was seared into him — not painful anymore, but permanent, like a brand that has cooled but left its mark.','The memory had been seared into him the way heat sears a surface — permanent, impossible to remove.','Like something seared into place by intense heat, the memory had become part of him and could not be undone.','The memory seared into him the way a brand sears into leather — instantly, permanently, and without negotiation.'],hint:'Think: calling the searing directly the action done to the memory — it IS the branding, and the memory IS what got marked permanently'},
{type:'metaphor',word:'sear',q:'Which sentence is a metaphor using SEAR?',a:'The midday desert is a forge — it sears everything that passes through it and tests what is strong enough to remain.',ch:['The midday desert is a forge — it sears everything that passes through it and tests what is strong enough to remain.','The midday desert works like a forge — searing everything in it and testing what can withstand the heat.','Like a forge that sears and tests, the midday desert burns everything passing through it and keeps only what endures.','The desert at midday has the effect of a forge — searing, testing, burning away everything that cannot survive.'],hint:'Think: calling the midday desert directly a forge — it IS the furnace, and to pass through it IS to be seared and tested'},
{type:'metaphor',word:'transport',q:'Which sentence is a metaphor using TRANSPORT?',a:'The camel is not just transport — it is a civilization\'s entire infrastructure, the whole shipping network for a world without roads.',ch:['The camel is not just transport — it is a civilization\'s entire infrastructure, the whole shipping network for a world without roads.','The camel was more than transport — it functioned as the entire infrastructure of a civilization with no roads.','Like an entire shipping network compressed into one animal, the camel was more than transport for desert civilizations.','The camel was a whole civilization\'s transport system — roads, trucks, and freight all in one animal.'],hint:'Think: calling the camel directly an infrastructure — it IS the entire system, not just one part of it'},
{type:'metaphor',word:'transport',q:'Which sentence is a metaphor using TRANSPORT?',a:'Language is the most efficient form of transport — it carries ideas across centuries, unloads them in new minds, and travels back empty for another load.',ch:['Language is the most efficient form of transport — it carries ideas across centuries, unloads them in new minds, and travels back empty for another load.','Language works like the most efficient transport — carrying ideas across time and delivering them to new generations.','Like a transport that moves ideas instead of goods, language carries meaning across centuries to new minds.','The most efficient transport for ideas is language — it crosses time and delivers its cargo without being depleted.'],hint:'Think: calling language directly transport — it IS the vehicle, ideas ARE the cargo, and centuries ARE the distance traveled'},
{type:'metaphor',word:'wend',q:'Which sentence is a metaphor using WEND?',a:'The caravan was time itself wending across the desert — patient, purposeful, tracing the same route it had traced a thousand years before.',ch:['The caravan was time itself wending across the desert — patient, purposeful, tracing the same route it had traced a thousand years before.','The caravan wended across the desert like time — slow, patient, following the same route it always had.','Like time wending across centuries, the caravan moved through the desert with the same patience and purpose it always had.','The caravan\'s wending across the desert was like time itself — following the same path it had always followed.'],hint:'Think: calling the caravan directly time wending — it IS the movement of time, patient, purposeful, ancient'},
{type:'metaphor',word:'wend',q:'Which sentence is a metaphor using WEND?',a:'To wend is to trust the way — to let the path unfold rather than forcing it, accepting the detour as part of the journey.',ch:['To wend is to trust the way — to let the path unfold rather than forcing it, accepting the detour as part of the journey.','To wend is to travel with trust — like following a path without insisting it go where you planned.','Like trusting a path that winds rather than forcing it straight, to wend is to accept the journey as it comes.','Wending means trusting the way forward — following where the path leads rather than demanding it comply with your plan.'],hint:'Think: calling wending directly trusting the way — it IS the act of acceptance, letting the journey determine the path'}
];

var queue=[],qIdx=0,score=0,streak=0,typeTally={},answered=false;
var fcIdx=0,fcOrder=[],fcFlipped=false;

function renderCard(){
  fcFlipped=false;
  document.getElementById('card-inner').classList.remove('flipped');
  var w=WORDS[fcOrder[fcIdx]];
  document.getElementById('fc-progress').textContent=(fcIdx+1)+' / '+WORDS.length;
  var front=document.getElementById('card-front');
  clearEl(front);
  front.appendChild(mk('div','card-word',w.word));
  front.appendChild(mk('div','card-pos',w.pos));
  front.appendChild(mk('div','card-tap','Tap to reveal'));
  var back=document.getElementById('card-back');
  clearEl(back);
  back.appendChild(mk('div','card-def',w.def));
  back.appendChild(mk('div','card-ex',w.ex));
}
function initFlashcards(){
  fcOrder=[];for(var i=0;i<WORDS.length;i++)fcOrder.push(i);
  fcIdx=0;renderCard();
}
document.getElementById('card-inner').addEventListener('click',function(){
  fcFlipped=!fcFlipped;this.classList.toggle('flipped',fcFlipped);
});
document.getElementById('fc-flip').addEventListener('click',function(){
  fcFlipped=!fcFlipped;document.getElementById('card-inner').classList.toggle('flipped',fcFlipped);
});
document.getElementById('fc-prev').addEventListener('click',function(){fcIdx=(fcIdx-1+WORDS.length)%WORDS.length;renderCard();});
document.getElementById('fc-next').addEventListener('click',function(){fcIdx=(fcIdx+1)%WORDS.length;renderCard();});
document.getElementById('fc-shuffle').addEventListener('click',function(){fcOrder=shuffle(fcOrder);fcIdx=0;renderCard();});

function startQuiz(){
  queue=shuffle(QUESTIONS).slice(0,20);
  qIdx=0;score=0;streak=0;typeTally={};answered=false;
  document.getElementById('result-section').style.display='none';
  document.getElementById('quiz-section').style.display='';
  showQuestion();
}
function showQuestion(){
  answered=false;
  var q=queue[qIdx];
  var ts=TYPE_STYLES[q.type]||{label:q.type.toUpperCase(),color:'#94a3b8',bg:'rgba(51,65,85,.4)'};
  document.getElementById('q-counter').textContent='Question '+(qIdx+1)+' of '+queue.length;
  document.getElementById('q-score').textContent='Score: '+score;
  document.getElementById('streak-badge').textContent='🔥 '+streak+' streak';
  document.getElementById('progress-fill').style.width=((qIdx/queue.length)*100)+'%';
  var bw=document.getElementById('type-badge-wrap');
  clearEl(bw);
  var badge=mk('span','type-badge',ts.label);
  badge.style.color=ts.color;badge.style.background=ts.bg;
  bw.appendChild(badge);
  document.getElementById('q-word').textContent=q.word.toUpperCase();
  document.getElementById('q-text').textContent=q.q;
  var hb=document.getElementById('hint-box');
  hb.style.display='none';hb.textContent=q.hint;
  var cc=document.getElementById('choices');
  clearEl(cc);
  shuffle(q.ch).forEach(function(opt){
    var btn=mk('button','choice-btn',opt);
    btn.addEventListener('click',function(){selectAnswer(this,opt,q);});
    cc.appendChild(btn);
  });
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';
  document.getElementById('next-btn').style.display='none';
}
document.getElementById('hint-btn').addEventListener('click',function(){
  var hb=document.getElementById('hint-box');
  hb.style.display=hb.style.display==='none'?'block':'none';
});
function selectAnswer(btn,opt,q){
  if(answered)return;
  answered=true;
  var correct=opt===q.a;
  var rect=btn.getBoundingClientRect();
  var cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
  var fb=document.getElementById('feedback');
  if(correct){
    btn.classList.add('correct');score++;streak++;
    fb.textContent='Correct! ✓';fb.className='feedback ok';
    spawnBurst(cx,cy,'#4ade80',18);
    if(streak>=3)spawnConfetti();
  } else {
    btn.classList.add('wrong');streak=0;
    fb.textContent='Incorrect. The answer is: '+q.a;fb.className='feedback no';
    spawnBurst(cx,cy,'#fb923c',12);
    document.getElementById('choices').querySelectorAll('.choice-btn').forEach(function(b){if(b.textContent===q.a)b.classList.add('correct');});
  }
  typeTally[q.type]=typeTally[q.type]||{c:0,t:0};
  typeTally[q.type].t++;if(correct)typeTally[q.type].c++;
  document.querySelectorAll('.choice-btn').forEach(function(b){b.disabled=true;});
  document.getElementById('next-btn').style.display='block';
}
document.getElementById('next-btn').addEventListener('click',function(){
  qIdx++;if(qIdx>=queue.length){showResult();}else{showQuestion();}
});
function showResult(){
  document.getElementById('quiz-section').style.display='none';
  document.getElementById('result-section').style.display='block';
  document.getElementById('result-score').textContent=score;
  var pct=score/queue.length;
  var msgs=[
    'Like the camel, you adapted to every challenge and depleted nothing — perfect score!',
    'Outstanding! Your efficiency would impress even the ship of the desert.',
    'Strong effort — you persevered through the rigors of this quiz.',
    'Good work — keep going and no vocabulary challenge will remain outmoded for you.',
    'Every journey wends through setbacks. Study, adapt, and return stronger.'
  ];
  document.getElementById('result-msg').textContent=pct===1?msgs[0]:pct>=.85?msgs[1]:pct>=.7?msgs[2]:pct>=.5?msgs[3]:msgs[4];
  var bd=document.getElementById('result-breakdown');
  clearEl(bd);
  Object.keys(typeTally).forEach(function(k){
    var d=typeTally[k];
    var item=mk('div','rb-item');
    var lbl=mk('span',null,(TYPE_STYLES[k]||{label:k}).label+': ');
    var val=mk('span',null,d.c+'/'+d.t);
    item.appendChild(lbl);item.appendChild(val);
    bd.appendChild(item);
  });
  document.getElementById('progress-fill').style.width='100%';
}
document.getElementById('restart-btn').addEventListener('click',startQuiz);

document.getElementById('btn-quiz').addEventListener('click',function(){
  this.classList.add('active');document.getElementById('btn-flash').classList.remove('active');
  document.getElementById('flashcard-section').style.display='none';
  document.getElementById('quiz-section').style.display='';
  document.getElementById('result-section').style.display='none';
});
document.getElementById('btn-flash').addEventListener('click',function(){
  this.classList.add('active');document.getElementById('btn-quiz').classList.remove('active');
  document.getElementById('quiz-section').style.display='none';
  document.getElementById('result-section').style.display='none';
  document.getElementById('flashcard-section').style.display='';
  initFlashcards();
});

initFlashcards();
startQuiz();
</script>
</body>
