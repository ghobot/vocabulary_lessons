<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wordly Wise – Master Quiz</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07050f;color:#f1f5f9;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
canvas#bg{position:fixed;inset:0;z-index:0;pointer-events:none}
#app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:16px}
a.home{display:inline-flex;align-items:center;gap:6px;color:#a78bfa;text-decoration:none;font-size:.85rem;margin-bottom:12px;opacity:.8}
a.home:hover{opacity:1}
h1{font-size:1.6rem;font-weight:700;text-align:center;margin-bottom:4px;background:linear-gradient(135deg,#a78bfa,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{text-align:center;color:#94a3b8;font-size:.85rem;margin-bottom:20px}

/* START SCREEN */
#start-screen{display:block}
.filter-section{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:16px;margin-bottom:14px}
.filter-title{font-size:.75rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#94a3b8;margin-bottom:10px}
.lesson-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:6px}
.lesson-toggle{padding:7px 6px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#94a3b8;font-size:.72rem;cursor:pointer;text-align:center;transition:.15s;line-height:1.2}
.lesson-toggle.on{background:rgba(167,139,250,.2);border-color:#a78bfa;color:#f1f5f9}
.type-row{display:flex;flex-wrap:wrap;gap:6px}
.type-toggle{padding:6px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#94a3b8;font-size:.8rem;cursor:pointer;transition:.15s}
.type-toggle.on{border-color:var(--tc);color:var(--tc);background:rgba(var(--tcr),.15)}
.controls-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.ctrl-btn{padding:6px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:#94a3b8;font-size:.78rem;cursor:pointer;transition:.15s}
.ctrl-btn:hover{background:rgba(255,255,255,.08);color:#f1f5f9}
.pool-info{font-size:.78rem;color:#64748b;flex:1;text-align:right}
.start-btn{display:block;width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#7c3aed,#2563eb);color:#fff;font-size:1.05rem;font-weight:700;cursor:pointer;transition:.2s;letter-spacing:.02em}
.start-btn:hover{filter:brightness(1.1)}
.start-btn:disabled{opacity:.4;cursor:default}

/* QUIZ */
#quiz-section{display:none}
.quiz-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.q-counter{font-size:.85rem;color:#94a3b8}
.q-score{font-size:.85rem;color:#86efac}
.streak-badge{font-size:.8rem;padding:3px 10px;border-radius:12px;background:#1e1030;color:#94a3b8}
.progress-bar{width:100%;height:6px;background:#1a1030;border-radius:3px;margin-bottom:14px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#7c3aed,#38bdf8);border-radius:3px;transition:width .4s}
.lesson-tag{display:inline-flex;align-items:center;gap:5px;font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:12px;margin-bottom:8px;border:1px solid;opacity:.85}
.type-badge{display:inline-block;font-size:.72rem;font-weight:700;letter-spacing:.06em;padding:3px 10px;border-radius:12px;margin-left:6px}
.q-word{font-size:1.05rem;color:#e2e8f0;font-weight:600;margin-bottom:6px}
.q-text{font-size:1rem;color:#f1f5f9;line-height:1.5;margin-bottom:16px}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
@media(max-width:500px){.choices{grid-template-columns:1fr}}
.choice-btn{padding:11px 14px;border-radius:10px;border:1px solid #1e1030;background:#0f0a20;color:#e2e8f0;font-size:.9rem;cursor:pointer;text-align:left;transition:.2s;line-height:1.4}
.choice-btn:hover:not(:disabled){background:#1e1030;border-color:#7c3aed}
.choice-btn.correct{background:#14532d;border-color:#4ade80;color:#bbf7d0}
.choice-btn.wrong{background:#2d1b4e;border-color:#a78bfa;color:#c4b5fd}
.choice-btn:disabled{cursor:default}
.hint-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.hint-btn{font-size:.78rem;padding:4px 12px;border-radius:8px;border:1px solid #7c3aed;background:transparent;color:#a78bfa;cursor:pointer}
.hint-btn:hover{background:#1e1030}
.hint-box{background:#0a0618;border:1px solid #2d1b4e;border-radius:10px;padding:10px 14px;font-size:.83rem;color:#c4b5fd;margin-bottom:12px;display:none}
.feedback{text-align:center;font-size:.95rem;font-weight:600;min-height:24px;margin-bottom:10px}
.feedback.ok{color:#4ade80}
.feedback.no{color:#a78bfa}
.next-btn{display:none;width:100%;padding:12px;border-radius:12px;border:none;background:#7c3aed;color:#fff;font-size:1rem;font-weight:600;cursor:pointer;transition:.2s}
.next-btn:hover{background:#6d28d9}

/* RESULT */
#result-section{display:none;text-align:center;padding:20px 0}
.result-title{font-size:1.8rem;font-weight:700;margin-bottom:8px;background:linear-gradient(135deg,#a78bfa,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.result-score{font-size:3rem;font-weight:800;color:#a78bfa;margin-bottom:4px}
.result-label{font-size:.9rem;color:#94a3b8;margin-bottom:8px}
.result-msg{font-size:1rem;color:#e2e8f0;max-width:480px;margin:0 auto 20px;line-height:1.6;font-style:italic}
.breakdown-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:20px;text-align:left}
.bd-card{background:#0f0a20;border:1px solid #1e1030;border-radius:10px;padding:10px 12px}
.bd-label{font-size:.65rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#64748b;margin-bottom:4px}
.bd-val{font-size:1rem;font-weight:700;color:#f1f5f9}
.review-section{width:100%;text-align:left;margin-bottom:20px}
.review-title{font-size:.8rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.review-item{display:flex;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:.8rem;align-items:flex-start}
.review-icon{flex-shrink:0;margin-top:.05rem}
.review-word{font-weight:700;color:#e2e8f0;min-width:80px}
.review-wrong{color:#a78bfa;font-size:.75rem;margin-top:2px}
.review-lesson{font-size:.65rem;color:#64748b;margin-top:1px}
.action-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.restart-btn{padding:12px 28px;border-radius:12px;border:none;background:#7c3aed;color:#fff;font-size:1rem;font-weight:600;cursor:pointer;transition:.2s}
.restart-btn:hover{background:#6d28d9}
.config-btn{padding:12px 28px;border-radius:12px;border:1px solid rgba(255,255,255,.15);background:transparent;color:#94a3b8;font-size:1rem;font-weight:600;cursor:pointer;transition:.2s}
.config-btn:hover{background:rgba(255,255,255,.06);color:#f1f5f9}

#pcanvas{position:fixed;inset:0;z-index:2;pointer-events:none}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<canvas id="pcanvas"></canvas>
<div id="app">
  <a class="home" href="index.html">&#8592; Home</a>
  <h1>Master Quiz</h1>

  <div id="start-screen">

      <button class="restart-btn" id="restart-btn">Play Again</button>
      <button class="config-btn" id="config-btn">Change Filters</button>
    </div>
  </div>
</div>

{t:'synonym',w:'eloquent',q:'Which word best matches ELOQUENT?',a:'persuasive',ch:['persuasive','dull','silent','boring'],h:'Anne Frank\'s eloquent diary often moves readers to tears.',l:1,s:'Lady Liberty',c:'#f0c040'},

{t:'synonym',w:'poverty',q:'Families living in ___ often cannot afford basic needs',a:'poverty',ch:['poverty','luxury','comfort','wealth'],h:'Poverty means the state of being poor.',l:1,s:'Lady Liberty',c:'#f0c040'},

{t:'metaphor',w:'transfer',q:'Which sentence is a metaphor using TRANSFER?',a:'Teaching is the great transfer — a candle lighting other candles without losing its own flame.',ch:['Teaching is the great transfer — a candle lighting other candles without losing its own flame.','Teaching transfers knowledge like pouring water.','A teacher is as effective as a transfer of light.','Teaching is like a candle that shares its flame.'],h:'Think: calling the act of teaching directly a great transfer of light',l:6,s:'The Story of Silk',c:'#fb923c'},
{t:'metaphor',w:'domesticate',q:'Which sentence is a metaphor using DOMESTICATE?',a:'School domesticated his restless curiosity into a focused, disciplined mind.',ch:['School domesticated his restless curiosity into a focused, disciplined mind.','School tamed him like a trainer tames an animal.','School changed him as if taming a wild creature.','His curiosity was trained at school like a wild animal.'],h:'Think: calling curiosity directly a wild thing that school tamed',l:6,s:'The Story of Silk',c:'#fb923c'},
{t:'metaphor',w:'inhibit',q:'Which sentence is a metaphor using INHIBIT?',a:'Procrastination is the weed that inhibits the garden of achievement.',ch:['Procrastination is the weed that inhibits the garden of achievement.','Procrastination holds us back like a weed.','Procrastination inhibits success as if it were a barrier.','Procrastination slows achievement like a slow weed growing.'],h:'Think: calling procrastination directly a weed in a garden',l:6,s:'The Story of Silk',c:'#fb923c'},
{t:'metaphor',w:'fiber',q:'Which sentence is a metaphor using FIBER?',a:'Discipline is the invisible fiber that holds a champion\'s training together day after day.',ch:['Discipline is the invisible fiber that holds a champion\'s training together day after day.','Discipline holds athletes together like a strong fiber.','Discipline is as strong as a fiber in a rope.','Discipline keeps athletes together like thread in cloth.'],h:'Think: calling discipline directly a fiber that holds something together',l:6,s:'The Story of Silk',c:'#fb923c'},
{t:'metaphor',w:'emerge',q:'Which sentence is a metaphor using EMERGE?',a:'After years of struggle, a master painter emerged from the uncertain student he once was.',ch:['After years of struggle, a master painter emerged from the uncertain student he once was.','He became a master painter as if emerging from a cocoon.','Over years, he transformed like an emerging butterfly.','He grew from student to master like something emerging from a shell.'],h:'Think: a person directly becoming something new, without like or as',l:6,s:'The Story of Silk',c:'#fb923c'},
{t:'metaphor',w:'motion',q:'Which sentence is a metaphor using MOTION?',a:'Her dancing was a continuous motion of storytelling, each step a paragraph.',ch:['Her dancing was a continuous motion of storytelling, each step a paragraph.','She danced as if each step were a sentence.','Her dance moved like the pages of a story.','She moved as continuously as a written paragraph.'],h:'Think: calling dancing directly a motion of storytelling',l:6,s:'The Story of Silk',c:'#fb923c'},
{t:'metaphor',w:'shed',q:'Which sentence is a metaphor using SHED (to lose or cast off)?',a:'Moving to a new city was his chance to shed the old identity that no longer fit.',ch:['Moving to a new city was his chance to shed the old identity that no longer fit.','He shed his identity as if it were old clothing.','He changed his identity like a snake sheds its skin.','Moving gave him a chance to change as if shedding his past.'],h:'Think: directly stating the action of losing an old self',l:6,s:'The Story of Silk',c:'#fb923c'},

{t:'metaphor',w:'inept',q:'Which sentence is a metaphor using INEPT?',a:'Fear made him inept clay, easily shaped into mistakes by the pressure of the moment.',ch:['Fear made him inept clay, easily shaped into mistakes by the pressure of the moment.','Fear made him inept, like clay being shaped wrongly.','He was as inept as clay in the hands of a poor sculptor.','Fear shaped him into mistakes the way a sculptor shapes soft clay.'],h:'Think: calling him directly inept clay — a material that takes the wrong form under pressure',l:8,s:'Sacagawea\'s Great Adventure',c:'#fbbf24'},
{t:'metaphor',w:'interpret',q:'Which sentence is a metaphor using INTERPRET?',a:'A great teacher is an interpreter of the future, reading students today to understand who they will become.',ch:['A great teacher is an interpreter of the future, reading students today to understand who they will become.','A teacher interprets students like a translator interprets languages.','Teaching is as meaningful as interpreting between two languages.','A teacher reads students the way an interpreter reads words.'],h:'Think: calling a teacher directly an interpreter — making them the function itself',l:8,s:'Sacagawea\'s Great Adventure',c:'#fbbf24'},
{t:'metaphor',w:'invaluable',q:'Which sentence is a metaphor using INVALUABLE?',a:'Sacagawea was an invaluable compass — the one fixed point from which all other directions could be found.',ch:['Sacagawea was an invaluable compass — the one fixed point from which all other directions could be found.','She was as invaluable as a compass to explorers.','She guided them like an invaluable compass showing the way.','Her value was as great as a compass to travelers in unknown land.'],h:'Think: calling her directly a compass — merging her value and her guiding function into one image',l:8,s:'Sacagawea\'s Great Adventure',c:'#fbbf24'},
{t:'metaphor',w:'linger',q:'Which sentence is a metaphor using LINGER?',a:'The scent of the Pacific lingered in her dreams — a salty ghost that visited her long after the expedition ended.',ch:['The scent of the Pacific lingered in her dreams — a salty ghost that visited her long after the expedition ended.','The ocean\'s smell lingered like a ghost in her memory.','Its scent lingered as if a ghost had passed through her dreams.','The salty smell was as lingering as a ghost that refuses to leave.'],h:'Think: calling the lingering scent directly a ghost that visits without like or as',l:8,s:'Sacagawea\'s Great Adventure',c:'#fbbf24'},
{t:'metaphor',w:'retrieve',q:'Which sentence is a metaphor using RETRIEVE?',a:'Writing history is an act of retrieval — pulling the past from silence before it sinks beyond reach.',ch:['Writing history is an act of retrieval — pulling the past from silence before it sinks beyond reach.','Writing history is like retrieving the past from a river.','Historians retrieve the past the way a diver retrieves sunken objects.','History writing is as difficult as retrieving things from deep water.'],h:'Think: calling historical writing directly an act of retrieval — the discipline IS the rescue mission',l:8,s:'Sacagawea\'s Great Adventure',c:'#fbbf24'},
{t:'metaphor',w:'skirmish',q:'Which sentence is a metaphor using SKIRMISH?',a:'Each day on the trail was a skirmish with nature, fought in rain and wind and relentless cold.',ch:['Each day on the trail was a skirmish with nature, fought in rain and wind and relentless cold.','Each day was like a small fight against the weather.','The trail felt like a series of skirmishes against natural obstacles.','Nature battled them each day as in a series of skirmishes.'],h:'Think: calling each day directly a skirmish — not comparing but equating',l:8,s:'Sacagawea\'s Great Adventure',c:'#fbbf24'},
{t:'metaphor',w:'supplement',q:'Which sentence is a metaphor using SUPPLEMENT?',a:'Her courage was a daily supplement that kept the expedition\'s spirit from running low.',ch:['Her courage was a daily supplement that kept the expedition\'s spirit from running low.','Her courage supplemented the team like a vitamin boosts health.','She boosted their spirits as if she were a daily dose of courage.','She added to their courage the way vitamins supplement a poor diet.'],h:'Think: calling her courage directly a supplement — essential and regularly consumed',l:8,s:'Sacagawea\'s Great Adventure',c:'#fbbf24'},
{t:'metaphor',w:'territory',q:'Which sentence is a metaphor using TERRITORY?',a:'Language is territory — and Sacagawea commanded more of it than anyone else on the trail.',ch:['Language is territory — and Sacagawea commanded more of it than anyone else on the trail.','Language is like a territory that must be explored.','Speaking many languages is as useful as knowing many territories.','She had command of languages the way a chief commands territory.'],h:'Think: calling language directly territory — something to occupy, control, and navigate',l:8,s:'Sacagawea\'s Great Adventure',c:'#fbbf24'},
{t:'metaphor',w:'accompany',q:'Which sentence is a metaphor using ACCOMPANY?',a:'Doubt was her constant companion — accompanying every step she took through the unknown.',ch:['Doubt was her constant companion — accompanying every step she took through the unknown.','She was accompanied by doubt as a shadow follows a person.','Doubt followed her like a ghost through the wilderness.','Her worries accompanied her the way a dog follows its owner.'],h:'Think: calling doubt directly her companion — a personified presence that travels alongside her',l:8,s:'Sacagawea\'s Great Adventure',c:'#fbbf24'},
{t:'metaphor',w:'beneficial',q:'Which sentence is a metaphor using BENEFICIAL?',a:'Her plant knowledge was a living medicine chest — a beneficial treasury the expedition carried on two legs.',ch:['Her plant knowledge was a living medicine chest — a beneficial treasury the expedition carried on two legs.','Her plant knowledge was beneficial like a well-stocked first-aid kit.','She was as beneficial as a doctor traveling with the group.','Her knowledge helped them the way medicine helps the sick.'],h:'Think: calling her knowledge directly a treasury or medicine chest — a container of valuable things',l:8,s:'Sacagawea\'s Great Adventure',c:'#fbbf24'},
{t:'metaphor',w:'ecstasy',q:'Which sentence is a metaphor using ECSTASY?',a:'The moment the Pacific came into view, the whole company was engulfed in ecstasy — a wave that washed every hardship away.',ch:['The moment the Pacific came into view, the whole company was engulfed in ecstasy — a wave that washed every hardship away.','They felt ecstasy as powerful as an ocean wave crashing over them.','Their joy was like a tidal wave of relief and happiness.','Their ecstasy was as overwhelming as a flood after a long drought.'],h:'Think: calling their ecstasy directly a wave that engulfs — no like or as',l:8,s:'Sacagawea\'s Great Adventure',c:'#fbbf24'},
{t:'metaphor',w:'expanse',q:'Which sentence is a metaphor using EXPANSE?',a:'The Great Plains were a sea of grass — an endless expanse that swallowed the horizon whole.',ch:['The Great Plains were a sea of grass — an endless expanse that swallowed the horizon whole.','The Plains stretched out like an expanse of ocean before them.','The expanse of the Plains seemed as wide as any ocean.','The Plains reminded them of an enormous sea without water.'],h:'Think: calling the Plains directly a sea — not comparing with like but stating it IS',l:8,s:'Sacagawea\'s Great Adventure',c:'#fbbf24'},
{t:'metaphor',w:'captive',q:'Which sentence is a metaphor using CAPTIVE?',a:'Her past was a cage — even when the locks were gone, the captive inside still trembled at open doors.',ch:['Her past was a cage — even when the locks were gone, the captive inside still trembled at open doors.','Her past made her feel as captive as a bird in a cage.','Her history held her like a prisoner in chains.','She was as captive to her past as a caged bird to its bars.'],h:'Think: calling her past directly a cage — her entire history IS the imprisonment',l:8,s:'Sacagawea\'s Great Adventure',c:'#fbbf24'},
{t:'simile',w:'accompany',q:'Complete the simile: Clark\'s dog Seaman accompanied the expedition like ___',a:'a steadfast soldier who never deserts his post no matter the danger',ch:['a steadfast soldier who never deserts his post no matter the danger','a housecat that wanders off whenever something more interesting appears','a stray that follows for a meal and then disappears','a nervous traveler who turns back at the first sign of trouble'],h:'Think: loyal, unwavering presence through all hardships',l:8,s:'Sacagawea\'s Great Adventure',c:'#fbbf24'},
{t:'simile',w:'beneficial',q:'Complete the simile: The supply of dried corn she packed was as beneficial as ___',a:'a spare engine carried on a voyage into uncharted waters',ch:['a spare engine carried on a voyage into uncharted waters','a heavy anchor dragging behind a fast-moving ship','a leaky barrel that spills more than it holds','a fraying rope on the highest part of a sailing mast'],h:'Think: a backup resource that keeps everything moving when the primary fails',l:8,s:'Sacagawea\'s Great Adventure',c:'#fbbf24'},
{t:'simile',w:'ecstasy',q:'Complete the simile: Seeing her brother after years apart, Sacagawea felt ecstasy like ___',a:'sunlight breaking through clouds after a month of cold gray storms',ch:['sunlight breaking through clouds after a month of cold gray storms','a steady drizzle on an already soggy morning','the dull ache of waking too early on a work day','a mild afternoon that is neither cold nor warm'],h:'Think: sudden, overwhelming brightness and warmth after prolonged darkness',l:8,s:'Sacagawea\'s Great Adventure',c:'#fbbf24'},

{t:'metaphor',w:'sustain',q:'Which sentence is a metaphor using SUSTAIN?',a:'Water is the earth\'s bloodstream — it sustains every living thing the way blood sustains every cell.',ch:['Water is the earth\'s bloodstream — it sustains every living thing the way blood sustains every cell.','Water sustains the earth the way blood sustains a body.','The role of water in sustaining the earth is like the role of blood in a living body.','Water sustains life the way blood does — circulating through systems and feeding every part.'],h:'Think: calling water directly the bloodstream — it IS the circulatory system, and it sustains like blood',l:9,s:'Water, Water, Everywhere',c:'#38bdf8'},
{t:'metaphor',w:'sustain',q:'Which sentence is a metaphor using SUSTAIN?',a:'Hope was the raft that sustained them — not comfortable, not safe, but the only thing keeping them above the flood.',ch:['Hope was the raft that sustained them — not comfortable, not safe, but the only thing keeping them above the flood.','Hope sustained them the way a raft sustains a swimmer — imperfect but essential.','They were sustained by hope the way a swimmer is sustained by a raft in rough water.','Hope kept them going the way a raft keeps a person from going under in a flood.'],h:'Think: calling hope directly a raft — the emotion IS the floating device that sustains them',l:9,s:'Water, Water, Everywhere',c:'#38bdf8'},
{t:'metaphor',w:'sustain',q:'Which sentence is a metaphor using SUSTAIN?',a:'The cheers of the crowd were oxygen — sustaining the runner through the final mile when her legs had nothing left.',ch:['The cheers of the crowd were oxygen — sustaining the runner through the final mile when her legs had nothing left.','The crowd\'s cheers sustained her the way oxygen sustains a runner\'s muscles.','She was sustained by the crowd\'s cheering as a runner is sustained by a fresh supply of oxygen.','The cheers worked like oxygen, sustaining her energy when her body had nearly given out.'],h:'Think: calling the cheers directly oxygen — the emotional support IS the gas that sustains physical life',l:9,s:'Water, Water, Everywhere',c:'#38bdf8'},
{t:'metaphor',w:'vital',q:'Which sentence is a metaphor using VITAL?',a:'Water is not a resource — it is a vital organ, and we have been slowly removing it from the body of the earth.',ch:['Water is not a resource — it is a vital organ, and we have been slowly removing it from the body of the earth.','Water is so vital that removing it from the earth is like removing an organ from a body.','Without water, the earth is as vulnerable as a body without one of its vital organs.','Destroying the water supply is as dangerous as removing a vital organ from a living creature.'],h:'Think: calling water directly a vital organ — not comparing it to one, but saying it IS one, embedded in the earth\'s body',l:9,s:'Water, Water, Everywhere',c:'#38bdf8'},
{t:'metaphor',w:'vital',q:'Which sentence is a metaphor using VITAL?',a:'She was the vital spark of the project — without her energy, the whole engine would have gone cold.',ch:['She was the vital spark of the project — without her energy, the whole engine would have gone cold.','She was so vital to the project that losing her would be like losing a spark in an engine.','Her contribution was as vital to the project as a spark is to an engine.','The project depended on her the way an engine depends on a spark to keep running.'],h:'Think: calling her directly a spark — the person IS the vital ignition source',l:9,s:'Water, Water, Everywhere',c:'#38bdf8'},
{t:'metaphor',w:'vital',q:'Which sentence is a metaphor using VITAL?',a:'Conservation is not an option — it is the vital sign that tells us whether the planet is still alive.',ch:['Conservation is not an option — it is the vital sign that tells us whether the planet is still alive.','Conservation is as vital a sign of planetary health as a heartbeat is of a living person.','The conservation rate is as vital to the earth\'s health as a vital sign is to a patient.','Like a doctor checking vital signs, we must check conservation rates to know if the planet is healthy.'],h:'Think: calling conservation directly a vital sign — the practice IS the diagnostic indicator of planetary life',l:9,s:'Water, Water, Everywhere',c:'#38bdf8'},

{t:'simile',w:'unique',q:'Complete the simile: The inventor\'s idea was as unique as ___',a:'a fingerprint — no two alike in all the world, and no way to fake one',ch:['a fingerprint — no two alike in all the world, and no way to fake one','a factory stamp placed on every product to show it came from the same machine','a serial number shared by items that rolled off the same production line','a design copied so many times that the original cannot be traced'],h:'Think: absolutely individual — not similar to anything else, identifiable as only itself',l:10,s:'Fun and Games',c:'#c084fc'},

{t:'metaphor',w:'anticipate',q:'Which sentence is a metaphor using ANTICIPATE?',a:'The inventor\'s excitement was a hound on a scent — nose down, already anticipating the prize before the hunt had begun.',ch:['The inventor\'s excitement was a hound on a scent — nose down, already anticipating the prize before the hunt had begun.','He was as eager as a hunting dog that already anticipated the prize.','The inventor anticipated the prize the way a hound anticipates the scent.','Like a dog that has caught the scent, the inventor anticipated success before the hunt was over.'],h:'Think: calling the inventor\'s excitement directly a hound — no like or as — already anticipating',l:10,s:'Fun and Games',c:'#c084fc'},
{t:'metaphor',w:'anticipate',q:'Which sentence is a metaphor using ANTICIPATE?',a:'Hope is a forecast — always anticipating the sunshine even when the clouds are piling up.',ch:['Hope is a forecast — always anticipating the sunshine even when the clouds are piling up.','Hope is like a weather forecast that anticipates sunshine even when clouds gather.','He anticipated the best the way a hopeful forecaster predicts sunshine despite clouds.','She anticipated success the way a sunny forecast anticipates a beautiful afternoon.'],h:'Think: calling hope directly a forecast — no like or as — it IS the prediction of something good',l:10,s:'Fun and Games',c:'#c084fc'},
{t:'metaphor',w:'anticipate',q:'Which sentence is a metaphor using ANTICIPATE?',a:'Every good game designer is a mind reader — anticipating what the player will try before the player knows it themselves.',ch:['Every good game designer is a mind reader — anticipating what the player will try before the player knows it themselves.','A good game designer anticipates the player\'s moves like a mind reader would.','The designer was as good at anticipating players\' choices as a skilled mind reader.','Like a mind reader, the designer anticipated moves that players had not yet considered.'],h:'Think: calling the designer directly a mind reader — anticipating others\' thoughts is the defining skill',l:10,s:'Fun and Games',c:'#c084fc'},
{t:'metaphor',w:'bankrupt',q:'Which sentence is a metaphor using BANKRUPT?',a:'The fad was a sunset — dazzling for a moment, then bankrupt of color, leaving only the dark.',ch:['The fad was a sunset — dazzling for a moment, then bankrupt of color, leaving only the dark.','The fad faded as quickly as a sunset, bankrupt of color almost before it arrived.','Like a sunset, the fad was bankrupt of its brilliant colors by the time night fell.','The fad disappeared like a sunset — brilliant first, then bankrupt of all its brightness.'],h:'Think: calling the fad directly a sunset — it IS the visual experience of going suddenly bankrupt of color',l:10,s:'Fun and Games',c:'#c084fc'},
{t:'metaphor',w:'bankrupt',q:'Which sentence is a metaphor using BANKRUPT?',a:'The company was a hollow shell — bankrupt not just of money but of ideas, leadership, and will.',ch:['The company was a hollow shell — bankrupt not just of money but of ideas, leadership, and will.','The company was as bankrupt of ideas as a hollow shell with nothing left inside.','Like a hollow shell, the bankrupt company had nothing left inside it.','The company reminded us of a hollow shell — empty and bankrupt in every possible way.'],h:'Think: calling the company directly a hollow shell — the company IS the empty container, bankrupt of everything',l:10,s:'Fun and Games',c:'#c084fc'},
{t:'metaphor',w:'brief',q:'Which sentence is a metaphor using BRIEF?',a:'Every fad is a comet — brief, brilliant, and impossible to hold.',ch:['Every fad is a comet — brief, brilliant, and impossible to hold.','Every fad is as brief as a comet passing through the sky.','Like a comet, a fad has only a brief time in the spotlight.','A fad comes and goes as briefly as a comet crossing the night sky.'],h:'Think: calling every fad directly a comet — the fad IS the brief, dazzling object passing through the sky',l:10,s:'Fun and Games',c:'#c084fc'},
{t:'metaphor',w:'brief',q:'Which sentence is a metaphor using BRIEF?',a:'The toy\'s fame was a spark — brief, bright, and swallowed by the dark before anyone had quite finished admiring it.',ch:['The toy\'s fame was a spark — brief, bright, and swallowed by the dark before anyone had quite finished admiring it.','The toy\'s fame was as brief as a spark — gone almost as soon as it appeared.','Like a spark, the toy\'s fame was brief and bright before disappearing.','The toy\'s fame was so brief it was like watching a spark ignite and go out.'],h:'Think: calling the toy\'s fame directly a spark — the fame IS the brief, bright combustion',l:10,s:'Fun and Games',c:'#c084fc'},
{t:'metaphor',w:'brief',q:'Which sentence is a metaphor using BRIEF?',a:'Her briefing to the board was a knife — brief, precise, and cutting straight to the point.',ch:['Her briefing to the board was a knife — brief, precise, and cutting straight to the point.','Her briefing was as brief and precise as a sharp knife cutting to the point.','Like a knife, her presentation was brief and got straight to what mattered.','She briefed the board as quickly as a knife cuts — brief and straight to the point.'],h:'Think: calling the briefing directly a knife — the presentation IS the cutting instrument',l:10,s:'Fun and Games',c:'#c084fc'},
{t:'metaphor',w:'brisk',q:'Which sentence is a metaphor using BRISK?',a:'The new CEO was a cold front — brisk, energizing, and leaving everyone sharper and more focused in her wake.',ch:['The new CEO was a cold front — brisk, energizing, and leaving everyone sharper and more focused in her wake.','The new CEO was as brisk as a cold front that refreshed everyone it passed through.','Like a cold front, the CEO was brisk and left everyone feeling more focused.','She was brisk in her style, like a cold front that sweeps through and refreshes the air.'],h:'Think: calling the CEO directly a cold front — she IS the brisk weather event that changes the atmosphere',l:10,s:'Fun and Games',c:'#c084fc'},
{t:'metaphor',w:'brisk',q:'Which sentence is a metaphor using BRISK?',a:'Holiday shopping season was a brisk tide — pulling everyone in before they could decide whether they wanted to go.',ch:['Holiday shopping season was a brisk tide — pulling everyone in before they could decide whether they wanted to go.','Holiday shopping season was as brisk as a tide that pulls everyone toward the shore.','Like a brisk tide, the holiday shopping season swept everyone up in its current.','The holiday shopping season moved briskly, like a tide pulling shoppers toward the stores.'],h:'Think: calling the shopping season directly a tide — it IS the brisk current that pulls people along',l:10,s:'Fun and Games',c:'#c084fc'},
{t:'metaphor',w:'budget',q:'Which sentence is a metaphor using BUDGET?',a:'The company\'s budget was a fence — every dollar on the wrong side of it was a loss that could not be undone.',ch:['The company\'s budget was a fence — every dollar on the wrong side of it was a loss that could not be undone.','The budget was like a fence — cross it and you have gone too far.','Like a fence, the budget marked the boundary between safe spending and dangerous excess.','The budget functioned like a fence, keeping the company\'s expenses within the safe zone.'],h:'Think: calling the budget directly a fence — the number IS the boundary that separates safety from ruin',l:10,s:'Fun and Games',c:'#c084fc'},
{t:'metaphor',w:'budget',q:'Which sentence is a metaphor using BUDGET?',a:'Their advertising budget was a loaded cannon — not much use if you aimed it wrong.',ch:['Their advertising budget was a loaded cannon — not much use if you aimed it wrong.','Their advertising budget was like a cannon — powerful if aimed correctly.','Like a cannon, their budget was only useful if pointed at the right target.','Their budget, like a loaded cannon, had to be aimed properly to have any effect.'],h:'Think: calling the budget directly a cannon — the money IS the weapon, and aim determines outcome',l:10,s:'Fun and Games',c:'#c084fc'},
{t:'metaphor',w:'compete',q:'Which sentence is a metaphor using COMPETE?',a:'The holiday toy market was a gladiatorial arena — every brand a competitor fighting for the child\'s final attention.',ch:['The holiday toy market was a gladiatorial arena — every brand a competitor fighting for the child\'s final attention.','The holiday toy market was like a gladiatorial arena where brands competed for children\'s attention.','Like gladiators, toy companies competed in the holiday market for the children\'s choice.','The toy market was so competitive it resembled a gladiatorial arena where only one could win.'],h:'Think: calling the market directly an arena — the commercial space IS the battlefield where competitors fight',l:10,s:'Fun and Games',c:'#c084fc'},
{t:'metaphor',w:'compete',q:'Which sentence is a metaphor using COMPETE?',a:'Every inventor was a runner on the same track — competing not just for the prize but for the right to stay in the race.',ch:['Every inventor was a runner on the same track — competing not just for the prize but for the right to stay in the race.','Every inventor competed like a runner on the same track, fighting for position.','Like runners, inventors competed with one another for the chance to win.','Each inventor competed as fiercely as a runner who knows only the first finisher will be noticed.'],h:'Think: calling each inventor directly a runner — the person IS the competitor in the foot race, not compared to one',l:10,s:'Fun and Games',c:'#c084fc'},
{t:'metaphor',w:'complicate',q:'Which sentence is a metaphor using COMPLICATE?',a:'Adding a third manufacturer was a wrench thrown into the gears — complicating a process that had been running smoothly.',ch:['Adding a third manufacturer was a wrench thrown into the gears — complicating a process that had been running smoothly.','Adding a third manufacturer was like throwing a wrench into well-running gears.','Like a wrench in the gears, the third manufacturer complicated the process.','The third manufacturer was as disruptive as a wrench thrown into the machinery.'],h:'Think: calling the new manufacturer directly a wrench — the decision IS the thing that jams the mechanism',l:10,s:'Fun and Games',c:'#c084fc'},
{t:'metaphor',w:'complicate',q:'Which sentence is a metaphor using COMPLICATE?',a:'The patent dispute was a tangle of wire — the more they pulled at it, the more complicated it became.',ch:['The patent dispute was a tangle of wire — the more they pulled at it, the more complicated it became.','The patent dispute was as complicated as a tangle of wire that gets worse when you pull it.','Like a tangle of wire, the patent dispute became more complicated the more they tried to resolve it.','The dispute was so complicated it felt like pulling a tangle of wire that only tightened.'],h:'Think: calling the dispute directly a tangle — the legal conflict IS the knotted wire that resists untangling',l:10,s:'Fun and Games',c:'#c084fc'},
{t:'metaphor',w:'effect',q:'Which sentence is a metaphor using EFFECT?',a:'The right advertisement is a key — it effects an opening in the consumer\'s attention that nothing else can unlock.',ch:['The right advertisement is a key — it effects an opening in the consumer\'s attention that nothing else can unlock.','The right advertisement is like a key that effects an opening in the consumer\'s attention.','Like a key, the right advertisement effects an unlocking of attention in the consumer.','The advertisement worked like a key, effecting an opening that no other approach could make.'],h:'Think: calling the advertisement directly a key — the ad IS the key, and it effects an opening',l:10,s:'Fun and Games',c:'#c084fc'},
{t:'metaphor',w:'effect',q:'Which sentence is a metaphor using EFFECT?',a:'A skilled inventor\'s pitch is a stone dropped in still water — the effects spread outward long after the stone has sunk.',ch:['A skilled inventor\'s pitch is a stone dropped in still water — the effects spread outward long after the stone has sunk.','A skilled inventor\'s pitch is like a stone dropped in water — the effects ripple outward.','Like a stone in still water, the pitch sent effects rippling outward in every direction.','The pitch spread its effects the way a stone sends ripples across still water.'],h:'Think: calling the pitch directly a stone — the presentation IS the stone, and its effects are the ripples',l:10,s:'Fun and Games',c:'#c084fc'},
{t:'metaphor',w:'err',q:'Which sentence is a metaphor using ERR?',a:'To err in a product launch is to fire a cannon in the wrong direction — the energy is real, but the target was never yours to hit.',ch:['To err in a product launch is to fire a cannon in the wrong direction — the energy is real, but the target was never yours to hit.','To err in a product launch is like firing a cannon in the wrong direction.','Like a misfired cannon, erring in a product launch sends energy in the wrong direction.','An error in a product launch is as costly as a cannon shot aimed at the wrong target.'],h:'Think: calling the error directly the act of misfiring — no like or as, just the equation itself',l:10,s:'Fun and Games',c:'#c084fc'},
{t:'metaphor',w:'err',q:'Which sentence is a metaphor using ERR?',a:'Their erroneous forecast was a false map — confidently drawn, cheerfully followed, and pointing nowhere near the destination.',ch:['Their erroneous forecast was a false map — confidently drawn, cheerfully followed, and pointing nowhere near the destination.','Their erroneous forecast was like a false map that confidently pointed in the wrong direction.','Like a false map, their erroneous forecast led them away from rather than toward success.','The forecast was so erroneous it functioned like a map drawn for the wrong country.'],h:'Think: calling the forecast directly a false map — the error IS the misdirection, confidently delivered',l:10,s:'Fun and Games',c:'#c084fc'},
{t:'metaphor',w:'factor',q:'Which sentence is a metaphor using FACTOR?',a:'Timing is not just a factor — it is the tide, and you either launch with it or you are left stranded on the sand.',ch:['Timing is not just a factor — it is the tide, and you either launch with it or you are left stranded on the sand.','Timing is like a tide — a crucial factor in whether your launch succeeds.','Like a tide, timing is the kind of factor that determines whether you float or strand.','Timing is such a crucial factor that it is almost like a tide pulling products to success or failure.'],h:'Think: calling timing directly the tide — not a factor in the normal sense but the tide itself',l:10,s:'Fun and Games',c:'#c084fc'},
{t:'metaphor',w:'factor',q:'Which sentence is a metaphor using FACTOR?',a:'Price was the silent factor at every meeting — an invisible hand on the scale that tipped every decision.',ch:['Price was the silent factor at every meeting — an invisible hand on the scale that tipped every decision.','Price was like a silent factor — an invisible force that influenced every decision made.','Like a hidden weight on a scale, price was the factor that tipped every decision.','Price was such a powerful factor in every meeting that it was like an invisible hand on the scale.'],h:'Think: calling price directly a hand — the abstract factor IS the physical agent tipping the balance',l:10,s:'Fun and Games',c:'#c084fc'},
{t:'metaphor',w:'fad',q:'Which sentence is a metaphor using FAD?',a:'Every fad is a bonfire on the beach — the crowd gathers fast, burns through the night, and by morning there is only ash.',ch:['Every fad is a bonfire on the beach — the crowd gathers fast, burns through the night, and by morning there is only ash.','Every fad is like a bonfire — it draws a crowd and burns brightly before going out.','Like a beach bonfire, a fad draws everyone in quickly and burns through its fuel fast.','A fad is as brief as a beach bonfire — exciting while it lasts but gone by morning.'],h:'Think: calling every fad directly a bonfire — the fad IS the fire, and it burns itself out exactly like one',l:10,s:'Fun and Games',c:'#c084fc'},
{t:'metaphor',w:'fad',q:'Which sentence is a metaphor using FAD?',a:'The toy that captured the world\'s attention was not a classic — it was a shooting star, a fad that lit up and burned out in a single season.',ch:['The toy that captured the world\'s attention was not a classic — it was a shooting star, a fad that lit up and burned out in a single season.','The toy was like a shooting star fad — bright for a moment and then gone.','Like a shooting star, the toy was the kind of fad that lights up and disappears quickly.','The toy burned out as fast as a shooting star, confirming what many suspected about its fad status.'],h:'Think: calling the toy directly a shooting star and then a fad — the toy IS the brief celestial event',l:10,s:'Fun and Games',c:'#c084fc'},
{t:'metaphor',w:'fad',q:'Which sentence is a metaphor using FAD?',a:'Fashion is a river of fads — always moving, always bringing something new downstream, always carrying the old things away.',ch:['Fashion is a river of fads — always moving, always bringing something new downstream, always carrying the old things away.','Fashion is like a river of fads, always carrying new things in and old things away.','Like a river, fashion brings fads downstream and carries them away when they are spent.','Fashion moves like a river — fads arrive from upstream and are carried away just as quickly.'],h:'Think: calling fashion directly a river — the entire industry IS the flowing water, and fads are what it carries',l:10,s:'Fun and Games',c:'#c084fc'},
{t:'metaphor',w:'gripe',q:'Which sentence is a metaphor using GRIPE?',a:'His gripe was a stuck gear — grinding against every smooth operation, slowing what should have moved freely.',ch:['His gripe was a stuck gear — grinding against every smooth operation, slowing what should have moved freely.','His gripe was like a stuck gear that ground against the smooth operation of the team.','Like a stuck gear, his constant gripes slowed down what should have moved freely.','His gripe functioned like a stuck gear, grinding against the otherwise smooth process.'],h:'Think: calling the gripe directly a stuck gear — the complaint IS the mechanical obstruction',l:10,s:'Fun and Games',c:'#c084fc'},
{t:'metaphor',w:'gripe',q:'Which sentence is a metaphor using GRIPE?',a:'The employees\' gripes were a signal flare — ignored for months, then suddenly impossible to overlook when they lit the sky.',ch:['The employees\' gripes were a signal flare — ignored for months, then suddenly impossible to overlook when they lit the sky.','The employees\' gripes were like signal flares that eventually became impossible to ignore.','Like signal flares, the gripes were ignored for months before they lit up the sky.','Their gripes were as hard to ignore as a signal flare once they finally sent them up.'],h:'Think: calling the gripes directly a signal flare — the complaints ARE the distress signal, ignored then impossible to miss',l:10,s:'Fun and Games',c:'#c084fc'},
{t:'metaphor',w:'knack',q:'Which sentence is a metaphor using KNACK?',a:'She had a knack for the business that was a compass needle — always finding true north while others spun in circles.',ch:['She had a knack for the business that was a compass needle — always finding true north while others spun in circles.','She had a knack for finding the right direction like a compass needle always pointing north.','Like a compass needle, her knack for business always pointed her in the right direction.','Her knack for business was as reliable as a compass needle that always finds true north.'],h:'Think: calling her knack directly a compass needle — the skill IS the navigation instrument',l:10,s:'Fun and Games',c:'#c084fc'},
{t:'metaphor',w:'knack',q:'Which sentence is a metaphor using KNACK?',a:'His knack for spotting trends was a sixth sense — processing what others could not see and delivering verdicts before the data arrived.',ch:['His knack for spotting trends was a sixth sense — processing what others could not see and delivering verdicts before the data arrived.','His knack for spotting trends was like a sixth sense that gave him data before anyone else had it.','Like a sixth sense, his knack for trend-spotting gave him information that others simply could not access.','He had such a knack for spotting trends that it was almost as if he possessed a sixth sense.'],h:'Think: calling the knack directly a sixth sense — the skill IS the extra-perceptual ability, not merely like one',l:10,s:'Fun and Games',c:'#c084fc'},
{t:'metaphor',w:'knack',q:'Which sentence is a metaphor using KNACK?',a:'Her knack for game design was a skeleton key — opening every locked door between an idea and a finished product.',ch:['Her knack for game design was a skeleton key — opening every locked door between an idea and a finished product.','Her knack for game design was like a skeleton key that opened every locked door.','Like a skeleton key, her knack for design could open any obstacle between idea and product.','She had such a knack for design that it functioned like a skeleton key, opening everything.'],h:'Think: calling her knack directly a skeleton key — the skill IS the master key that unlocks all obstacles',l:10,s:'Fun and Games',c:'#c084fc'},
{t:'metaphor',w:'leisure',q:'Which sentence is a metaphor using LEISURE?',a:'Free time was a foreign country to her — leisure was a language she had never been taught to speak.',ch:['Free time was a foreign country to her — leisure was a language she had never been taught to speak.','Free time was as foreign to her as a country she had never visited and whose language she did not know.','Like a foreign country, her free time was a kind of leisure she found difficult to navigate.','She approached her leisure time the way a traveler approaches a foreign country — unfamiliar and unpracticed.'],h:'Think: calling free time directly a foreign country and leisure a language — leisure IS the unknown territory',l:10,s:'Fun and Games',c:'#c084fc'},
{t:'metaphor',w:'leisure',q:'Which sentence is a metaphor using LEISURE?',a:'Sunday afternoon was the only pocket of leisure in a week that was otherwise a grinding machine.',ch:['Sunday afternoon was the only pocket of leisure in a week that was otherwise a grinding machine.','Sunday afternoon provided her with leisure in a week that was as relentless as a grinding machine.','Like a brief pocket of air in a week that ground her down, Sunday afternoon offered leisure.','Her Sunday leisure was as welcome as a rest stop in a week as relentless as a grinding machine.'],h:'Think: calling the week directly a grinding machine — the non-leisure time IS the mechanized, relentless process',l:10,s:'Fun and Games',c:'#c084fc'},
{t:'metaphor',w:'leisure',q:'Which sentence is a metaphor using LEISURE?',a:'For the veteran toy inventor, leisure was a well — deep, refreshing, and visited only when the creative supply had run dry.',ch:['For the veteran toy inventor, leisure was a well — deep, refreshing, and visited only when the creative supply had run dry.','For the inventor, leisure was like a well — visited when creativity ran dry and left refreshed.','Like a well, leisure was something the inventor returned to when she needed to restore her creative supply.','Her leisure time was so refreshing it was like drawing water from a very deep and cool well.'],h:'Think: calling leisure directly a well — the free time IS the water source that replenishes creative work',l:10,s:'Fun and Games',c:'#c084fc'},

{t:'metaphor',w:'unique',q:'Which sentence is a metaphor using UNIQUE?',a:'Her design was a fingerprint — unique, unreplicable, and belonging to no one but her.',ch:['Her design was a fingerprint — unique, unreplicable, and belonging to no one but her.','Her design was as unique as a fingerprint — impossible to copy exactly.','Like a fingerprint, her design was unique and could not be replicated by anyone else.','The design was so unique it was almost like a fingerprint — completely impossible to duplicate.'],h:'Think: calling her design directly a fingerprint — the creation IS the unique biological identifier',l:10,s:'Fun and Games',c:'#c084fc'},

{t:'analogy',w:'possess',q:'POSSESS is to HAVE as LACK is to ___',a:'want',ch:['want','own','hold','keep'],h:'Think: possess = have; lack = want (be without) — antonym pair',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},

{t:'analogy',w:'resolute',q:'RESOLUTE is to DETERMINED as WAVERING is to ___',a:'uncertain',ch:['uncertain','firm','steadfast','committed'],h:'Think: resolute = determined; wavering = uncertain — antonym pair',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'analogy',w:'resolute',q:'RESOLUTE is to IRON as WEAK-WILLED is to ___',a:'paper',ch:['paper','steel','rock','granite'],h:'Think: resolute strength is like iron — hard, unyielding; weak-willed is like paper — thin, easily bent',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'analogy',w:'sneer',q:'SNEER is to SCORN as SMILE is to ___',a:'warmth',ch:['warmth','contempt','mockery','hatred'],h:'Think: a sneer expresses scorn; a smile expresses warmth — emotion expressed by facial gesture',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'analogy',w:'sneer',q:'SNEER is to MOCK as COMPLIMENT is to ___',a:'praise',ch:['praise','insult','taunt','ridicule'],h:'Think: to sneer is to mock; to compliment is to praise — opposite intents',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'analogy',w:'unanimous',q:'UNANIMOUS is to ALL as MAJORITY is to ___',a:'most',ch:['most','none','some','few'],h:'Think: unanimous = all agree; majority = most agree — degrees of agreement',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'analogy',w:'unanimous',q:'UNANIMOUS is to AGREEMENT as DIVIDED is to ___',a:'disagreement',ch:['disagreement','consensus','unity','accord'],h:'Think: unanimous = agreement; divided = disagreement — antonym pair',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
