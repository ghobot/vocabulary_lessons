{t:'analogy',w:'unruly',q:'UNRULY HAIR is to TANGLE as COMBED HAIR is to ___',a:'neat',ch:['neat','messy','wild','knotted'],h:'Think: unruly hair is tangled; combed hair is neat — opposite conditions',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'analogy',w:'unruly',q:'UNRULY is to DISCIPLINE as RECKLESS is to ___',a:'caution',ch:['caution','chaos','disorder','wildness'],h:'Think: unruly = lacking discipline; reckless = lacking caution — each word names what\'s missing',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'simile',w:'abbreviate',q:'Complete the simile: She abbreviated the speech as efficiently as ___',a:'a surgeon who cuts only what needs to come out — precise, no excess',ch:['a surgeon who cuts only what needs to come out — precise, no excess','a chef who adds ingredients at random','a painter who leaves the canvas completely blank','someone who reads every footnote before writing a single sentence'],h:'Think: abbreviating is surgical — removing exactly what isn\'t needed, leaving exactly what is',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'simile',w:'abbreviate',q:'Complete the simile: His abbreviated notes were like ___',a:'a treasure map — stripped to bare essentials, useless to anyone who didn\'t already know the territory',ch:['a treasure map — stripped to bare essentials, useless to anyone who didn\'t already know the territory','a dictionary — long, detailed, and filled with examples','an encyclopedia — covering every angle of the subject','a novel — every detail present and accounted for'],h:'Think: abbreviated notes are compressed codes — meaningful only to the one who made them',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'simile',w:'appropriate',q:'Complete the simile: Her response at the ceremony was as appropriate as ___',a:'a key sliding perfectly into its lock — the right shape for the right moment',ch:['a key sliding perfectly into its lock — the right shape for the right moment','a hammer swung at a glass window','a book opened to the wrong chapter','a shout in an empty library'],h:'Think: appropriate = perfect fit — like the right key for the lock',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'simile',w:'appropriate',q:'Complete the simile: Wearing a tuxedo to a beach picnic is about as appropriate as ___',a:'bringing a snowplow to clear a path in the Sahara',ch:['bringing a snowplow to clear a path in the Sahara','dressing in a swimsuit for a swim meet','bringing sunscreen on a beach day','wearing boots on a hiking trail'],h:'Think: wildly wrong for the environment — like using a tool completely inappropriate for the setting',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'simile',w:'appropriate',q:'His tone at the meeting was as appropriate as ___',a:'a quiet knock — enough to be noticed, not enough to alarm',ch:['a quiet knock — enough to be noticed, not enough to alarm','a fire alarm ringing during a meditation session','a shout echoing through an empty cathedral','a loud horn honked in a hospital hallway'],h:'Think: appropriateness is calibrated to the setting — just enough, never too much',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'simile',w:'exclude',q:'Complete the simile: Being excluded from the group felt like ___',a:'standing outside in the cold with your face pressed to a warm window',ch:['standing outside in the cold with your face pressed to a warm window','being invited to sit in the best seat at the table','walking through the front door to a chorus of cheers','finding your name written first on the guest list'],h:'Think: exclusion = close enough to see what you\'re missing, too far to be part of it',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'simile',w:'exclude',q:'Complete the simile: He was excluded from the plan as completely as ___',a:'a wrong piece excluded from a jigsaw puzzle — the shape simply doesn\'t fit',ch:['a wrong piece excluded from a jigsaw puzzle — the shape simply doesn\'t fit','the last piece of a puzzle that clicks perfectly into place','a cornerstone that holds the whole structure together','the key ingredient in a recipe that makes everything work'],h:'Think: exclusion = wrong fit — like a wrong puzzle piece that cannot be forced in',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'simile',w:'fanciful',q:'Complete the simile: Her ideas drifted through the meeting like ___',a:'soap bubbles — beautiful, fanciful, and gone before anyone could grasp them',ch:['soap bubbles — beautiful, fanciful, and gone before anyone could grasp them','bricks being carefully mortared into a wall','a blueprint being measured and redrawn until perfect','facts in a scientific report — precise and verifiable'],h:'Think: fanciful ideas are like soap bubbles — lovely but without substance, they vanish when tested',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'simile',w:'fanciful',q:'Complete the simile: His fanciful invention plan was as grounded as ___',a:'a castle built entirely out of clouds',ch:['a castle built entirely out of clouds','a bridge made of reinforced steel','a foundation poured six feet into bedrock','a house built from stone quarried on site'],h:'Think: fanciful = not grounded in reality — like a castle in the clouds with no foundation',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'simile',w:'futile',q:'Complete the simile: Their attempts to change her mind were as futile as ___',a:'trying to empty the ocean with a teaspoon — each effort tiny against the immensity of the task',ch:['trying to empty the ocean with a teaspoon — each effort tiny against the immensity of the task','following a well-marked trail with a reliable map','using the right tool for the right job at the right moment','pushing on a door that someone has already opened for you'],h:'Think: futile = effort with no possible result — like trying to empty the ocean with a teaspoon',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'simile',w:'futile',q:'Complete the simile: Arguing with him was as futile as ___',a:'shouting at a stone wall — it hears you and does not change',ch:['shouting at a stone wall — it hears you and does not change','knocking on a door that someone answers immediately','planting a seed in soil that yields a harvest','sending a letter that arrives and gets a reply'],h:'Think: futile argument = no response, no change — like shouting at a wall',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'simile',w:'futile',q:'Complete the simile: His search for the missing key was as futile as ___',a:'hunting for a single snowflake in a blizzard',ch:['hunting for a single snowflake in a blizzard','finding your keys right where you left them','following a trail of breadcrumbs directly to the answer','reading the last page of a book to solve the mystery'],h:'Think: futile search = looking for something essentially impossible to find in that environment',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'simile',w:'grudge',q:'Complete the simile: She carried that grudge like ___',a:'a stone in her shoe — small enough to ignore at first, too painful to walk on for long',ch:['a stone in her shoe — small enough to ignore at first, too painful to walk on for long','a feather she could set down and forget at any moment','a bright torch that lit her path forward','a map that guided her toward forgiveness'],h:'Think: a grudge causes continuous low-level pain — like a stone in your shoe with every step',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'simile',w:'grudge',q:'Complete the simile: His grudge against the school clung to him like ___',a:'a burr on a wool sweater — invisible to everyone else, but he felt every sharp point',ch:['a burr on a wool sweater — invisible to everyone else, but he felt every sharp point','morning dew that evaporates as soon as the sun rises','a loose button that falls off and is quickly forgotten','a light jacket easy to shrug off on a warm day'],h:'Think: a grudge sticks and irritates — like a burr, you can\'t easily shake it loose',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'simile',w:'inspire',q:'Complete the simile: Her courage inspired the crowd like ___',a:'a spark dropped into dry kindling — one small act and then everything alight',ch:['a spark dropped into dry kindling — one small act and then everything alight','a bucket of water poured on a smoldering fire','a heavy stone dropped into a still pond with no ripple','a cloud passing over the sun, casting everything into shadow'],h:'Think: to inspire is to ignite others — one spark, then everything catches fire',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'simile',w:'inspire',q:'Complete the simile: Blackwell\'s story inspires women today like ___',a:'a lighthouse inspires sailors lost in the fog — visible from a distance, guiding them safely home',ch:['a lighthouse inspires sailors lost in the fog — visible from a distance, guiding them safely home','a storm that disorients every ship in its path','a fog that hides the shore from view','a current that pulls ships away from their destination'],h:'Think: to inspire is to show the way — like a lighthouse cutting through fog',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'simile',w:'inspire',q:'Complete the simile: He was inspired by her perseverance like ___',a:'a wilting plant given water after a long drought — suddenly upright, suddenly alive',ch:['a wilting plant given water after a long drought — suddenly upright, suddenly alive','a plant left in full sun without water for another week','a seed that never receives rain and fails to germinate','a garden abandoned and left to dry out completely'],h:'Think: inspiration revives you — like water reviving a wilting plant',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'simile',w:'majority',q:'Complete the simile: The majority of the students agreed like ___',a:'a river flowing steadily in one direction — individual drops, one current',ch:['a river flowing steadily in one direction — individual drops, one current','water spilled in every direction with no clear flow','a crossroads where every traveler takes a different road','a wind that shifts with every passing minute'],h:'Think: majority = many moving the same way — like a river with one unified current',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'simile',w:'majority',q:'Complete the simile: Winning the majority vote felt like ___',a:'the tide finally turning after a long upstream battle',ch:['the tide finally turning after a long upstream battle','swimming against a current that only gets stronger','watching the tide pull everything farther from shore','rowing in circles with no wind to fill the sails'],h:'Think: a majority win = the force of numbers finally on your side — like a turning tide',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'simile',w:'persevere',q:'Complete the simile: Blackwell persevered through rejections like ___',a:'a river carving its path through rock — not by force alone, but by never stopping',ch:['a river carving its path through rock — not by force alone, but by never stopping','a stream that dries up at the first sign of summer heat','a flood that sweeps everything away in a single rush','a river that turns back whenever it hits a large stone'],h:'Think: perseverance is like water on rock — patient, persistent, unstoppable over time',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'simile',w:'persevere',q:'Complete the simile: He persevered through every obstacle as stubbornly as ___',a:'a seed pushing through frozen ground toward the light',ch:['a seed pushing through frozen ground toward the light','a seed that waits for the soil to be perfectly warm before germinating','a plant that wilts at the first cold night of autumn','a flower that blooms only when conditions are ideal'],h:'Think: perseverance = life force pushing upward no matter the conditions',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'simile',w:'persevere',q:'Complete the simile: She persevered through the program like ___',a:'a ship pushing through pack ice — slowly, steadily, and without turning back',ch:['a ship pushing through pack ice — slowly, steadily, and without turning back','a ship that drops anchor at the first sign of rough weather','a boat that turns back when it sees ice on the horizon','a sailor who waits in port until conditions are perfect'],h:'Think: perseverance requires steady forward motion against resistance — like a ship in pack ice',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'simile',w:'possess',q:'Complete the simile: She possessed a determination as solid as ___',a:'granite — nothing could chip it away or change its shape',ch:['granite — nothing could chip it away or change its shape','wet sand — firm enough to stand on but shifting with the tide','thin ice — beautiful until it cracks under pressure','dry leaves — light and scattered by the first strong wind'],h:'Think: to possess real determination is to have something solid and permanent — like granite',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'simile',w:'possess',q:'Complete the simile: The fear that possessed him spread like ___',a:'cold fog creeping into every corner of the room until there was no warm place left',ch:['cold fog creeping into every corner of the room until there was no warm place left','sunlight streaming through a window, warming everything it touched','a fire that burned bright and then quickly consumed itself','morning dew that evaporates the moment the sun arrives'],h:'Think: to be possessed by fear is total — it fills every space, like fog in every corner',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'simile',w:'prejudice',q:'Complete the simile: His prejudice blinded him like ___',a:'cataracts on an eye — he thought he was seeing clearly, but everything was distorted',ch:['cataracts on an eye — he thought he was seeing clearly, but everything was distorted','a perfectly polished lens that brings every detail into focus','glasses that sharpen the edges of every object','eyes wide open in bright morning light'],h:'Think: prejudice distorts your vision — like cataracts, you don\'t realize how much you\'re missing',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'simile',w:'prejudice',q:'Complete the simile: Her prejudice against women in medicine was as stubborn as ___',a:'a rust stain that scrubbing only seems to spread',ch:['a rust stain that scrubbing only seems to spread','morning frost that melts completely the moment the sun appears','a shadow that shrinks the moment you turn on a light','a cloud that blows away the first time the wind picks up'],h:'Think: deep-seated prejudice resists removal — like rust, it spreads instead of dissolving',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'simile',w:'prejudice',q:'Complete the simile: The professors\' prejudice hung over the medical school like ___',a:'a wall of fog — you couldn\'t see through it, but it blocked everything just the same',ch:['a wall of fog — you couldn\'t see through it, but it blocked everything just the same','a clear window that let every applicant be seen on their merits','a bright lamp that illuminated the facts fairly','an open door that welcomed everyone equally'],h:'Think: prejudice obscures judgment — like fog, it prevents you from seeing what\'s actually there',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'simile',w:'resolute',q:'Complete the simile: Blackwell stood as resolute as ___',a:'a mountain — storms broke against her, seasons changed, but she did not move',ch:['a mountain — storms broke against her, seasons changed, but she did not move','a sand dune that reshapes with every wind','a candle flame in an open window — flickering, easily extinguished','a leaf caught in a current, carried wherever the water leads'],h:'Think: resolute = unmoved by pressure — like a mountain that endures without shifting',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'simile',w:'resolute',q:'Complete the simile: Her resolve held like ___',a:'a compass needle — no matter how you turned the situation, it pointed in one direction',ch:['a compass needle — no matter how you turned the situation, it pointed in one direction','a spinning top slowing to a stop the moment you stop pushing','a weather vane that spins with every change in the wind','a boat at anchor drifting sideways on the current'],h:'Think: resolute people never lose their direction — like a compass, always pointing the same way',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'simile',w:'sneer',q:'Complete the simile: His sneer curled across his face like ___',a:'smoke from a fire set to destroy rather than to warm',ch:['smoke from a fire set to destroy rather than to warm','sunlight spreading across a clearing in the morning','warm light glowing in a window on a cold night','a gentle breeze that arrives just in time to cool the room'],h:'Think: a sneer is dark, curling scorn — like smoke from a destructive fire, not a warming hearth',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'simile',w:'sneer',q:'Complete the simile: She delivered the sneer as coolly as ___',a:'someone dropping a single cold stone into perfectly still water — precise, deliberate, devastating',ch:['someone dropping a single cold stone into perfectly still water — precise, deliberate, devastating','a friend handing you exactly what you needed without being asked','a host offering a warm welcome at the door','a teacher patiently explaining a difficult concept'],h:'Think: a well-aimed sneer is cold and precise — like a cold stone dropped with calculation',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'simile',w:'sneer',q:'Complete the simile: Their sneers bounced off Blackwell like ___',a:'paper darts off a stone wall — a great deal of effort, not a single mark',ch:['paper darts off a stone wall — a great deal of effort, not a single mark','arrows finding their mark on a target with no armor','rain soaking through a coat that offers no protection','a storm breaking through a window left open'],h:'Think: Blackwell\'s dignity made her immune — their sneers, like paper darts, couldn\'t penetrate her composure',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'simile',w:'unanimous',q:'Complete the simile: The unanimous vote rang through the room like ___',a:'a bell struck once — clear, undeniable, and impossible to argue with',ch:['a bell struck once — clear, undeniable, and impossible to argue with','a dozen people all speaking at once in different languages','a vote with half the room raising hands and half refusing','a murmur that no one could quite make out'],h:'Think: unanimous = one clear sound — like a single bell, not a chaotic chorus',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'simile',w:'unanimous',q:'Complete the simile: Their unanimous support lifted Blackwell like ___',a:'a current of warm air beneath a hawk\'s wings — unexpected, strong, carrying her higher than she\'d planned',ch:['a current of warm air beneath a hawk\'s wings — unexpected, strong, carrying her higher than she\'d planned','a current pulling her back toward the shore she\'d already left','a headwind that made every forward step cost twice the effort','a fog that closed in and hid the path ahead'],h:'Think: unanimous support = a force that lifts — like a thermal current lifting a hawk without effort',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'simile',w:'unruly',q:'Complete the simile: The students behaved like ___',a:'a disturbed beehive — unruly, buzzing, and impossible to calm until they\'d worn themselves out',ch:['a disturbed beehive — unruly, buzzing, and impossible to calm until they\'d worn themselves out','a library on a quiet afternoon — each student absorbed in their own silent work','a well-rehearsed orchestra — each player precisely in time with the others','a garden in careful order — nothing out of place, everything tended'],h:'Think: unruly = chaotic and impossible to direct — like a disturbed beehive',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'metaphor',w:'abbreviate',q:'Which sentence is a metaphor using ABBREVIATE?',a:'Life is the universe\'s abbreviation — all of eternity compressed into the few decades we\'re given to understand it.',ch:['Life is the universe\'s abbreviation — all of eternity compressed into the few decades we\'re given to understand it.','Life feels like an abbreviation compared to how long eternity must be.','Like an abbreviation, life feels far too short compared to everything we need to do.','Our lives are abbreviated in comparison to the vast sweep of time that surrounds them.'],h:'Think: calling life directly an abbreviation — it IS the compressed form of something infinite',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'metaphor',w:'abbreviate',q:'Which sentence is a metaphor using ABBREVIATE?',a:'Her argument was an abbreviation of justice — it had the shape of fairness but left out everything that mattered.',ch:['Her argument was an abbreviation of justice — it had the shape of fairness but left out everything that mattered.','Her argument felt as abbreviated as a legal summary without the key facts.','Like an abbreviation, her version of the story left out the most important details.','Her abbreviated argument felt as incomplete as a summary that missed the main point.'],h:'Think: calling the argument directly an abbreviation — it IS a shorthand version missing the substance',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'metaphor',w:'appropriate',q:'Which sentence is a metaphor using APPROPRIATE?',a:'Courage is the most appropriate garment — it fits every occasion and never goes out of style.',ch:['Courage is the most appropriate garment — it fits every occasion and never goes out of style.','Courage feels as appropriate as wearing the right outfit to any occasion.','Like the most appropriate garment, courage suits every situation.','Courage seems appropriate no matter what challenge you face.'],h:'Think: calling courage directly a garment — it IS clothing you wear, always the right fit',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'metaphor',w:'appropriate',q:'Which sentence is a metaphor using APPROPRIATE?',a:'Her silence was the most appropriate response — a clean white wall that let their ugly words speak for themselves.',ch:['Her silence was the most appropriate response — a clean white wall that let their ugly words speak for themselves.','Her silence felt as appropriate as the right response to an impossible situation.','Like an appropriate response, her silence let their words echo back uncomfortably.','Her silence seemed appropriate — it reflected their cruelty back at them.'],h:'Think: calling her silence a clean white wall — it IS a surface that reflects rather than absorbs',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'metaphor',w:'exclude',q:'Which sentence is a metaphor using EXCLUDE?',a:'History was a door that excluded women — and Blackwell was the woman who finally kicked it open.',ch:['History was a door that excluded women — and Blackwell was the woman who finally kicked it open.','History excluded women the way a closed door excludes those who don\'t have a key.','Like a door that only certain people could open, history excluded women for centuries.','Women were excluded from history the way someone is excluded when a door is shut in their face.'],h:'Think: calling history directly a door — it IS the barrier, and Blackwell IS the one who opened it',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'metaphor',w:'exclude',q:'Which sentence is a metaphor using EXCLUDE?',a:'Every rejection was a door slamming in her face — but Blackwell excluded failure from her vocabulary.',ch:['Every rejection was a door slamming in her face — but Blackwell excluded failure from her vocabulary.','Every rejection felt like a door being slammed, excluding her from the path she wanted.','Like a door slamming, each rejection seemed to exclude her more firmly.','She was excluded by each rejection the way someone is excluded by a locked door.'],h:'Think: calling rejection directly a door slamming — it IS the physical barrier, exclusion in action',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'metaphor',w:'fanciful',q:'Which sentence is a metaphor using FANCIFUL?',a:'Her mind was a fanciful garden — every idea a flower that grew in no climate anyone else recognized.',ch:['Her mind was a fanciful garden — every idea a flower that grew in no climate anyone else recognized.','Her mind felt like a fanciful garden filled with ideas that seemed imaginary to everyone else.','Like a fanciful garden, her mind was full of ideas that bloomed beyond ordinary reality.','Her ideas were as fanciful as flowers in a garden that existed only in imagination.'],h:'Think: calling her mind directly a garden — it IS the place where fanciful ideas grow like strange flowers',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'metaphor',w:'fanciful',q:'Which sentence is a metaphor using FANCIFUL?',a:'The inventor\'s plan was pure fanciful architecture — a palace in the sky with no ground beneath it.',ch:['The inventor\'s plan was pure fanciful architecture — a palace in the sky with no ground beneath it.','The inventor\'s plan was as fanciful as a palace built with no foundation.','Like fanciful architecture, the inventor\'s scheme had no practical foundation.','The inventor\'s fanciful plan felt like building a palace where no ground exists.'],h:'Think: calling the plan directly fanciful architecture — it IS a building constructed in unreality',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'metaphor',w:'futile',q:'Which sentence is a metaphor using FUTILE?',a:'Their resistance was a futile net — they cast it wide, but she swam through every gap.',ch:['Their resistance was a futile net — they cast it wide, but she swam through every gap.','Their resistance was as futile as a net full of holes trying to catch a small, quick fish.','Like a futile net, their resistance had too many gaps for her to slip through.','She found their resistance as futile as a fisherman\'s net that can\'t hold what it catches.'],h:'Think: calling their resistance directly a net — it IS the trap, and futile because she passes through it anyway',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'metaphor',w:'futile',q:'Which sentence is a metaphor using FUTILE?',a:'His pride was a futile fortress — it kept nothing out and only locked him inside.',ch:['His pride was a futile fortress — it kept nothing out and only locked him inside.','His pride was as futile as a fortress that protects nothing and only traps its owner.','Like a futile fortress, his pride seemed to keep out the world but only imprisoned him.','His pride felt futile — a fortress with no walls that only kept him from what he wanted.'],h:'Think: calling his pride directly a fortress — it IS the structure, and futile because it imprisons rather than protects',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'metaphor',w:'futile',q:'Which sentence is a metaphor using FUTILE?',a:'A closed mind is a futile door — you knock and knock, but the person inside has bolted it from within.',ch:['A closed mind is a futile door — you knock and knock, but the person inside has bolted it from within.','A closed mind is as futile as a door that no one can open from the outside.','Like a futile door, a closed mind resists every knock and never opens.','A closed mind feels as futile as knocking on a door whose owner refuses to answer.'],h:'Think: calling a closed mind directly a door — it IS the barrier, and futile because it never opens',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'metaphor',w:'grudge',q:'Which sentence is a metaphor using GRUDGE?',a:'Her grudge was a shadow she carried — it fell over every bright thing she might have enjoyed.',ch:['Her grudge was a shadow she carried — it fell over every bright thing she might have enjoyed.','Her grudge felt like a shadow that fell over every happy moment she tried to enjoy.','Like a shadow, her grudge dimmed every bright thing she might have experienced.','She carried her grudge the way a shadow follows you — darkening everything it touches.'],h:'Think: calling the grudge directly a shadow — it IS the darkness, and she carries it everywhere',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'metaphor',w:'grudge',q:'Which sentence is a metaphor using GRUDGE?',a:'A grudge is a slow fire — it burns the one holding it long before it ever reaches its target.',ch:['A grudge is a slow fire — it burns the one holding it long before it ever reaches its target.','A grudge burns like a slow fire in the hands of the person holding it.','Like a slow fire, a grudge burns through the resentment of the one who carries it.','Holding a grudge is as dangerous as holding a slow fire — it burns you first.'],h:'Think: calling the grudge directly a fire — it IS the burning thing, and it consumes the one who holds it',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'metaphor',w:'inspire',q:'Which sentence is a metaphor using INSPIRE?',a:'Blackwell was a door — by pushing it open, she inspired every woman who came after her to walk through.',ch:['Blackwell was a door — by pushing it open, she inspired every woman who came after her to walk through.','Blackwell inspired women like a door that has been pushed open for everyone to use.','Like a door swung wide open, Blackwell\'s courage inspired every woman who followed.','Blackwell\'s achievements were as inspiring as an open door that invites everyone to enter.'],h:'Think: calling Blackwell directly a door — she IS the opening, the passage through which others follow',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'metaphor',w:'inspire',q:'Which sentence is a metaphor using INSPIRE?',a:'Her story is a torch — once lit, it inspired others to carry the flame forward through every generation.',ch:['Her story is a torch — once lit, it inspired others to carry the flame forward through every generation.','Her story inspired others the way a torch lights the way forward.','Like a torch, her story inspired others to carry her flame into the future.','Her inspiring story passed from person to person like a torch lighting the way.'],h:'Think: calling her story directly a torch — it IS the light, and inspiration IS the flame passed forward',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'metaphor',w:'inspire',q:'Which sentence is a metaphor using INSPIRE?',a:'Every act of perseverance is a seed of inspiration — planted in one mind, it blooms in a thousand.',ch:['Every act of perseverance is a seed of inspiration — planted in one mind, it blooms in a thousand.','Every act of perseverance inspires others the way a seed planted in good soil blooms.','Like a seed that becomes a flower, every act of perseverance can inspire many others.','An act of perseverance is as inspiring as a seed — once planted, it grows in unexpected places.'],h:'Think: calling perseverance directly a seed — it IS what\'s planted, and inspiration IS the bloom',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'metaphor',w:'majority',q:'Which sentence is a metaphor using MAJORITY?',a:'The majority was a wave — it lifted the motion and carried it to shore before anyone could object.',ch:['The majority was a wave — it lifted the motion and carried it to shore before anyone could object.','The majority voted as powerfully as a wave carrying the motion to shore.','Like a wave, the majority lifted the vote and carried it to an inevitable conclusion.','The majority\'s power felt like a wave — overwhelming, unstoppable, carrying everything with it.'],h:'Think: calling the majority directly a wave — it IS the force, and the motion IS what it carries',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'metaphor',w:'majority',q:'Which sentence is a metaphor using MAJORITY?',a:'The students\' majority was a single current — their yes vote a river that swept every obstacle aside.',ch:['The students\' majority was a single current — their yes vote a river that swept every obstacle aside.','The majority of students voted like a current sweeping every objection aside.','Like a river\'s current, the majority carried the vote over every obstacle.','The majority felt like a current — strong, unified, sweeping everything before it.'],h:'Think: calling the majority directly a current — it IS the unified force of water moving one way',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'metaphor',w:'persevere',q:'Which sentence is a metaphor using PERSEVERE?',a:'Blackwell\'s entire life was perseverance made flesh — each year of her career a new chapter in the same stubborn story.',ch:['Blackwell\'s entire life was perseverance made flesh — each year of her career a new chapter in the same stubborn story.','Blackwell\'s life was as much an act of perseverance as anything ever recorded.','Like perseverance itself walking the earth, Blackwell refused to give up at every turn.','Blackwell persevered so consistently that her life felt like the embodiment of the word.'],h:'Think: calling her life directly perseverance made flesh — she IS the concept embodied',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'metaphor',w:'persevere',q:'Which sentence is a metaphor using PERSEVERE?',a:'Her willingness to persevere was a compass — no matter how the weather changed, it pointed always toward the goal.',ch:['Her willingness to persevere was a compass — no matter how the weather changed, it pointed always toward the goal.','Her willingness to persevere was as reliable as a compass pointing toward the goal.','Like a compass pointing toward its mark, her perseverance never wavered.','She persevered as reliably as a compass — always oriented toward what she wanted to achieve.'],h:'Think: calling her perseverance directly a compass — it IS the navigational tool, always pointing the same way',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'metaphor',w:'persevere',q:'Which sentence is a metaphor using PERSEVERE?',a:'To persevere is to be a river — the rock does not move, but the water never stops carving its path.',ch:['To persevere is to be a river — the rock does not move, but the water never stops carving its path.','To persevere is to flow like a river — always finding a way past the obstacles in the path.','Like a river that carves through rock, those who persevere eventually get past every obstacle.','Perseverance works the way a river does — patient, steady, wearing down every obstacle.'],h:'Think: calling the act of perseverance directly being a river — you ARE the water, carving relentlessly',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'metaphor',w:'possess',q:'Which sentence is a metaphor using POSSESS?',a:'Her courage was a fire she possessed — and it lit every cold room she entered.',ch:['Her courage was a fire she possessed — and it lit every cold room she entered.','Her courage, which she seemed to possess naturally, warmed every cold situation.','Like fire, the courage she possessed burned bright in cold or difficult situations.','She possessed her courage like a fire — bright, warming, and visible to everyone.'],h:'Think: calling her courage directly a fire she possessed — it IS the flame, carried as a possession',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'metaphor',w:'possess',q:'Which sentence is a metaphor using POSSESS?',a:'The fear that possessed them was a fog — it rolled in silently and swallowed everything they could see clearly.',ch:['The fear that possessed them was a fog — it rolled in silently and swallowed everything they could see clearly.','The fear that possessed them was as disorienting as a fog that hides familiar landmarks.','Like a fog, the fear that possessed them blurred everything and made clarity impossible.','Being possessed by fear felt like being surrounded by fog — they couldn\'t see the way forward.'],h:'Think: calling the fear directly a fog — it IS the obscuring force, and to be possessed IS to be surrounded by it',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'metaphor',w:'prejudice',q:'Which sentence is a metaphor using PREJUDICE?',a:'Prejudice is a pair of painted glasses — you see only the world you\'ve decided is there, not the one that is.',ch:['Prejudice is a pair of painted glasses — you see only the world you\'ve decided is there, not the one that is.','Prejudice works like painted glasses — it colors everything you see with what you already believe.','Like painted glasses, prejudice distorts your vision so you see what you expect rather than what\'s there.','Prejudice felt like wearing painted glasses — the world looked exactly as she\'d expected it to.'],h:'Think: calling prejudice directly painted glasses — it IS the lens distorting reality',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'metaphor',w:'prejudice',q:'Which sentence is a metaphor using PREJUDICE?',a:'The professors\' prejudice was a wall — built before Blackwell arrived, designed to keep her from what she\'d earned.',ch:['The professors\' prejudice was a wall — built before Blackwell arrived, designed to keep her from what she\'d earned.','The professors\' prejudice worked like a wall — blocking Blackwell from what she deserved.','Like a wall of prejudice, the professors\' bias kept Blackwell from entering the profession.','Their prejudice blocked Blackwell as effectively as a wall built specifically to stop her.'],h:'Think: calling the prejudice directly a wall — it IS the barrier, constructed before she could even apply',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'metaphor',w:'prejudice',q:'Which sentence is a metaphor using PREJUDICE?',a:'Prejudice is a locked door that mistakes itself for a window — you think you\'re seeing clearly, but you\'re only seeing your own reflection.',ch:['Prejudice is a locked door that mistakes itself for a window — you think you\'re seeing clearly, but you\'re only seeing your own reflection.','Prejudice works like a locked door disguised as a window — it shows you only what you already believe.','Like a door that looks like a window, prejudice makes you think you\'re seeing clearly when you\'re actually blocked.','Prejudice felt like a locked door pretending to be a window — false clarity, real obstruction.'],h:'Think: calling prejudice directly a locked door mistaken for a window — the obstruction masquerades as clarity',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'metaphor',w:'resolute',q:'Which sentence is a metaphor using RESOLUTE?',a:'Blackwell was a rock in the current — the stream of rejection bent around her, but she did not move.',ch:['Blackwell was a rock in the current — the stream of rejection bent around her, but she did not move.','Blackwell remained resolute like a rock in a stream — unmoved despite the current of rejection.','Like a rock in a river, Blackwell\'s resolute character let the current of rejection flow around her.','She was as resolute as a rock in a current — steady, immovable, letting rejection flow past.'],h:'Think: calling Blackwell directly a rock — she IS the unmovable object, rejection IS the stream bending around her',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'metaphor',w:'resolute',q:'Which sentence is a metaphor using RESOLUTE?',a:'Her resolve was iron — heated by every rejection, it only came out stronger and harder.',ch:['Her resolve was iron — heated by every rejection, it only came out stronger and harder.','Her resolve was as strong as iron — heated by rejection, it became even harder.','Like iron heated in a forge, her resolute determination only strengthened with each challenge.','Her resolute will felt like iron under heat — every rejection making it harder, not weaker.'],h:'Think: calling her resolve directly iron — it IS the metal, and rejection IS the heat that tempers it',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'metaphor',w:'sneer',q:'Which sentence is a metaphor using SNEER?',a:'Their sneers were paper darts — thrown to wound, they only skimmed the surface of someone truly armored.',ch:['Their sneers were paper darts — thrown to wound, they only skimmed the surface of someone truly armored.','Their sneers felt like paper darts — aimed to hurt but harmless against someone with real dignity.','Like paper darts, their sneers were thrown to wound but couldn\'t penetrate Blackwell\'s composure.','Their sneers were as harmless as paper darts against someone as resolute as Blackwell.'],h:'Think: calling the sneers directly paper darts — they ARE the projectiles, lightweight and harmless against real armor',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'metaphor',w:'sneer',q:'Which sentence is a metaphor using SNEER?',a:'A sneer is a door slamming in someone\'s face — loud, decisive, and it tells you exactly where you stand.',ch:['A sneer is a door slamming in someone\'s face — loud, decisive, and it tells you exactly where you stand.','A sneer works like a slamming door — it shuts you out and lets you know it.','Like a door slammed in your face, a sneer communicates rejection clearly and forcefully.','A sneer felt like having a door slammed — sudden, loud, and unmistakably dismissive.'],h:'Think: calling the sneer directly a door slamming — it IS the physical act, the barrier raised in contempt',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'metaphor',w:'sneer',q:'Which sentence is a metaphor using SNEER?',a:'His sneer was a weapon — not the sharp kind that draws blood, but the cold kind that leaves no mark and all the damage.',ch:['His sneer was a weapon — not the sharp kind that draws blood, but the cold kind that leaves no mark and all the damage.','His sneer worked like a weapon — cold, precise, designed to wound without leaving visible marks.','Like a weapon that leaves no mark, his sneer inflicted invisible damage with cold precision.','His sneer felt like a weapon — cold, deliberate, and aimed to hurt in ways that wouldn\'t show.'],h:'Think: calling the sneer directly a weapon — it IS the instrument of harm, cold and precise',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'metaphor',w:'unanimous',q:'Which sentence is a metaphor using UNANIMOUS?',a:'The unanimous vote was a sunrise — sudden, undeniable, and impossible to argue with.',ch:['The unanimous vote was a sunrise — sudden, undeniable, and impossible to argue with.','The unanimous vote was as undeniable as a sunrise — impossible to argue against.','Like a sunrise, the unanimous vote was sudden and impossible to deny or dispute.','The unanimous vote felt like a sunrise — clear, complete, leaving no room for objection.'],h:'Think: calling the vote directly a sunrise — it IS the undeniable event, impossible to stop or dispute',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'metaphor',w:'unanimous',q:'Which sentence is a metaphor using UNANIMOUS?',a:'Their unanimous agreement was a foundation — poured all at once, solid, and bearing the weight of everything built on it.',ch:['Their unanimous agreement was a foundation — poured all at once, solid, and bearing the weight of everything built on it.','Their unanimous agreement acted like a foundation — solid, poured at once, supporting what came next.','Like a foundation poured in one pour, their unanimous agreement held everything together solidly.','Their unanimous agreement felt like a foundation — strong, solid, and supporting the structure above it.'],h:'Think: calling the agreement directly a foundation — it IS the base, poured all at once (unanimous) and load-bearing',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'metaphor',w:'unruly',q:'Which sentence is a metaphor using UNRULY?',a:'The classroom was an unruly hurricane when the substitute arrived — desks as debris, voices as wind.',ch:['The classroom was an unruly hurricane when the substitute arrived — desks as debris, voices as wind.','The classroom was as unruly as a hurricane — desks out of place, voices rising like wind.','Like a hurricane, the unruly classroom scattered desks and filled the air with noise.','The unruly students turned the classroom into something as chaotic as a hurricane.'],h:'Think: calling the classroom directly a hurricane — it IS the storm, with desks as debris and voices as wind',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},
{t:'metaphor',w:'unruly',q:'Which sentence is a metaphor using UNRULY?',a:'His unruly spirit was a wild river — everyone tried to dam it, but it always found a new way around.',ch:['His unruly spirit was a wild river — everyone tried to dam it, but it always found a new way around.','His unruly spirit flowed like a wild river — impossible to contain no matter what barriers you built.','Like a wild river, his unruly spirit defied every dam or channel built to contain it.','His spirit was as unruly as a wild river — rushing past every barrier placed in its way.'],h:'Think: calling his spirit directly a wild river — it IS the unstoppable force, and every attempt to contain him IS the dam',l:11,s:'Elizabeth Blackwell, M.D.',c:'#f87171'},

{t:'metaphor',w:'abandon',q:'Which sentence is a metaphor using ABANDON?',a:'Trust, once abandoned, is a bridge burned from both sides — you cannot cross back over it, and neither can anyone else.',ch:['Trust, once abandoned, is a bridge burned from both sides — you cannot cross back over it, and neither can anyone else.','Trust, once abandoned, is as hard to rebuild as a bridge that has been burned.','Like a bridge burned from both sides, trust once abandoned becomes impossible to cross.','Abandoning trust is as destructive as burning a bridge you both needed to use.'],h:'Think: calling abandoned trust directly a burned bridge — it IS the destroyed crossing, and abandonment IS the fire',l:12,s:'The Trojan Horse',c:'#fbbf24'},
{t:'metaphor',w:'abandon',q:'Which sentence is a metaphor using ABANDON?',a:'Hope was the one thing the trapped miners refused to abandon — their last lantern in a collapsed shaft.',ch:['Hope was the one thing the trapped miners refused to abandon — their last lantern in a collapsed shaft.','Hope felt like a lantern to the miners, and they refused to abandon it.','Like a lantern they refused to let go of, the miners held on to hope and refused to abandon it.','The miners refused to abandon hope, which burned like a lantern in the darkness.'],h:'Think: calling hope directly a lantern — it IS their light source, the one thing they refuse to leave behind',l:12,s:'The Trojan Horse',c:'#fbbf24'},
{t:'metaphor',w:'adversary',q:'Which sentence is a metaphor using ADVERSARY?',a:'Time was the Trojans\' most patient adversary — it wore them down not with swords but with ten years of waiting.',ch:['Time was the Trojans\' most patient adversary — it wore them down not with swords but with ten years of waiting.','Time acted like an adversary to the Trojans — patient, wearing them down without weapons.','Like an adversary more patient than any soldier, time wore down the Trojans over ten years.','Time was as much an adversary to the Trojans as any Greek soldier — slow, relentless, exhausting.'],h:'Think: calling time directly an adversary — it IS their enemy, the one that defeats them with patience',l:12,s:'The Trojan Horse',c:'#fbbf24'},
{t:'metaphor',w:'adversary',q:'Which sentence is a metaphor using ADVERSARY?',a:'Doubt is every dreamer\'s adversary — a small, persistent voice that grows louder every time you hesitate.',ch:['Doubt is every dreamer\'s adversary — a small, persistent voice that grows louder every time you hesitate.','Doubt works like an adversary for dreamers — it speaks against them every time they hesitate.','Like an adversary that never rests, doubt speaks against you every time you consider giving up.','Doubt is as much an adversary to dreamers as any real opponent — it fights against them from within.'],h:'Think: calling doubt directly an adversary — it IS the enemy, fighting from inside rather than outside',l:12,s:'The Trojan Horse',c:'#fbbf24'},
{t:'metaphor',w:'baffle',q:'Which sentence is a metaphor using BAFFLE?',a:'The wooden horse was a riddle the Trojans never solved — it baffled them, and that bafflement was the trap.',ch:['The wooden horse was a riddle the Trojans never solved — it baffled them, and that bafflement was the trap.','The wooden horse baffled the Trojans the way a riddle confuses someone who can\'t find the answer.','Like a riddle they couldn\'t solve, the wooden horse baffled the Trojans and became their undoing.','The Trojans were baffled by the wooden horse as completely as someone who can\'t solve a riddle.'],h:'Think: calling the horse directly a riddle — it IS the puzzle, and their failure to solve it IS the trap',l:12,s:'The Trojan Horse',c:'#fbbf24'},
{t:'metaphor',w:'baffle',q:'Which sentence is a metaphor using BAFFLE?',a:'Their silence was a baffle — a wall of nothing that stopped every question from reaching the answer.',ch:['Their silence was a baffle — a wall of nothing that stopped every question from reaching the answer.','Their silence baffled everyone the way a wall stops sound from passing through.','Like a baffle that absorbs every question, their silence prevented anyone from finding the answer.','Their silence was as baffling as a wall — every question hit it and came back unanswered.'],h:'Think: calling their silence directly a baffle — it IS the device that blocks, stops every attempt at understanding',l:12,s:'The Trojan Horse',c:'#fbbf24'},
{t:'metaphor',w:'baffle',q:'Which sentence is a metaphor using BAFFLE?',a:'The code was a labyrinth of symbols — it baffled every expert who entered and offered no exit.',ch:['The code was a labyrinth of symbols — it baffled every expert who entered and offered no exit.','The code baffled experts the way a labyrinth confuses those who enter without a map.','Like a labyrinth with no exit, the code baffled every expert who tried to find a way through.','The experts were baffled by the code as completely as someone lost in a labyrinth.'],h:'Think: calling the code directly a labyrinth — it IS the maze, and to be baffled IS to be lost inside it',l:12,s:'The Trojan Horse',c:'#fbbf24'},
{t:'metaphor',w:'blunder',q:'Which sentence is a metaphor using BLUNDER?',a:'Hauling the horse inside was Troy\'s great blunder — the door they opened for their own destruction.',ch:['Hauling the horse inside was Troy\'s great blunder — the door they opened for their own destruction.','Hauling the horse inside was as much a blunder as opening a door to let in an enemy.','Like a door thrown open to destruction, hauling the horse inside was the Trojans\' great blunder.','The Trojans blundered when they hauled the horse inside, as if they had opened a door for their enemies.'],h:'Think: calling the blunder directly a door — it IS the opening through which destruction entered',l:12,s:'The Trojan Horse',c:'#fbbf24'},
{t:'metaphor',w:'blunder',q:'Which sentence is a metaphor using BLUNDER?',a:'Every blunder is a teacher — harsh, unscheduled, and impossible to ignore.',ch:['Every blunder is a teacher — harsh, unscheduled, and impossible to ignore.','Every blunder teaches you something, like a harsh teacher you didn\'t choose.','Like a teacher who arrives without warning, every blunder forces you to learn something.','A blunder is as much a teacher as a classroom lesson — harsh but instructive.'],h:'Think: calling every blunder directly a teacher — it IS the instructor, and the lesson IS the consequence',l:12,s:'The Trojan Horse',c:'#fbbf24'},
{t:'metaphor',w:'colossal',q:'Which sentence is a metaphor using COLOSSAL?',a:'The Trojan Horse was a colossal deception — a monument to the idea that the biggest threats wear the most beautiful disguises.',ch:['The Trojan Horse was a colossal deception — a monument to the idea that the biggest threats wear the most beautiful disguises.','The Trojan Horse was as colossal a deception as any monument erected to a false idea.','Like a colossal monument to deception, the wooden horse announced its purpose to everyone but its victims.','The deception of the Trojan Horse was colossal — as large and impressive as any monument.'],h:'Think: calling the deception directly a monument — it IS the enormous structure, built to stand as an example forever',l:12,s:'The Trojan Horse',c:'#fbbf24'},
{t:'metaphor',w:'colossal',q:'Which sentence is a metaphor using COLOSSAL?',a:'His ego was colossal architecture — grand on the outside, hollow all the way through.',ch:['His ego was colossal architecture — grand on the outside, hollow all the way through.','His ego was as colossal as a massive building — impressive from outside, empty within.','Like colossal architecture, his ego was designed to impress but offered nothing inside.','His ego was colossally hollow — as grand in appearance as a great building with nothing in it.'],h:'Think: calling his ego directly architecture — it IS the structure, colossal and hollow, built to impress',l:12,s:'The Trojan Horse',c:'#fbbf24'},
{t:'metaphor',w:'detect',q:'Which sentence is a metaphor using DETECT?',a:'Cassandra\'s gift was the ability to detect the threads of fate before anyone else could see the weaving.',ch:['Cassandra\'s gift was the ability to detect the threads of fate before anyone else could see the weaving.','Cassandra could detect fate\'s patterns the way a weaver detects a flaw in the threads before anyone else.','Like someone who detects flaws in a weaving before it\'s complete, Cassandra saw fate before it unfolded.','Cassandra detected the threads of fate as easily as a skilled weaver detects a knot in the cloth.'],h:'Think: fate as a weaving — Cassandra IS the one who detects the threads before the pattern is visible to anyone else',l:12,s:'The Trojan Horse',c:'#fbbf24'},
{t:'metaphor',w:'detect',q:'Which sentence is a metaphor using DETECT?',a:'A good detective is a human lens — always detecting what others pass over, always focusing on what others blur.',ch:['A good detective is a human lens — always detecting what others pass over, always focusing on what others blur.','A good detective detects things the way a lens focuses light — bringing detail into view that others miss.','Like a lens that detects flaws invisible to the naked eye, a good detective sees what others overlook.','A detective detects things as precisely as a lens focuses on what the unaided eye cannot resolve.'],h:'Think: calling the detective directly a lens — they ARE the focusing instrument, and detection IS the act of bringing things into clarity',l:12,s:'The Trojan Horse',c:'#fbbf24'},
{t:'metaphor',w:'detect',q:'Which sentence is a metaphor using DETECT?',a:'Their loyalty was easy to detect — it was the thread running through everything they did, visible from any angle.',ch:['Their loyalty was easy to detect — it was the thread running through everything they did, visible from any angle.','Their loyalty was as easy to detect as a thread woven visibly through everything they said and did.','Like a thread running through every action, their loyalty was something you could detect from any angle.','You could detect their loyalty in everything they did, the way you detect a thread woven through cloth.'],h:'Think: calling loyalty directly a thread — it IS the structural element, and to detect it IS to see it running through every action',l:12,s:'The Trojan Horse',c:'#fbbf24'},
{t:'metaphor',w:'haul',q:'Which sentence is a metaphor using HAUL?',a:'History is a weight we all haul — some carry it like a burden, others like a lantern showing where not to walk again.',ch:['History is a weight we all haul — some carry it like a burden, others like a lantern showing where not to walk again.','History feels like a weight we haul with us — sometimes a burden, sometimes a tool.','Like a weight we haul forward, history can slow us down or help us find the right path.','We haul history the way we haul a heavy load — it weighs on us whether we choose to carry it or not.'],h:'Think: calling history directly a weight we haul — it IS the load, and the hauling IS the act of carrying the past with us',l:12,s:'The Trojan Horse',c:'#fbbf24'},
{t:'metaphor',w:'haul',q:'Which sentence is a metaphor using HAUL?',a:'Every generation hauls the mistakes of the last — the question is whether they haul it to study or to repeat.',ch:['Every generation hauls the mistakes of the last — the question is whether they haul it to study or to repeat.','Every generation hauls the weight of the previous generation\'s mistakes, like cargo passed forward.','Like cargo hauled from one ship to the next, past mistakes are carried by every new generation.','Each generation hauls history\'s mistakes the way a ship hauls cargo — forward, whether they wish it or not.'],h:'Think: calling past mistakes directly cargo to be hauled — they ARE the freight, carried from one generation to the next',l:12,s:'The Trojan Horse',c:'#fbbf24'},
{t:'metaphor',w:'overpower',q:'Which sentence is a metaphor using OVERPOWER?',a:'In the end, Greek cunning overpowered Trojan strength — the war was not won with a sword but with a gift.',ch:['In the end, Greek cunning overpowered Trojan strength — the war was not won with a sword but with a gift.','In the end, Greek cunning was powerful enough to overpower the physical strength of Troy.','Like a force that overpowers through cleverness rather than strength, the Greeks won with a gift, not a sword.','The Greeks used cunning to overpower Troy in the same way that intelligence overpowers brute force.'],h:'Think: cunning IS the overpowering force — it IS the weapon that defeats, and the gift IS that weapon',l:12,s:'The Trojan Horse',c:'#fbbf24'},
{t:'metaphor',w:'overpower',q:'Which sentence is a metaphor using OVERPOWER?',a:'Silence can overpower a room — fill it completely with nothing until every voice inside goes quiet.',ch:['Silence can overpower a room — fill it completely with nothing until every voice inside goes quiet.','Silence overpowers a room the way a strong presence dominates every conversation within it.','Like a force that overpowers everything in its path, silence fills a room and quiets every voice.','A powerful silence can overpower conversation the way one dominant voice overpowers all the others.'],h:'Think: calling silence an overpowering force — it IS the dominant presence, and to overpower IS to fill and silence everything else',l:12,s:'The Trojan Horse',c:'#fbbf24'},
{t:'metaphor',w:'rejoice',q:'Which sentence is a metaphor using REJOICE?',a:'The Trojans\' rejoicing was a fire lit too soon — it consumed the night they needed to stay watch.',ch:['The Trojans\' rejoicing was a fire lit too soon — it consumed the night they needed to stay watch.','The Trojans rejoiced too soon, like someone who lights a fire before they\'ve made sure it\'s safe.','Like a fire lit before the danger had passed, their premature rejoicing consumed the night they needed.','Their rejoicing was as dangerous as a fire — lit at the wrong moment, it burned away their vigilance.'],h:'Think: calling their rejoicing directly a fire lit too soon — it IS the thing that consumed the night, that burned their watchfulness',l:12,s:'The Trojan Horse',c:'#fbbf24'},
{t:'metaphor',w:'rejoice',q:'Which sentence is a metaphor using REJOICE?',a:'To rejoice is to give the whole self over to the moment — to become nothing but the fact of being glad.',ch:['To rejoice is to give the whole self over to the moment — to become nothing but the fact of being glad.','To rejoice is to feel so glad that you give yourself completely to the happiness of the moment.','Like giving yourself over to the moment, to rejoice is to be nothing but gladness for a time.','Rejoicing means surrendering to happiness the way you give yourself over to a moment of pure joy.'],h:'Think: calling rejoicing directly a surrender of the self — to rejoice IS to become entirely the emotion',l:12,s:'The Trojan Horse',c:'#fbbf24'},
{t:'metaphor',w:'rejoice',q:'Which sentence is a metaphor using REJOICE?',a:'Their relief was a rejoicing that swept through the city like water released from a dam — sudden, total, unstoppable.',ch:['Their relief was a rejoicing that swept through the city like water released from a dam — sudden, total, unstoppable.','Their relief felt like a rejoicing that swept through the city the way water bursts from a dam.','Like water released from a dam, their rejoicing was sudden and impossible to stop once it started.','Their rejoicing swept through the city the way water rushes from a broken dam — all at once, everywhere.'],h:'Think: calling their relief directly a rejoicing, and the rejoicing directly a flood — the emotion IS the water, unstoppable and total',l:12,s:'The Trojan Horse',c:'#fbbf24'},
{t:'metaphor',w:'scoff',q:'Which sentence is a metaphor using SCOFF?',a:'Every scoff is a closed door — you mock what you don\'t understand, and in doing so guarantee you never will.',ch:['Every scoff is a closed door — you mock what you don\'t understand, and in doing so guarantee you never will.','Every scoff is as final as a door closed against understanding — once you mock, you stop learning.','Like a door closed against understanding, a scoff shuts out whatever you refuse to take seriously.','To scoff at something is to close a door on it — you end any chance of understanding by mocking it.'],h:'Think: calling every scoff directly a closed door — it IS the barrier, and to scoff IS to shut out all possibility of understanding',l:12,s:'The Trojan Horse',c:'#fbbf24'},
{t:'metaphor',w:'scoff',q:'Which sentence is a metaphor using SCOFF?',a:'History\'s greatest scoffers are its greatest footnotes — remembered only for what they refused to believe.',ch:['History\'s greatest scoffers are its greatest footnotes — remembered only for what they refused to believe.','History\'s greatest scoffers are like footnotes — noted only for what they dismissed rather than what they built.','Like footnotes in the story of progress, those who scoffed are remembered only for what they rejected.','The people who scoffed at new ideas became footnotes — history remembers them for what they refused to believe.'],h:'Think: calling scoffers directly footnotes — they ARE the margin notes, remembered only for their dismissal',l:12,s:'The Trojan Horse',c:'#fbbf24'},
{t:'metaphor',w:'sentinel',q:'Which sentence is a metaphor using SENTINEL?',a:'Memory is the sentinel of identity — it stands at the gate of who you are and decides what enters and what is turned away.',ch:['Memory is the sentinel of identity — it stands at the gate of who you are and decides what enters and what is turned away.','Memory works like a sentinel for identity — it guards what you keep and turns away what doesn\'t belong.','Like a sentinel standing at the gate, memory decides what becomes part of who you are.','Your memory is as much a sentinel as any guard — it keeps some things in and turns others away.'],h:'Think: calling memory directly a sentinel — it IS the guard, and identity IS the city being protected',l:12,s:'The Trojan Horse',c:'#fbbf24'},
{t:'metaphor',w:'sentinel',q:'Which sentence is a metaphor using SENTINEL?',a:'Conscience is an internal sentinel — it cannot be bribed, cannot be relieved of duty, and never truly sleeps.',ch:['Conscience is an internal sentinel — it cannot be bribed, cannot be relieved of duty, and never truly sleeps.','Conscience works like a sentinel inside you — it watches everything you do and cannot be dismissed.','Like a sentinel who never leaves their post, conscience keeps watch on every action and cannot be bribed.','Your conscience is as persistent as a sentinel — it watches from inside and is impossible to dismiss.'],h:'Think: calling conscience directly a sentinel — it IS the guard, posted inside, impossible to corrupt or dismiss',l:12,s:'The Trojan Horse',c:'#fbbf24'},
{t:'metaphor',w:'sentinel',q:'Which sentence is a metaphor using SENTINEL?',a:'The old oak at the end of the drive was a sentinel — it had stood there so long it had grown into the shape of watching.',ch:['The old oak at the end of the drive was a sentinel — it had stood there so long it had grown into the shape of watching.','The old oak looked like a sentinel — it stood at the end of the drive as if placed there to watch.','Like a sentinel that has been on duty too long, the old oak had grown into the posture of permanent watch.','The old oak served as a sentinel at the end of the drive — rooted there and impossible to pass unnoticed.'],h:'Think: calling the oak directly a sentinel — it IS the guard, and time has shaped it into permanent watchfulness',l:12,s:'The Trojan Horse',c:'#fbbf24'},
{t:'metaphor',w:'siege',q:'Which sentence is a metaphor using SIEGE?',a:'Grief is a siege — it surrounds you completely, cuts off all supply lines to joy, and waits for you to exhaust yourself.',ch:['Grief is a siege — it surrounds you completely, cuts off all supply lines to joy, and waits for you to exhaust yourself.','Grief works like a siege — it surrounds you and cuts you off from everything that might bring comfort.','Like a siege that surrounds a city, grief cuts off every supply line to joy and waits you out.','Grief feels like being under siege — surrounded, cut off, with nothing coming in and no way out.'],h:'Think: calling grief directly a siege — it IS the encirclement, and joy IS the supply line that gets cut',l:12,s:'The Trojan Horse',c:'#fbbf24'},
{t:'metaphor',w:'siege',q:'Which sentence is a metaphor using SIEGE?',a:'The silence before the verdict was a siege — pressing in from every side, making the air impossible to breathe.',ch:['The silence before the verdict was a siege — pressing in from every side, making the air impossible to breathe.','The silence before the verdict felt like a siege — it pressed in from every direction with nowhere to escape.','Like a siege closing in from every direction, the silence before the verdict made everything feel impossible.','That silence was as much a siege as any army — it surrounded and pressed in until there was no room left.'],h:'Think: calling the silence directly a siege — it IS the encirclement, pressing from every side',l:12,s:'The Trojan Horse',c:'#fbbf24'},
{t:'metaphor',w:'sinister',q:'Which sentence is a metaphor using SINISTER?',a:'The wooden horse was sinister perfection — a gift that held its own army, a welcome that carried its own destruction.',ch:['The wooden horse was sinister perfection — a gift that held its own army, a welcome that carried its own destruction.','The wooden horse was sinister in a perfect way — a gift containing soldiers, a welcome hiding destruction.','Like sinister perfection in physical form, the wooden horse was a gift that concealed its own army.','The wooden horse was perfectly sinister — as carefully designed to cause harm as anything ever built.'],h:'Think: calling the horse directly sinister perfection — it IS the perfected form of evil disguised as a gift',l:12,s:'The Trojan Horse',c:'#fbbf24'},
{t:'metaphor',w:'sinister',q:'Which sentence is a metaphor using SINISTER?',a:'His patience was sinister — not the patience of someone who can wait, but of someone who has already decided the outcome.',ch:['His patience was sinister — not the patience of someone who can wait, but of someone who has already decided the outcome.','His patience felt sinister — it was the patience of someone who had already decided how everything would end.','Like something sinister, his patience didn\'t feel like waiting — it felt like certainty of a bad outcome.','His patience was as sinister as a plan already decided — not waiting, but counting down.'],h:'Think: calling his patience directly sinister — it IS the threatening quality, patience as a form of certain, predatory confidence',l:12,s:'The Trojan Horse',c:'#fbbf24'},
{t:'metaphor',w:'victor',q:'Which sentence is a metaphor using VICTOR?',a:'Greece was ultimately not the victor of the Trojan War — history was, and it has been replaying the story ever since.',ch:['Greece was ultimately not the victor of the Trojan War — history was, and it has been replaying the story ever since.','Greece was not really the victor in any lasting sense — history has outlasted the story of every winner.','Like a victor that outlasts all others, history has been retelling the Trojan War for thousands of years.','The real victor of the Trojan War was history itself — it kept the story alive long after both sides were gone.'],h:'Think: calling history directly the victor — it IS the true winner, the one that outlasts and preserves everything',l:12,s:'The Trojan Horse',c:'#fbbf24'},
{t:'metaphor',w:'victor',q:'Which sentence is a metaphor using VICTOR?',a:'Every victor carries the echo of the defeated — a triumph without that weight is hollow at the center.',ch:['Every victor carries the echo of the defeated — a triumph without that weight is hollow at the center.','Every victor should remember the defeated — a triumph that ignores the cost is hollow.','Like an echo carried forward, the memory of the defeated follows every victor.','A victor that forgets the defeated is like a triumph hollow at its center — missing the weight that gives it meaning.'],h:'Think: calling what the victor carries an echo — it IS the sound that follows every win, the presence of the defeated',l:12,s:'The Trojan Horse',c:'#fbbf24'},
{t:'metaphor',w:'victor',q:'Which sentence is a metaphor using VICTOR?',a:'The real victor in any struggle is the one still learning after the battle ends — the one who takes more from the fight than the prize.',ch:['The real victor in any struggle is the one still learning after the battle ends — the one who takes more from the fight than the prize.','The real victor is not the one who wins but the one who learns more from the fight than the prize could ever teach.','Like a victor who carries more than the trophy, the true winner is the one who learns from the struggle.','The one who keeps learning after winning is more of a victor than the one who only carries away the prize.'],h:'Think: calling the learner directly the real victor — growth IS the victory, more than any trophy or prize',l:12,s:'The Trojan Horse',c:'#fbbf24'},
{t:'metaphor',w:'woe',q:'Which sentence is a metaphor using WOE?',a:'Troy\'s woe was a city-shaped wound — it bled not blood but people, culture, and memory, until nothing was left to carry the name.',ch:['Troy\'s woe was a city-shaped wound — it bled not blood but people, culture, and memory, until nothing was left to carry the name.','Troy\'s woe was as deep as a wound — it bled out everything that had made the city what it was.','Like a wound that bleeds out people and culture, Troy\'s woe left nothing standing to carry its name forward.','The woe of Troy was as deep as a wound — it drained the city of everything until only the name remained.'],h:'Think: calling Troy\'s woe directly a wound — it IS the injury, and everything lost IS what the wound bled away',l:12,s:'The Trojan Horse',c:'#fbbf24'},
{t:'metaphor',w:'woe',q:'Which sentence is a metaphor using WOE?',a:'Woe is the tax that foolishness charges — paid in suffering, with interest, long after the original mistake.',ch:['Woe is the tax that foolishness charges — paid in suffering, with interest, long after the original mistake.','Woe feels like a tax charged for foolishness — paid in suffering, often long after the mistake was made.','Like a tax charged on every foolish decision, woe arrives after the blunder and must be paid in suffering.','Foolishness charges woe as its tax — you pay it in suffering, often long after you\'ve forgotten the original mistake.'],h:'Think: calling woe directly a tax — it IS the payment charged, and foolishness IS the thing that charges it',l:12,s:'The Trojan Horse',c:'#fbbf24'},
