{t:'simile',w:'efficient',q:'Complete the simile: She worked as efficiently as ___',a:'a spider building its web — methodical, unhurried, and perfect in the end',ch:['a spider building its web — methodical, unhurried, and perfect in the end','a squirrel storing nuts at random, hoping to find them later','a cook who measures nothing and adds ingredients without a plan','someone who starts three tasks at once and finishes none of them'],h:'Think: efficient work is methodical and produces perfect results — like a spider that builds exactly what it needs, no more',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'simile',w:'fatigue',q:'Complete the simile: The runner\'s fatigue hit her like ___',a:'a wall she hadn\'t seen — one stride she was fine, the next she was pushing through solid air',ch:['a wall she hadn\'t seen — one stride she was fine, the next she was pushing through solid air','a slow incline she\'d been climbing for miles and finally crested','a light breeze that barely slowed her pace as she ran into it','a curve in the road she navigated without breaking stride'],h:'Think: sudden fatigue is like an invisible wall — it arrives without warning and stops you in your tracks',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'simile',w:'fatigue',q:'Complete the simile: The desert traveler\'s fatigue settled in like ___',a:'sand filling a bucket — slowly, grain by grain, until you couldn\'t lift it',ch:['sand filling a bucket — slowly, grain by grain, until you couldn\'t lift it','water draining from a bucket — the more you travel, the lighter you feel','a weight placed on your back all at once at the start of the journey','a burden that someone else carries for you throughout the trip'],h:'Think: gradual fatigue accumulates — like sand, each grain is nothing, but together they make something immovable',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'simile',w:'fatigue',q:'Complete the simile: His fatigue weighed on him like ___',a:'a second coat he hadn\'t chosen to put on but couldn\'t take off',ch:['a second coat he hadn\'t chosen to put on but couldn\'t take off','a feather resting lightly on his shoulder — barely noticeable','a cloak he could remove the moment he chose to rest','a garment that fit perfectly and never seemed to add any weight'],h:'Think: fatigue is unwanted weight you can\'t shed — like a coat that appeared without your choosing and won\'t come off',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'simile',w:'gait',q:'Complete the simile: The camel\'s gait across the dunes was as steady as ___',a:'a metronome set to the slowest possible tempo — unhurried, unchanging, inevitable',ch:['a metronome set to the slowest possible tempo — unhurried, unchanging, inevitable','a drummer who speeds up whenever the audience gets excited','a clock that runs differently depending on the weather','a pace that varies with every step depending on the terrain'],h:'Think: steady gait = never varying — like a metronome that keeps perfect time regardless of everything else',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'simile',w:'gait',q:'Complete the simile: She walked with a gait as confident as ___',a:'a captain crossing her own deck — not fast, but certain of every step',ch:['a captain crossing her own deck — not fast, but certain of every step','a passenger taking their first step onto an unfamiliar ship','a sailor who loses their footing with every roll of the wave','a visitor walking carefully to avoid disturbing anything'],h:'Think: a confident gait = the movement of someone who owns the space — like a captain on their own ship',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'simile',w:'glare',q:'Complete the simile: The desert sun glared down like ___',a:'a spotlight operated by someone with no interest in your comfort',ch:['a spotlight operated by someone with no interest in your comfort','a lamp with a warm shade that softens the light pleasantly','a candle lit in a room to provide just enough light to read by','a lantern carried by a guide who adjusts its brightness as you walk'],h:'Think: a glaring sun is harsh and indifferent — like a spotlight aimed with no concern for the one standing under it',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'simile',w:'glare',q:'Complete the simile: The manager glared at him like ___',a:'a cat that has decided it owns the room and is not pleased with the intruder',ch:['a cat that has decided it owns the room and is not pleased with the intruder','a friendly dog recognizing someone it\'s met before','a bird singing in a tree without noticing anyone passing below','a fish swimming past something it doesn\'t bother to examine'],h:'Think: a glare = claiming territory with eye contact — like a cat asserting ownership through sheer intensity of stare',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'simile',w:'glare',q:'Complete the simile: The glare off the white sand was as blinding as ___',a:'stepping out of a dark theater into noon sun with no sunglasses',ch:['stepping out of a dark theater into noon sun with no sunglasses','walking from a bright room into a dim hallway and waiting for your eyes to adjust','looking at a candle from across a comfortable room','opening the curtains on a cloudy morning to let in a little more light'],h:'Think: intense glare = sudden overwhelming brightness — like going from darkness to full midday sun in one step',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'simile',w:'habitat',q:'Complete the simile: The dromedary moved through its desert habitat like ___',a:'a key moving through the lock it was made for — perfectly matched to every obstacle',ch:['a key moving through the lock it was made for — perfectly matched to every obstacle','a key someone is forcing into the wrong lock — it almost fits but never quite','a door that opens only with great effort no matter how many times you try','a mechanism designed for a different machine, pressed into service because nothing better is at hand'],h:'Think: adapted creature in its habitat = perfect fit — like a key and its lock, made for each other',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'simile',w:'habitat',q:'Complete the simile: Removed from its habitat, the polar bear looked as lost as ___',a:'a fish placed on dry land — alive, but in entirely the wrong world',ch:['a fish placed on dry land — alive, but in entirely the wrong world','a fish returned to the ocean after a brief moment on the dock','an otter sliding back into the river it swam in all its life','a bird released from a cage into the forest where it was born'],h:'Think: removed from habitat = technically surviving but completely out of place — like a fish on land',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'simile',w:'oblivious',q:'Complete the simile: The camel was as oblivious to the heat as ___',a:'a seasoned sailor is to the motion of a ship — it has become simply the background of existence',ch:['a seasoned sailor is to the motion of a ship — it has become simply the background of existence','a new sailor on their first voyage, constantly adjusting their stance','a passenger clutching the rail during a rough crossing','a visitor who notices every creak and roll throughout the entire trip'],h:'Think: oblivious through adaptation = the discomfort has become invisible — like a sailor who no longer feels the ship move',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'simile',w:'oblivious',q:'Complete the simile: She sat oblivious to the noise around her like ___',a:'someone reading at the center of a storm — the chaos is real; she had simply decided not to live inside it',ch:['someone reading at the center of a storm — the chaos is real; she had simply decided not to live inside it','a person who keeps checking over their shoulder to see what new sound has arrived','someone who stops reading every time a new noise enters the room','a reader who closes the book at the first distraction and doesn\'t return to it'],h:'Think: chosen obliviousness = the stimulus exists but you\'ve made it irrelevant — like reading through a storm',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'simile',w:'outmoded',q:'Complete the simile: The stagecoach felt as outmoded as ___',a:'a candle in a room full of electric lights — still technically functional, but no longer really the point',ch:['a candle in a room full of electric lights — still technically functional, but no longer really the point','a candle lit in a room where the power has gone out — suddenly the most essential thing in the building','a lamp that\'s been carefully maintained and still gives as much light as the day it was made','a light source chosen over electricity because it has a warmth that modern lights can\'t match'],h:'Think: outmoded = replaced by something better but still technically works — like a candle in a room full of electric lights',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'simile',w:'outmoded',q:'Complete the simile: His ideas were as outmoded as ___',a:'a map drawn before the last mountain range was discovered — accurate for its time, now dangerously incomplete',ch:['a map drawn before the last mountain range was discovered — accurate for its time, now dangerously incomplete','a map updated every year to reflect every new road and boundary change','a guide that was redrawn after the last survey and matches the terrain exactly','a chart so current that it includes features discovered only last month'],h:'Think: outmoded = once right but no longer complete — like a map that was accurate when drawn but the world has changed',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'simile',w:'prominent',q:'Complete the simile: The camel\'s prominent hump stood above the desert landscape like ___',a:'a sail above a flat sea — the one thing rising above everything else',ch:['a sail above a flat sea — the one thing rising above everything else','a stone rolled to rest at the lowest point of the valley','a shadow falling flat against the ground at midday','a ripple that spreads outward and disappears into the surrounding water'],h:'Think: prominent = the thing that rises above everything else — like a sail above a flat sea, unmistakable',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'simile',w:'prominent',q:'Complete the simile: Her prominent role in the company was as visible as ___',a:'a lighthouse on a flat coast — impossible to look toward the horizon without seeing it first',ch:['a lighthouse on a flat coast — impossible to look toward the horizon without seeing it first','a small buoy floating just below the surface, noticed only if you know where to look','a signal light set too low to be seen from any ship at sea','a marker placed on the chart but never built in the physical harbor'],h:'Think: prominent = the first thing you see — like a lighthouse, it defines the landscape before you even look for it',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'simile',w:'prominent',q:'Complete the simile: The glaring error was as prominent as ___',a:'a misplaced trumpet blast in the middle of a string quartet — impossible to miss, impossible to explain away',ch:['a misplaced trumpet blast in the middle of a string quartet — impossible to miss, impossible to explain away','a note played so softly that only the nearest musician could hear it','a rest in the music — an intentional silence that everyone recognized as planned','a chord played at exactly the right moment in exactly the right way'],h:'Think: a prominent error stands out completely — like a trumpet blast where no trumpet should be',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'simile',w:'quench',q:'Complete the simile: The water quenched the camel\'s thirst like ___',a:'rain on cracked desert ground — absorbed instantly, as if the need had been waiting for exactly this',ch:['rain on cracked desert ground — absorbed instantly, as if the need had been waiting for exactly this','rain on saturated soil that can\'t absorb any more and simply runs off','water poured onto a surface that\'s already wet — it beads up and rolls away','a light drizzle that barely touches the surface before evaporating in the heat'],h:'Think: real quenching = total satisfaction of deep need — like rain on cracked ground that drinks it instantly',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'simile',w:'quench',q:'Complete the simile: She quenched her curiosity like ___',a:'someone finally allowed into the library after being kept outside for years — thoroughly, without leaving a shelf unread',ch:['someone finally allowed into the library after being kept outside for years — thoroughly, without leaving a shelf unread','someone who picks up one book, glances at the cover, and puts it back','a visitor who stands in the library doorway but doesn\'t come inside','a reader who checks out a single book and returns it before finishing'],h:'Think: quenching deep curiosity is total and complete — like a reader finally given free access to everything they\'d been kept from',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'simile',w:'rigor',q:'Complete the simile: The rigor of the training program was as relentless as ___',a:'a desert at midsummer — no relief, no shade, no shortcut through',ch:['a desert at midsummer — no relief, no shade, no shortcut through','a shaded garden path on a cool morning — pleasant, well-maintained, easy','a trail with regular rest stops and fresh water at every turn','a course designed to be gentle enough that no one ever has to stop'],h:'Think: rigor = relentless, no escape — like a desert in full summer that offers no shade and no relief',l:13,s:'The Ship of the Desert',c:'#fb923c'},

{t:'simile',w:'sear',q:'Complete the simile: The searing heat hit them like ___',a:'a door opened onto a furnace — one step forward and the air itself became a thing to push through',ch:['a door opened onto a furnace — one step forward and the air itself became a thing to push through','a window opened to let in a cool morning breeze','a gentle warmth spreading through the room as the heater turns on','sunlight through a window — warm but not uncomfortable, welcome on a cold day'],h:'Think: searing heat = something you physically encounter — like walking into a furnace, the air itself has a new density',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'simile',w:'transport',q:'Complete the simile: The camel transported goods across the desert like ___',a:'a living freight service — slow, sure, and never once asking for a paved road',ch:['a living freight service — slow, sure, and never once asking for a paved road','a high-speed train that needs perfectly flat track and regular maintenance stops','a delivery drone that needs a clear signal and returns to base every few hours','a courier who requires a smooth road, shelter from weather, and guaranteed cell service'],h:'Think: transport by camel = reliable, self-sufficient, adapted to the conditions — like a freight service that needs nothing the desert can\'t provide',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'simile',w:'transport',q:'Complete the simile: They transported the fragile cargo like ___',a:'surgeons carrying a patient — hands steady, pace careful, eyes never leaving what mattered',ch:['surgeons carrying a patient — hands steady, pace careful, eyes never leaving what mattered','workers moving heavy equipment as fast as possible before the end of the shift','movers who stack everything quickly and sort out the damage at the destination','couriers who hand off the package without checking whether it arrived intact'],h:'Think: careful transport = full attention and steadiness — like surgeons, who carry what they\'re responsible for with total focus',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'simile',w:'wend',q:'Complete the simile: The line of camels wended across the dune like ___',a:'a sentence being written slowly across a blank page — each animal a letter, the whole a meaning',ch:['a sentence being written slowly across a blank page — each animal a letter, the whole a meaning','a line of text erased letter by letter until nothing remained','a paragraph crossed out and rewritten without any of the original words','a blank page waiting to be written on before the journey can begin'],h:'Think: wending across the desert = creating meaning through movement — like letters forming a sentence, each step part of a larger message',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'simile',w:'wend',q:'Complete the simile: She wended her way through the crowded market like ___',a:'water finding its path through stone — patient, unhurried, eventually through',ch:['water finding its path through stone — patient, unhurried, eventually through','a bulldozer pushing through the crowd by force','a person who stops and waits for the crowd to clear before taking another step','someone who turns back each time a new person blocks the path'],h:'Think: wending through obstacles = patient, natural path-finding — like water that doesn\'t force its way through stone but finds the passage',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'simile',w:'wend',q:'Complete the simile: They wended through the mountain pass like ___',a:'climbers who have agreed that the summit is not the point — the going is',ch:['climbers who have agreed that the summit is not the point — the going is','climbers racing to reach the top before anyone else and immediately turning around','a team that calls off the climb the moment conditions become less than ideal','hikers who stop at the base and wait for a cable car to take them to the top'],h:'Think: to wend is to be fully in the journey — like climbers who find meaning in the traversal, not the destination',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'metaphor',w:'adapt',q:'Which sentence is a metaphor using ADAPT?',a:'The camel is adaptation itself — an animal that desert-tested every part of its body until only what worked remained.',ch:['The camel is adaptation itself — an animal that desert-tested every part of its body until only what worked remained.','The camel has adapted so thoroughly to the desert that it seems to be adaptation personified.','Like adaptation made physical, the camel has been shaped by the desert into exactly what the desert required.','The camel has adapted to the desert in every way, as if adaptation were its defining characteristic.'],h:'Think: calling the camel directly adaptation itself — it IS the concept embodied, the physical proof of what full adaptation looks like',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'metaphor',w:'adapt',q:'Which sentence is a metaphor using ADAPT?',a:'To adapt is to be water — it takes the shape of any container without losing what it is.',ch:['To adapt is to be water — it takes the shape of any container without losing what it is.','To adapt is to change the way water changes — taking new forms while staying essentially the same.','Like water in a new container, adapting means changing your shape to fit new conditions.','Adapting feels like being water — you adjust to the new shape without losing your fundamental nature.'],h:'Think: calling adaptation directly being water — you ARE the fluid, and the container IS the new condition you must fit',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'metaphor',w:'deplete',q:'Which sentence is a metaphor using DEPLETE?',a:'The drought was a slow depleting — the river grew thinner week by week, like a word being slowly erased.',ch:['The drought was a slow depleting — the river grew thinner week by week, like a word being slowly erased.','The drought depleted the river slowly, as if the water were being gradually erased.','Like a word being slowly erased, the drought depleted the river letter by letter, week by week.','The drought depleted the river over time, in the way that a word is erased letter by letter.'],h:'Think: calling the drought directly a slow depleting — it IS the process of erasure, the river IS the word disappearing',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'metaphor',w:'deplete',q:'Which sentence is a metaphor using DEPLETE?',a:'Worry is a depleting — it draws on the same reserves as action, but produces nothing.',ch:['Worry is a depleting — it draws on the same reserves as action, but produces nothing.','Worry depletes your energy the way action does, but without the productive result.','Like a depleting that drains without producing, worry uses up reserves that action could have spent usefully.','Worrying feels like depletion — it costs energy the way action does but gives nothing back.'],h:'Think: calling worry directly a depleting — it IS the draining process, drawing from reserves while creating nothing',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'metaphor',w:'deplete',q:'Which sentence is a metaphor using DEPLETE?',a:'His enthusiasm was a resource they depleted carelessly — borrowed without thought, spent without gratitude, gone before anyone noticed.',ch:['His enthusiasm was a resource they depleted carelessly — borrowed without thought, spent without gratitude, gone before anyone noticed.','His enthusiasm was depleted by their carelessness, the way a resource is drained by wasteful use.','Like a resource depleted through careless use, his enthusiasm was drawn on without thought until nothing remained.','They depleted his enthusiasm carelessly, treating it as a resource without limits until it ran out.'],h:'Think: calling enthusiasm directly a resource — it IS the supply, and depletion IS what careless use does to finite things',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'metaphor',w:'efficient',q:'Which sentence is a metaphor using EFFICIENT?',a:'The camel\'s body is a masterwork of efficiency — a thousand-year design process that wasted nothing and solved everything.',ch:['The camel\'s body is a masterwork of efficiency — a thousand-year design process that wasted nothing and solved everything.','The camel\'s body is as efficient as a masterwork of engineering — designed over thousands of years to waste nothing.','Like a masterwork of engineering, the camel\'s body has been made efficient over thousands of years.','The efficiency of the camel\'s body is like that of a masterwork — nothing wasted, everything purposeful.'],h:'Think: calling the camel\'s body directly a masterwork — it IS the finished design, and efficiency IS what makes it a masterwork',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'metaphor',w:'efficient',q:'Which sentence is a metaphor using EFFICIENT?',a:'Her mind was an efficient machine — it took in the problem, ran it through every process, and delivered an answer before you finished the question.',ch:['Her mind was an efficient machine — it took in the problem, ran it through every process, and delivered an answer before you finished the question.','Her mind worked as efficiently as a machine — processing every problem quickly and producing answers instantly.','Like an efficient machine, her mind could process a problem and return an answer in seconds.','Her mind processed problems as efficiently as a well-designed machine — no wasted steps, immediate output.'],h:'Think: calling her mind directly a machine — it IS the processing device, and efficient IS its defining characteristic',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'metaphor',w:'fatigue',q:'Which sentence is a metaphor using FATIGUE?',a:'Fatigue was his companion by the third day — a quiet presence that sat behind every thought and made the simplest task feel like a negotiation.',ch:['Fatigue was his companion by the third day — a quiet presence that sat behind every thought and made the simplest task feel like a negotiation.','By the third day, fatigue was like a companion — always present, slowing every thought.','Like a companion that never left his side, fatigue had made itself at home in every action by the third day.','By the third day, fatigue followed him the way a companion does — constantly present, impossible to shake.'],h:'Think: calling fatigue directly a companion — it IS the presence, always at his side, affecting everything',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'metaphor',w:'fatigue',q:'Which sentence is a metaphor using FATIGUE?',a:'The runner\'s fatigue was the finish line she had to reach before she could reach the finish line.',ch:['The runner\'s fatigue was the finish line she had to reach before she could reach the finish line.','The runner\'s fatigue felt like a finish line she had to cross before crossing the actual finish line.','Like a second finish line placed before the real one, her fatigue was the obstacle between her and her goal.','Her fatigue was as real as a finish line — she had to push through it to get to the one that mattered.'],h:'Think: calling fatigue directly a finish line — the exhaustion IS the barrier, and crossing it IS the achievement before the real one',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'metaphor',w:'fatigue',q:'Which sentence is a metaphor using FATIGUE?',a:'By nightfall, fatigue had become the landscape — not something she was walking through, but the ground itself.',ch:['By nightfall, fatigue had become the landscape — not something she was walking through, but the ground itself.','By nightfall, fatigue had spread across her world the way a landscape spreads in every direction.','Like a landscape she was moving through, fatigue surrounded her by nightfall and shaped everything she experienced.','Her fatigue by nightfall was like the landscape — it defined the whole environment she was traveling through.'],h:'Think: calling fatigue directly the landscape — it IS the terrain, not something encountered within it but the ground under every step',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'metaphor',w:'gait',q:'Which sentence is a metaphor using GAIT?',a:'The camel\'s gait was a clock — patient, regular, measuring the desert in seconds of footfall.',ch:['The camel\'s gait was a clock — patient, regular, measuring the desert in seconds of footfall.','The camel\'s gait was as regular as a clock — each step marking time as it moved across the desert.','Like a clock measuring time, the camel\'s gait measured distance across the desert step by step.','The regularity of the camel\'s gait was as precise as a clock — each footfall a second, each mile an hour.'],h:'Think: calling the gait directly a clock — it IS the timepiece, measuring the desert in its own steady rhythm',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'metaphor',w:'gait',q:'Which sentence is a metaphor using GAIT?',a:'Her confident gait was an announcement — she owned this room, and everyone knew it the moment she crossed the threshold.',ch:['Her confident gait was an announcement — she owned this room, and everyone knew it the moment she crossed the threshold.','Her confident gait was like an announcement — it told everyone she owned the room before she spoke.','Like an announcement made before she entered, her gait declared her ownership of the space.','Her gait was as much an announcement as a spoken statement — it communicated everything about her before she said a word.'],h:'Think: calling her gait directly an announcement — it IS the declaration, communicated entirely through movement',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'metaphor',w:'glare',q:'Which sentence is a metaphor using GLARE?',a:'The desert sun\'s glare is its signature — its refusal to let you forget where you are, even for a moment.',ch:['The desert sun\'s glare is its signature — its refusal to let you forget where you are, even for a moment.','The desert sun\'s glare acts like a signature — it marks the landscape in a way that tells you exactly where you are.','Like a signature that identifies the sun, the glare is the desert\'s way of announcing its presence constantly.','The glare is the desert sun\'s signature in the way that a distinctive mark identifies its maker.'],h:'Think: calling the glare directly a signature — it IS the identifying mark, the sun\'s insistence on being known',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'metaphor',w:'glare',q:'Which sentence is a metaphor using GLARE?',a:'The manager\'s glare was a wall — it stopped conversation, pinned you in place, and made you wish you had chosen a different aisle.',ch:['The manager\'s glare was a wall — it stopped conversation, pinned you in place, and made you wish you had chosen a different aisle.','The manager\'s glare was like a wall — it stopped you and made you reconsider your direction.','Like a wall placed in your path, the manager\'s glare halted everything and made movement seem impossible.','Her glare had the effect of a wall — stopping everyone who encountered it before they could continue.'],h:'Think: calling the glare directly a wall — it IS the physical barrier, and to be glared at IS to be stopped in your tracks',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'metaphor',w:'habitat',q:'Which sentence is a metaphor using HABITAT?',a:'A creature\'s habitat is not just where it lives — it is everything the creature has made a contract with, every condition it has agreed to accept.',ch:['A creature\'s habitat is not just where it lives — it is everything the creature has made a contract with, every condition it has agreed to accept.','A creature\'s habitat is more than just its home — it\'s like a contract between the animal and its environment.','Like a contract agreed to over thousands of years, a creature\'s habitat is the deal it has made with its conditions.','The relationship between a creature and its habitat is like a contract — each has accepted what the other requires.'],h:'Think: calling habitat directly a contract — it IS the agreement, and every adaptation IS a clause accepted over generations',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'metaphor',w:'habitat',q:'Which sentence is a metaphor using HABITAT?',a:'The desert is the dromedary\'s habitat and its curriculum — everything the camel knows about survival, the desert has taught it.',ch:['The desert is the dromedary\'s habitat and its curriculum — everything the camel knows about survival, the desert has taught it.','The desert acts as both habitat and curriculum for the dromedary — providing the conditions and teaching the lessons.','Like a curriculum designed for the dromedary, the desert habitat has taught it everything it knows about survival.','The dromedary\'s habitat has served as its curriculum — the desert teaching the animal everything survival requires.'],h:'Think: calling the desert both habitat and curriculum — it IS the school, and every adaptation IS a lesson learned',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'metaphor',w:'habitat',q:'Which sentence is a metaphor using HABITAT?',a:'Without its habitat, an animal is a sentence without a subject — the words are there, but the meaning is gone.',ch:['Without its habitat, an animal is a sentence without a subject — the words are there, but the meaning is gone.','Without its habitat, an animal is like a sentence missing its subject — the rest is there but makes no sense.','Like a sentence from which the subject has been removed, an animal without its habitat loses its organizing meaning.','An animal removed from its habitat is as incomplete as a sentence with no subject — technically present, fundamentally broken.'],h:'Think: calling the animal without habitat directly a sentence without a subject — it IS the fragment, grammatically present but semantically empty',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'metaphor',w:'oblivious',q:'Which sentence is a metaphor using OBLIVIOUS?',a:'The camel is oblivion in motion — it wends across the desert utterly indifferent to everything that isn\'t the next step.',ch:['The camel is oblivion in motion — it wends across the desert utterly indifferent to everything that isn\'t the next step.','The camel moves as if oblivious to everything except the step in front of it.','Like oblivion made physical, the camel is entirely indifferent to the discomforts of the desert it crosses.','The camel\'s obliviousness to hardship is like oblivion in motion — a total absence of the distraction that would stop others.'],h:'Think: calling the camel directly oblivion in motion — it IS the absence of distraction, embodied in a moving form',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'metaphor',w:'oblivious',q:'Which sentence is a metaphor using OBLIVIOUS?',a:'Obliviousness is sometimes armor — a shell the camel and the focused traveler both wear, impervious to distractions that would stop a less adapted creature.',ch:['Obliviousness is sometimes armor — a shell the camel and the focused traveler both wear, impervious to distractions that would stop a less adapted creature.','Obliviousness sometimes works like armor — protecting the camel and the focused person from distractions that would stop others.','Like armor worn against distraction, obliviousness protects the camel from the things that would exhaust a creature paying attention.','Obliviousness can be as protective as armor — shielding the wearer from every distraction that would otherwise slow them down.'],h:'Think: calling obliviousness directly armor — it IS the protective layer, and wearing it IS what allows sustained movement through hardship',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'metaphor',w:'outmoded',q:'Which sentence is a metaphor using OUTMODED?',a:'The stagecoach is a cautionary tale in wood and iron — the outmoded version of every idea that thought it was permanent.',ch:['The stagecoach is a cautionary tale in wood and iron — the outmoded version of every idea that thought it was permanent.','The stagecoach is like a cautionary tale — an outmoded technology that once seemed permanent and indispensable.','Like a cautionary tale told in wood and iron, the stagecoach is the outmoded predecessor of every transportation idea that believed it would last forever.','The story of the stagecoach is a cautionary tale about outmoded thinking — it dominated and then vanished when something better arrived.'],h:'Think: calling the stagecoach directly a cautionary tale — it IS the story, the permanent-seeming thing that proved temporary',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'metaphor',w:'outmoded',q:'Which sentence is a metaphor using OUTMODED?',a:'An outmoded idea is not wrong; it is a fossil — once perfectly adapted, now preserved only as evidence of what used to work.',ch:['An outmoded idea is not wrong; it is a fossil — once perfectly adapted, now preserved only as evidence of what used to work.','An outmoded idea is like a fossil — once useful, now preserved as a record of a way of thinking that no longer applies.','Like a fossil that was once a living creature, an outmoded idea was once a working solution now preserved in the record of history.','An outmoded idea has become a fossil — the idea itself still intact, but the conditions that made it useful long gone.'],h:'Think: calling the outmoded idea directly a fossil — it IS the preserved remnant, once alive and functioning, now a specimen',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'metaphor',w:'outmoded',q:'Which sentence is a metaphor using OUTMODED?',a:'Every technology is an outmoded technology in waiting — the only question is how long before something else makes it a relic.',ch:['Every technology is an outmoded technology in waiting — the only question is how long before something else makes it a relic.','Every technology will eventually become outmoded — it\'s only a matter of how long before something better arrives.','Like an outmoded technology waiting to happen, every current tool will eventually be replaced by something more efficient.','No technology stays current forever — every one of them is outmoded at some future date, just not yet.'],h:'Think: calling current technology directly outmoded in waiting — it IS already the relic, just not yet arrived at that moment',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'metaphor',w:'prominent',q:'Which sentence is a metaphor using PROMINENT?',a:'The camel\'s hump is its most prominent feature — a landmark on the landscape of the animal itself.',ch:['The camel\'s hump is its most prominent feature — a landmark on the landscape of the animal itself.','The camel\'s hump is so prominent it acts like a landmark — the most visible feature on the animal.','Like a landmark on a landscape, the camel\'s hump is the most prominent feature of the animal\'s silhouette.','The camel\'s hump is as prominent as a landmark — it defines the animal\'s outline from any direction.'],h:'Think: calling the hump directly a landmark — it IS the navigational feature, the thing that defines the animal\'s landscape',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'metaphor',w:'prominent',q:'Which sentence is a metaphor using PROMINENT?',a:'Her reputation was a prominent building on the horizon — visible from any direction, impossible to ignore when approaching.',ch:['Her reputation was a prominent building on the horizon — visible from any direction, impossible to ignore when approaching.','Her reputation was as prominent as a tall building — visible from far away, impossible to overlook.','Like a prominent building visible from every direction, her reputation preceded her wherever she went.','Her reputation had the prominence of a landmark — you could see it coming long before you arrived.'],h:'Think: calling her reputation directly a building — it IS the structure, prominent, defining the horizon before you\'ve even arrived',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'metaphor',w:'quench',q:'Which sentence is a metaphor using QUENCH?',a:'The oasis is not just water — it is the quenching of every thirst at once: physical, psychological, and the thirst to believe the journey was worth it.',ch:['The oasis is not just water — it is the quenching of every thirst at once: physical, psychological, and the thirst to believe the journey was worth it.','The oasis quenches not just physical thirst but psychological thirst as well — it is more than just water.','Like a quenching that reaches every layer of need, the oasis satisfies not just the body but the spirit of the journey.','An oasis quenches every kind of thirst — not just the physical one, but the deeper thirst for meaning in the hardship.'],h:'Think: calling the oasis directly the quenching — it IS the act of satisfaction, not just the source of water',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'metaphor',w:'quench',q:'Which sentence is a metaphor using QUENCH?',a:'Reading was the only thing that quenched his real thirst — the hunger for a world larger than the one he could see from his window.',ch:['Reading was the only thing that quenched his real thirst — the hunger for a world larger than the one he could see from his window.','Reading quenched his real thirst for knowledge the way water quenches physical thirst.','Like the only source of water in a desert, reading quenched a thirst that nothing else could reach.','Reading was as good as water to him — it quenched his hunger for a bigger world every time he opened a book.'],h:'Think: calling reading the only quenching — it IS the sole satisfier, and the thirst for a larger world IS what it extinguishes',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'metaphor',w:'quench',q:'Which sentence is a metaphor using QUENCH?',a:'The rain was a quenching — it arrived with the single purpose of relieving what the sun had taken.',ch:['The rain was a quenching — it arrived with the single purpose of relieving what the sun had taken.','The rain quenched the earth\'s thirst the way only rain can — arriving with the single purpose of relief.','Like a quenching delivered from above, the rain arrived to relieve exactly what the sun had taken.','The rain\'s purpose was to quench — to relieve the drought the sun had imposed on everything below it.'],h:'Think: calling the rain directly a quenching — it IS the act of relief, arriving as a single purposeful event',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'metaphor',w:'rigor',q:'Which sentence is a metaphor using RIGOR?',a:'The desert\'s rigor is its curriculum — every creature that survives has passed the hardest exam ever designed.',ch:['The desert\'s rigor is its curriculum — every creature that survives has passed the hardest exam ever designed.','The desert\'s rigorous conditions work like a curriculum — every survivor has been tested and passed.','Like a curriculum of extraordinary rigor, the desert tests every creature that enters and keeps only those who pass.','The desert\'s rigor is its teaching method — every creature that survives has completed the course.'],h:'Think: calling the desert\'s rigor directly a curriculum — it IS the educational system, and every adaptation IS a lesson passed',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'metaphor',w:'rigor',q:'Which sentence is a metaphor using RIGOR?',a:'The rigor of her training was an investment — she paid daily in sweat so that when it mattered, she could pay in confidence.',ch:['The rigor of her training was an investment — she paid daily in sweat so that when it mattered, she could pay in confidence.','The rigor of her training worked like an investment — the daily cost paid off when the real test arrived.','Like an investment that returns more than it cost, the rigor of her training paid off in confidence when she needed it.','Her rigorous training was an investment in future performance — every hard session a deposit toward the day she\'d need the return.'],h:'Think: calling the rigor directly an investment — it IS the financial instrument, and daily sweat IS the capital deposited',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'metaphor',w:'sear',q:'Which sentence is a metaphor using SEAR?',a:'The memory was seared into him — not painful anymore, but permanent, like a brand that has cooled but left its mark.',ch:['The memory was seared into him — not painful anymore, but permanent, like a brand that has cooled but left its mark.','The memory had been seared into him the way heat sears a surface — permanent, impossible to remove.','Like something seared into place by intense heat, the memory had become part of him and could not be undone.','The memory seared into him the way a brand sears into leather — instantly, permanently, and without negotiation.'],h:'Think: calling the searing directly the action done to the memory — it IS the branding, and the memory IS what got marked permanently',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'metaphor',w:'sear',q:'Which sentence is a metaphor using SEAR?',a:'The midday desert is a forge — it sears everything that passes through it and tests what is strong enough to remain.',ch:['The midday desert is a forge — it sears everything that passes through it and tests what is strong enough to remain.','The midday desert works like a forge — searing everything in it and testing what can withstand the heat.','Like a forge that sears and tests, the midday desert burns everything passing through it and keeps only what endures.','The desert at midday has the effect of a forge — searing, testing, burning away everything that cannot survive.'],h:'Think: calling the midday desert directly a forge — it IS the furnace, and to pass through it IS to be seared and tested',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'metaphor',w:'transport',q:'Which sentence is a metaphor using TRANSPORT?',a:'The camel is not just transport — it is a civilization\'s entire infrastructure, the whole shipping network for a world without roads.',ch:['The camel is not just transport — it is a civilization\'s entire infrastructure, the whole shipping network for a world without roads.','The camel was more than transport — it functioned as the entire infrastructure of a civilization with no roads.','Like an entire shipping network compressed into one animal, the camel was more than transport for desert civilizations.','The camel was a whole civilization\'s transport system — roads, trucks, and freight all in one animal.'],h:'Think: calling the camel directly an infrastructure — it IS the entire system, not just one part of it',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'metaphor',w:'transport',q:'Which sentence is a metaphor using TRANSPORT?',a:'Language is the most efficient form of transport — it carries ideas across centuries, unloads them in new minds, and travels back empty for another load.',ch:['Language is the most efficient form of transport — it carries ideas across centuries, unloads them in new minds, and travels back empty for another load.','Language works like the most efficient transport — carrying ideas across time and delivering them to new generations.','Like a transport that moves ideas instead of goods, language carries meaning across centuries to new minds.','The most efficient transport for ideas is language — it crosses time and delivers its cargo without being depleted.'],h:'Think: calling language directly transport — it IS the vehicle, ideas ARE the cargo, and centuries ARE the distance traveled',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'metaphor',w:'wend',q:'Which sentence is a metaphor using WEND?',a:'The caravan was time itself wending across the desert — patient, purposeful, tracing the same route it had traced a thousand years before.',ch:['The caravan was time itself wending across the desert — patient, purposeful, tracing the same route it had traced a thousand years before.','The caravan wended across the desert like time — slow, patient, following the same route it always had.','Like time wending across centuries, the caravan moved through the desert with the same patience and purpose it always had.','The caravan\'s wending across the desert was like time itself — following the same path it had always followed.'],h:'Think: calling the caravan directly time wending — it IS the movement of time, patient, purposeful, ancient',l:13,s:'The Ship of the Desert',c:'#fb923c'},
{t:'metaphor',w:'wend',q:'Which sentence is a metaphor using WEND?',a:'To wend is to trust the way — to let the path unfold rather than forcing it, accepting the detour as part of the journey.',ch:['To wend is to trust the way — to let the path unfold rather than forcing it, accepting the detour as part of the journey.','To wend is to travel with trust — like following a path without insisting it go where you planned.','Like trusting a path that winds rather than forcing it straight, to wend is to accept the journey as it comes.','Wending means trusting the way forward — following where the path leads rather than demanding it comply with your plan.'],h:'Think: calling wending directly trusting the way — it IS the act of acceptance, letting the journey determine the path',l:13,s:'The Ship of the Desert',c:'#fb923c'},

{t:'simile',w:'discreet',q:'Complete the simile: She kept the secret as discreetly as ___',a:'a river holds the stone it has smoothed for a thousand years — without mentioning it to the banks',ch:['a river holds the stone it has smoothed for a thousand years — without mentioning it to the banks','a river that floods its banks in spring and tells every field what it has carried','a stream that deposits its silt visibly at the mouth and leaves nothing to the imagination','a current that announces its direction to every obstacle it passes'],h:'Think: discreet = carrying something privately, never making it the subject — like a river that smoothed the stone and never once mentioned the stone',l:14,s:'The Silk Road',c:'#22d3ee'},
{t:'simile',w:'engross',q:'Complete the simile: The story engrossed her like ___',a:'a tide pulling her out from shore — not violent, but insistent, and the shore kept getting farther',ch:['a tide pulling her out from shore — not violent, but insistent, and the shore kept getting farther','a gentle wave that washes over your feet and immediately retreats','a tide that recedes before you\'ve finished noticing it has arrived','a calm lake that holds your reflection but requires nothing of you'],h:'Think: complete engrossment = being drawn out past the point of return — like a tide that is not asking permission',l:14,s:'The Silk Road',c:'#22d3ee'},
{t:'simile',w:'engross',q:'Complete the simile: The puzzle engrossed him like ___',a:'a locked room he had agreed to stay in — not trapped, but unwilling to leave until he understood the door',ch:['a locked room he had agreed to stay in — not trapped, but unwilling to leave until he understood the door','a room so large and empty that he quickly grew bored and looked for the exit','a corridor that had no doors at all — easy to enter and easier to leave','a room with a wide-open window and a view that required nothing of him'],h:'Think: being engrossed = choosing to stay inside a problem until you solve it — like a locked room you agreed to be in',l:14,s:'The Silk Road',c:'#22d3ee'},
{t:'simile',w:'esteem',q:'Complete the simile: The esteem the court held for Marco Polo was like ___',a:'a lantern carried ahead of someone on a dark road — lighting the path before they arrive',ch:['a lantern carried ahead of someone on a dark road — lighting the path before they arrive','a torch left at the crossroads so that anyone who needs it can take it and go','a lamp turned low because the person holding it doesn\'t want to be noticed','a candle put out the moment the traveler comes close to seeing its light'],h:'Think: esteem leads reputation — it lights the path before the person walks it, the way a lantern clears the dark',l:14,s:'The Silk Road',c:'#22d3ee'},
{t:'simile',w:'esteem',q:'Complete the simile: He was held in as much esteem as ___',a:'the first light of dawn — not the brightest, but the one everything depends on to begin',ch:['the first light of dawn — not the brightest, but the one everything depends on to begin','a streetlamp in a city full of streetlamps — present, useful, indistinguishable from the rest','the last light before dark — welcomed, but only because nothing else is left','a lamp turned on by accident that nobody bothered to turn off'],h:'Think: esteem is foundational — like dawn, the first light that makes all the other lights possible',l:14,s:'The Silk Road',c:'#22d3ee'},
{t:'simile',w:'exaggerate',q:'Complete the simile: His story grew like ___',a:'a fish tale told to a larger audience each time — the fish gaining a foot with every telling',ch:['a fish tale told to a larger audience each time — the fish gaining a foot with every telling','a story faithfully retold to match what actually happened, no matter how many times it was told','a memory that stays precisely the same shape regardless of how long it has been stored','a record that documents events exactly as they occurred'],h:'Think: to exaggerate = to let the story grow in size with each retelling — like a fish that gains a foot every time someone asks how big it was',l:14,s:'The Silk Road',c:'#22d3ee'},
{t:'simile',w:'exaggerate',q:'Complete the simile: The traveler\'s account was as exaggerated as ___',a:'a map drawn by someone who had only heard the geography described and never walked it',ch:['a map drawn by someone who had only heard the geography described and never walked it','a survey completed by a careful cartographer who checked every measurement twice','a chart drawn from satellite images and confirmed by the people who walked the ground','a map revised after every new expedition to correct whatever the last version got wrong'],h:'Think: exaggeration = imagining without verifying, drawing from hearsay — like a map made entirely from secondhand description',l:14,s:'The Silk Road',c:'#22d3ee'},
{t:'simile',w:'extensive',q:'Complete the simile: His travels were as extensive as ___',a:'the silence after a long sentence — not brief, not passing, but filling every available space',ch:['the silence after a long sentence — not brief, not passing, but filling every available space','the pause between two words in a conversation that will pick up immediately','the gap between footsteps that closes before it is fully noticed','the space between heartbeats — short, regular, never quite long enough to measure'],h:'Think: extensive = filling every space — like a silence that doesn\'t end, but occupies the whole of everything that follows',l:14,s:'The Silk Road',c:'#22d3ee'},
{t:'simile',w:'extensive',q:'Complete the simile: The Silk Road was as extensive as ___',a:'a sentence whose subject is in one country and whose period is in another',ch:['a sentence whose subject is in one country and whose period is in another','a word that begins and ends in the same place it started, going nowhere outside itself','a paragraph contained entirely within one chapter of a book written in a single room','a single syllable spoken and finished before the listener can move'],h:'Think: extensive = crossing so much distance that beginning and end are in different worlds — like a sentence whose grammar spans continents',l:14,s:'The Silk Road',c:'#22d3ee'},
{t:'simile',w:'fantastic',q:'Complete the simile: The riches of Kublai Khan\'s palace were as fantastic as ___',a:'a dream recounted so vividly that the listener doubts whether the teller ever woke up',ch:['a dream recounted so vividly that the listener doubts whether the teller ever woke up','a perfectly ordinary day described plainly to someone who experienced the same one','a familiar story told the same way it has always been told, with nothing added','a report read from notes taken at the time, with no elaboration and no color'],h:'Think: fantastic = so extraordinary that describing it makes you sound like you\'re still asleep — like a dream told so fully that waking seems in question',l:14,s:'The Silk Road',c:'#22d3ee'},
{t:'simile',w:'fantastic',q:'Complete the simile: The city described in his journal was as fantastic as ___',a:'a building no architect had been asked to design — it had grown out of a desire that nobody planned',ch:['a building no architect had been asked to design — it had grown out of a desire that nobody planned','a building drawn to specification and constructed to code, with no feature unaccounted for','a structure reviewed by the city before the first stone was laid, exactly as imagined','a design produced from a standard template and replicated in a dozen other cities'],h:'Think: fantastic = emerging from imagination without being planned — like a building nobody commissioned that grew from sheer wanting',l:14,s:'The Silk Road',c:'#22d3ee'},
{t:'simile',w:'intrigue',q:'Complete the simile: The East intrigued Marco Polo like ___',a:'a door heard through a wall — not yet open, not yet seen, but unmistakably there',ch:['a door heard through a wall — not yet open, not yet seen, but unmistakably there','a door so clearly labeled that he knew exactly what was behind it before he arrived','a door that he had already opened many times and found no surprises on the other side','a door wide open with a sign listing everything that could be seen through it'],h:'Think: intrigue = the irresistible pull of what is sensed but not yet known — like a door heard but not yet seen',l:14,s:'The Silk Road',c:'#22d3ee'},
{t:'simile',w:'intrigue',q:'Complete the simile: The locked chest intrigued her like ___',a:'a question asked in a language you almost understand — meaning close enough to touch but not yet held',ch:['a question asked in a language you almost understand — meaning close enough to touch but not yet held','a question asked clearly in your own language with an obvious answer','a statement made so plainly that it required no interpretation at all','a message already translated and read, with nothing left to puzzle over'],h:'Think: intrigue = the frustration and fascination of almost-understanding — like language that is just beyond your grasp',l:14,s:'The Silk Road',c:'#22d3ee'},
{t:'simile',w:'marvel',q:'Complete the simile: The Great Wall rose out of the landscape like ___',a:'an argument the mountain had been making for a thousand years — and suddenly you could read it',ch:['an argument the mountain had been making for a thousand years — and suddenly you could read it','a feature the geographers had accurately placed on every map for centuries','a road that went exactly where any traveler would have predicted','a path worn by ordinary use into a shape that surprised no one'],h:'Think: a marvel like the Great Wall = the landscape making an argument that suddenly becomes legible — ancient, deliberate, suddenly comprehensible',l:14,s:'The Silk Road',c:'#22d3ee'},
{t:'simile',w:'marvel',q:'Complete the simile: The city of Xanadu was a marvel like ___',a:'a story told so well it creates the country it describes',ch:['a story told so well it creates the country it describes','a history book that documents facts without embellishment or imagination','a report that matches the reality so closely that no description adds anything','a record that is useful precisely because it is as plain as the event itself'],h:'Think: a marvel = something that brings into existence what it seems to only describe — like a story that doesn\'t report a world but makes it',l:14,s:'The Silk Road',c:'#22d3ee'},
{t:'simile',w:'mission',q:'Complete the simile: His mission carried him across Asia like ___',a:'a current that had no interest in his preferences — it was going where it was going',ch:['a current that had no interest in his preferences — it was going where it was going','a gentle breeze that changed direction every time he asked it to','a tide he could stop by raising his hand when he found a pleasant bay','a river he had the option of swimming against at any point he chose'],h:'Think: being on a mission = being carried forward by something that doesn\'t negotiate with you — like a current that is not asking where you\'d prefer to end up',l:14,s:'The Silk Road',c:'#22d3ee'},
{t:'simile',w:'mission',q:'Complete the simile: She pursued her mission like ___',a:'a navigator who has burned the return map — not reckless, but committed past the point of reconsidering',ch:['a navigator who has burned the return map — not reckless, but committed past the point of reconsidering','a traveler who keeps one eye on the horizon and the other on the road home','a sailor who plans every voyage with a clear route back built into the departure','a hiker who memorizes the trail in reverse before taking the first step forward'],h:'Think: total mission commitment = choosing not to keep the return option — like burning the map home',l:14,s:'The Silk Road',c:'#22d3ee'},
{t:'simile',w:'opportunity',q:'Complete the simile: The open trade routes were an opportunity like ___',a:'a door in a wall no one had ever looked for — once seen, impossible to explain how you\'d missed it',ch:['a door in a wall no one had ever looked for — once seen, impossible to explain how you\'d missed it','a wall so solid and well-maintained that no opening had ever existed or been imagined','a door everyone knew about but agreed not to use because the room behind it seemed ordinary','a gate that required a fee and a waiting period and a set of credentials already in use'],h:'Think: a great opportunity = something that was always there and becomes obvious the moment someone sees it — like a door in a wall',l:14,s:'The Silk Road',c:'#22d3ee'},
{t:'simile',w:'opportunity',q:'Complete the simile: He recognized the opportunity like ___',a:'a hunter who sees the gap before the animal does — still, already decided, before the moment has fully arrived',ch:['a hunter who sees the gap before the animal does — still, already decided, before the moment has fully arrived','a hunter who waits for the moment to announce itself before deciding whether to act','a tracker who moves only when conditions are perfect and otherwise holds back indefinitely','a watcher who identifies every opportunity as interesting and acts on none of them'],h:'Think: recognizing opportunity = seeing the gap before it fully opens — like a hunter who is already committed before the animal completes its move',l:14,s:'The Silk Road',c:'#22d3ee'},
{t:'simile',w:'relinquish',q:'Complete the simile: He relinquished his post at the Chinese court like ___',a:'a sailor leaving a harbor that has been home long enough to feel like the sea — not without grief, but without hesitation',ch:['a sailor leaving a harbor that has been home long enough to feel like the sea — not without grief, but without hesitation','a sailor who refuses to leave the dock because the harbor is all he knows','a traveler who unpacks all his bags and declares the first port the final destination','a navigator who has forgotten that the purpose of the harbor was never to stay'],h:'Think: relinquishing something truly valued = leaving with both grief and certainty — like a sailor who loved the harbor but knew the sea was still the point',l:14,s:'The Silk Road',c:'#22d3ee'},
{t:'simile',w:'relinquish',q:'Complete the simile: She relinquished control like ___',a:'a rope handed off mid-climb — carefully, to someone capable, before the weight became too much',ch:['a rope handed off mid-climb — carefully, to someone capable, before the weight became too much','a rope dropped carelessly because she decided the climb was not worth finishing','a grip released without checking whether anyone was there to take the weight','a rope abandoned mid-cliff with no consideration for what it was holding up'],h:'Think: relinquishing something with care = passing it deliberately to capable hands — like a rope transfer on a difficult climb',l:14,s:'The Silk Road',c:'#22d3ee'},
{t:'simile',w:'tyrant',q:'Complete the simile: His rule was as oppressive as ___',a:'a ceiling built lower every year until standing upright became a memory',ch:['a ceiling built lower every year until standing upright became a memory','a ceiling raised high enough that everyone could stand with room to spare','a room with no walls and a sky for a ceiling and a horizon for a floor','a building with no roof, open to every weather, but never closed'],h:'Think: tyranny = the gradual lowering of possibility — like a ceiling that makes you smaller every year without moving itself',l:14,s:'The Silk Road',c:'#22d3ee'},
{t:'simile',w:'tyrant',q:'Complete the simile: The tyrant\'s commands rang out like ___',a:'a bell rung in an empty room — loud, certain of itself, hearing nothing back',ch:['a bell rung in an empty room — loud, certain of itself, hearing nothing back','a bell rung and answered by every other bell in the city in glad recognition','a chime that invites a response and waits with genuine interest for one to arrive','a note played at the start of a conversation, offering a tone for the other person to match'],h:'Think: a tyrant speaks but doesn\'t listen — like a bell rung in an empty room, certain of its own sound, needing no answer',l:14,s:'The Silk Road',c:'#22d3ee'},
{t:'simile',w:'vanquish',q:'Complete the simile: He vanquished his fear like ___',a:'a traveler who crosses a mountain pass — not by making the mountain smaller, but by walking until the other side is real',ch:['a traveler who crosses a mountain pass — not by making the mountain smaller, but by walking until the other side is real','a traveler who studies the mountain so carefully that he convinces himself it isn\'t there','an explorer who waits at the base until someone else confirms the pass is safe','a hiker who turns back every time the grade steepens and calls the mountain vanquished'],h:'Think: vanquishing fear = not denying the obstacle, but crossing through it — like a pass that doesn\'t shrink, you just walk until it\'s behind you',l:14,s:'The Silk Road',c:'#22d3ee'},
{t:'simile',w:'vanquish',q:'Complete the simile: The travelers vanquished the desert\'s challenges like ___',a:'water wearing through stone — not once, not forcefully, but with the patience that knows it will get through',ch:['water wearing through stone — not once, not forcefully, but with the patience that knows it will get through','a hammer swung hard at the stone once, then put away when the stone didn\'t break','a crowd that pushes against the stone together and then disperses when it doesn\'t move','a current that hits the rock once and redirects around it permanently'],h:'Think: vanquishing through persistence = like water and stone — not a single blow, but sustained presence that wins over time',l:14,s:'The Silk Road',c:'#22d3ee'},
{t:'simile',w:'esteem',q:'Complete the simile: The explorer\'s esteem among his peers was like ___',a:'a current the other boats navigated around — not chosen, just there, shaping everything',ch:['a current the other boats navigated around — not chosen, just there, shaping everything','a current invisible to all the boats except the one that created it','a ripple that fades before reaching the far shore','a wave that builds and breaks and is forgotten before the next tide'],h:'Think: great esteem = a force that changes the behavior of everything around it without being asked — like a current',l:14,s:'The Silk Road',c:'#22d3ee'},
{t:'simile',w:'exaggerate',q:'Complete the simile: His account exaggerated the distances like ___',a:'a memory that keeps walking after the journey stops — adding miles to what was already a long road',ch:['a memory that keeps walking after the journey stops — adding miles to what was already a long road','a logbook updated daily with accurate mileage and nothing added in retrospect','a record that shrinks the journey slightly with each retelling to account for fatigue','a map that corrects its own exaggerations every time it is printed anew'],h:'Think: exaggerating distances = a memory that extends the journey after it\'s over — the road grows when you stop walking it',l:14,s:'The Silk Road',c:'#22d3ee'},
{t:'simile',w:'mission',q:'Complete the simile: Her mission guided her the way ___',a:'a fixed star guides a sailor — it doesn\'t lead from the front, it only shows you which way is forward',ch:['a fixed star guides a sailor — it doesn\'t lead from the front, it only shows you which way is forward','a lighthouse guides a ship that has already decided to stay close to shore','a road sign tells a driver which exit to take before pointing toward the next sign','a guide who walks ahead and stops every few miles to check that you are still following'],h:'Think: mission as guide = it doesn\'t walk with you, it orients you — like a star that shows direction without closing distance',l:14,s:'The Silk Road',c:'#22d3ee'},
{t:'simile',w:'opportunity',q:'Complete the simile: The Silk Road was an opportunity as rare as ___',a:'a clear mountain pass in winter — real, available, and absolutely not guaranteed to stay that way',ch:['a clear mountain pass in winter — real, available, and absolutely not guaranteed to stay that way','a mountain path that has been open every winter for a century and will be open again next year','a road that widens every decade and becomes easier to travel with every passing season','a route so well-established that missing it today simply means taking it tomorrow'],h:'Think: a rare opportunity = present now, but not promised for later — like a winter pass that is open today and may be closed tomorrow',l:14,s:'The Silk Road',c:'#22d3ee'},
{t:'simile',w:'vanquish',q:'Complete the simile: To vanquish your doubt is like ___',a:'lighting a room that has been dark so long the darkness had stopped seeming like a problem — suddenly you see everything that was there all along',ch:['lighting a room that has been dark so long the darkness had stopped seeming like a problem — suddenly you see everything that was there all along','turning on a light in a room you never doubted was empty — confirming what you already knew','letting your eyes adjust to the dark until the darkness itself becomes familiar','deciding the darkness is comfortable and choosing to stay in it rather than looking for the switch'],h:'Think: vanquishing doubt = illuminating what was always there — like light that doesn\'t create the room, it just makes it visible',l:14,s:'The Silk Road',c:'#22d3ee'},
{t:'metaphor',w:'benevolent',q:'Which sentence is a metaphor using BENEVOLENT?',a:'Kublai Khan\'s benevolent reign was a harvest — it fed not just the body but the sense that life was supposed to be worth living.',ch:['Kublai Khan\'s benevolent reign was a harvest — it fed not just the body but the sense that life was supposed to be worth living.','Kublai Khan\'s reign was as benevolent as a harvest — it provided for everyone under it.','Like a harvest that feeds everyone, his benevolent reign was generous in ways that sustained the whole kingdom.','His reign was benevolent in the way a harvest is — it came at the right time and gave what was needed.'],h:'Think: calling the benevolent reign directly a harvest — it IS the nourishment, not just something that provides it',l:14,s:'The Silk Road',c:'#22d3ee'},
{t:'metaphor',w:'benevolent',q:'Which sentence is a metaphor using BENEVOLENT?',a:'Benevolence is not a gift — it is a structure, and the people who live inside it rarely see the beams.',ch:['Benevolence is not a gift — it is a structure, and the people who live inside it rarely see the beams.','Benevolence is like a structure — it holds people up even when they don\'t notice it.','Like a structure whose beams go unseen, benevolence supports those within it invisibly.','Benevolence functions like a structure — essential, invisible once you\'re inside it.'],h:'Think: calling benevolence directly a structure — it IS the architecture, and those inside live by it without seeing it',l:14,s:'The Silk Road',c:'#22d3ee'},
{t:'metaphor',w:'consent',q:'Which sentence is a metaphor using CONSENT?',a:'Consent is not a door you pass through once — it is a road you travel together, and either traveler can stop.',ch:['Consent is not a door you pass through once — it is a road you travel together, and either traveler can stop.','Consent is like a door — once you pass through, both parties are in the same room.','Like a road you agree to travel together, consent is an ongoing commitment that either person can step off.','Consent works the way a shared road does — both travelers move along it together.'],h:'Think: calling consent directly a road — it IS the ongoing journey, not a one-time threshold',l:14,s:'The Silk Road',c:'#22d3ee'},
{t:'metaphor',w:'consent',q:'Which sentence is a metaphor using CONSENT?',a:'Without consent, the plan was a building with no foundation — impressive in design, certain to fall.',ch:['Without consent, the plan was a building with no foundation — impressive in design, certain to fall.','Without consent, the plan was like a building without a foundation — it looked good but wouldn\'t stand.','Like a building with no foundation, the plan without consent was guaranteed to collapse.','The plan without consent resembled a building with no foundation — the design was good but the base was missing.'],h:'Think: calling the plan directly a building without foundation — it IS the unstable structure, consent IS what makes it stand',l:14,s:'The Silk Road',c:'#22d3ee'},
{t:'metaphor',w:'discreet',q:'Which sentence is a metaphor using DISCREET?',a:'A discreet person is the librarian of other people\'s secrets — catalogued, protected, and never read aloud.',ch:['A discreet person is the librarian of other people\'s secrets — catalogued, protected, and never read aloud.','A discreet person is like a librarian — they keep information organized and don\'t share it.','Like a librarian who keeps the catalog private, a discreet person stores what they know without sharing it.','A discreet person functions the way a librarian does — holding information without broadcasting it.'],h:'Think: calling the discreet person directly a librarian — they ARE the keeper, and secrets ARE the collection never shared',l:14,s:'The Silk Road',c:'#22d3ee'},
{t:'metaphor',w:'discreet',q:'Which sentence is a metaphor using DISCREET?',a:'Discretion is not silence — it is the knowledge of which words, in whose ears, and never the rest.',ch:['Discretion is not silence — it is the knowledge of which words, in whose ears, and never the rest.','Discretion is like silence — it means holding back what doesn\'t need to be said.','Like silence that knows when to end, discretion is the judgment of when words are safe.','Discretion works the way silence does — it keeps what shouldn\'t be heard from being heard.'],h:'Think: calling discretion directly a form of knowledge — it IS the understanding of audience and timing, not just the absence of speech',l:14,s:'The Silk Road',c:'#22d3ee'},
{t:'metaphor',w:'engross',q:'Which sentence is a metaphor using ENGROSS?',a:'The manuscript was a gravity well — it engrossed every scholar who came close enough and held them until they finished or forgot the world.',ch:['The manuscript was a gravity well — it engrossed every scholar who came close enough and held them until they finished or forgot the world.','The manuscript was as engrossing as a gravity well — scholars who studied it found it hard to put down.','Like a gravity well that holds everything close, the manuscript engrossed every scholar who came near it.','The manuscript engrossed scholars the way a gravity well holds objects — pulling them in and not releasing them.'],h:'Think: calling the manuscript directly a gravity well — it IS the force, and engrossment IS what happens to anyone who enters its range',l:14,s:'The Silk Road',c:'#22d3ee'},
{t:'metaphor',w:'engross',q:'Which sentence is a metaphor using ENGROSS?',a:'To be engrossed is to be translated — you are no longer in the room you entered but in the country the story describes.',ch:['To be engrossed is to be translated — you are no longer in the room you entered but in the country the story describes.','To be engrossed is like being translated — you\'ve been moved from your actual location to another.','Like a translation that moves meaning from one language to another, being engrossed moves you from your room into the story.','Being engrossed works the way translation does — you end up somewhere else without leaving the page.'],h:'Think: calling engrossment directly translation — it IS the transport, and the reader IS the text that gets moved across the border',l:14,s:'The Silk Road',c:'#22d3ee'},
{t:'metaphor',w:'esteem',q:'Which sentence is a metaphor using ESTEEM?',a:'The esteem of the court was a currency Marco Polo spent carefully — once it ran out, the road home would cost more than he had.',ch:['The esteem of the court was a currency Marco Polo spent carefully — once it ran out, the road home would cost more than he had.','The esteem of the court was like a currency — spending it too quickly would leave him with nothing.','Like a currency that runs out if not carefully managed, the court\'s esteem required Marco Polo\'s careful spending.','The court\'s esteem functioned as a currency for Marco Polo — it could be earned, spent, and exhausted.'],h:'Think: calling esteem directly a currency — it IS the capital, and losing it IS bankruptcy in a world where you cannot mint more',l:14,s:'The Silk Road',c:'#22d3ee'},
{t:'metaphor',w:'esteem',q:'Which sentence is a metaphor using ESTEEM?',a:'Self-esteem is not what you think of yourself — it is the bedrock you stand on when other people\'s opinions are water.',ch:['Self-esteem is not what you think of yourself — it is the bedrock you stand on when other people\'s opinions are water.','Self-esteem is like bedrock — it gives you a solid place to stand when opinions try to wash you away.','Like bedrock that holds firm when water rises, self-esteem keeps you grounded when criticism floods in.','Self-esteem functions the way bedrock does — it provides a foundation that survives the water of other people\'s views.'],h:'Think: calling self-esteem directly bedrock — it IS the foundation, and opinions ARE the water that cannot erode what you stand on',l:14,s:'The Silk Road',c:'#22d3ee'},
{t:'metaphor',w:'exaggerate',q:'Which sentence is a metaphor using EXAGGERATE?',a:'His account of China was a cathedral — everything was correct in proportion, but the proportions had all been doubled.',ch:['His account of China was a cathedral — everything was correct in proportion, but the proportions had all been doubled.','His account of China was like a cathedral — grand and impressive, but scaled beyond what actually exists.','Like a cathedral that has expanded every real element to twice its size, his account preserved the truth while exaggerating its dimensions.','His account functioned like a cathedral — architecturally true, but built at a scale the original couldn\'t match.'],h:'Think: calling his account directly a cathedral — it IS the monument, exact in structure but exaggerated in scale, true and untrue simultaneously',l:14,s:'The Silk Road',c:'#22d3ee'},
{t:'metaphor',w:'exaggerate',q:'Which sentence is a metaphor using EXAGGERATE?',a:'Every exaggeration is a confession — it tells you what the teller most wanted to be true.',ch:['Every exaggeration is a confession — it tells you what the teller most wanted to be true.','Every exaggeration is like a confession — it reveals the wishes behind the words.','Like a confession that reveals what someone hopes for, every exaggeration shows what the speaker most wished were real.','Every exaggeration functions as a confession — you can read desire in the gap between the story and the truth.'],h:'Think: calling every exaggeration directly a confession — it IS the revelation, and desire IS what every inflated detail confesses to',l:14,s:'The Silk Road',c:'#22d3ee'},
{t:'metaphor',w:'extensive',q:'Which sentence is a metaphor using EXTENSIVE?',a:'His knowledge of the East was not a summary — it was an atlas, page after page, and each page had its own country.',ch:['His knowledge of the East was not a summary — it was an atlas, page after page, and each page had its own country.','His knowledge of the East was as extensive as an atlas — covering many regions in considerable depth.','Like an atlas with a page for each country, his extensive knowledge of the East covered territory after territory.','His extensive knowledge of the East was comparable to an atlas — comprehensive, covering every major area.'],h:'Think: calling his knowledge directly an atlas — it IS the comprehensive record, and every page IS a country mapped inside his memory',l:14,s:'The Silk Road',c:'#22d3ee'},
{t:'metaphor',w:'extensive',q:'Which sentence is a metaphor using EXTENSIVE?',a:'The Silk Road was not a path — it was an argument the world was making with itself about what it could become.',ch:['The Silk Road was not a path — it was an argument the world was making with itself about what it could become.','The Silk Road was like an argument — it was a contested route, with many different interests along the way.','Like an argument the world was having, the Silk Road was the contested ground where different civilizations met.','The Silk Road functioned like an argument — it created disagreement and negotiation at every point along its length.'],h:'Think: calling the Silk Road directly an argument — it IS the ongoing negotiation, and its extensiveness IS the scope of what the world was debating with itself',l:14,s:'The Silk Road',c:'#22d3ee'},
